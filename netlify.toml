# Netlify config for BeyonDegrees UI/UX test deploys.
# Serves the whole repo as a static site over HTTPS (PWA-installable).

[build]
  publish = "."

# The site root (/index.html) is a device router: it detects desktop vs mobile
# in JS and redirects to /desktop/... or /mobile/... — so no server redirect is
# needed here. The dev "UI/UX Dashboard" lives at /dashboard.html.

# Never long-cache the service worker / manifest, so updates ship immediately.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/mobile/manifest.json"
  [headers.values]
    Cache-Control = "no-cache"
