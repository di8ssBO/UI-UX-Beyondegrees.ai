<!DOCTYPE html>
<html lang="en">
<head>
<!-- anti-fouc -->
<script>document.documentElement.setAttribute("data-theme",(localStorage.getItem("bd-theme")||"light"));</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discipline Detail — BeyonDegrees.ai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_shell/desktop.css?v=4">
<style>
  .dd-back { margin-bottom: 18px; }
  .dd-page { --match-color: #06d6a0; --match-soft: rgba(6,214,160,0.16); --match-border: rgba(6,214,160,0.38); }
  .match-high { --match-color: #06d6a0; --match-soft: rgba(6,214,160,0.16); --match-border: rgba(6,214,160,0.38); }
  .match-mid { --match-color: #fb923c; --match-soft: rgba(251,146,60,0.15); --match-border: rgba(251,146,60,0.35); }
  .match-low { --match-color: #ff6b81; --match-soft: rgba(255,107,129,0.14); --match-border: rgba(255,107,129,0.34); }
  :root[data-theme="light"] .match-high { --match-color: #047857; --match-soft: rgba(4,120,87,0.10); --match-border: rgba(4,120,87,0.30); }
  :root[data-theme="light"] .match-mid { --match-color: #b87916; --match-soft: rgba(184,121,22,0.11); --match-border: rgba(184,121,22,0.30); }
  :root[data-theme="light"] .match-low { --match-color: #c45540; --match-soft: rgba(196,85,64,0.10); --match-border: rgba(196,85,64,0.30); }

  /* Hero aurora theo màu ngành (mobile .hero-aurora per-disc) */
  .dd-hero { position: relative; overflow: hidden; min-height: 170px; padding: 38px 44px; display: flex; align-items: center; justify-content: space-between; gap: 28px; }
  .dd-hero::before {
    content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 70%; height: 1px;
    background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--acc) 55%, transparent), transparent);
  }
  .dd-hero::after {
    content: ''; position: absolute; top: -50%; right: -12%;
    width: 60%; height: 160%; border-radius: 50%;
    background: radial-gradient(circle, color-mix(in srgb, var(--acc) 20%, transparent) 0%, transparent 70%);
    filter: blur(34px); pointer-events: none;
  }
  .dd-hero > * { position: relative; z-index: 1; }
  .dd-hero-main { display: flex; align-items: center; gap: 24px; min-width: 0; }
  .dd-hero .big-ico {
    width: 88px; height: 88px; border-radius: 24px; flex: none;
    display: grid; place-items: center; font-size: 42px;
    background: color-mix(in srgb, var(--acc) 16%, transparent);
    border: 1px solid color-mix(in srgb, var(--acc) 35%, transparent);
    filter: drop-shadow(0 6px 18px color-mix(in srgb, var(--acc) 35%, transparent));
  }
  .dd-hero h1 { font-size: 30px; font-weight: 900; letter-spacing: 0; line-height: 1.2; color: var(--text-primary); }
  .dd-rank { display: inline-flex; }
  .dd-hero-meta { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
  .why-btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; padding: 16px 22px; border-radius: 14px;
    font-size: 15px; font-weight: 800; color: #fff; text-align: center; text-decoration: none;
    background: linear-gradient(135deg, var(--acc), color-mix(in srgb, var(--acc) 68%, #000));
    border: 1px solid color-mix(in srgb, var(--acc) 55%, transparent);
    box-shadow: 0 8px 24px color-mix(in srgb, var(--acc) 35%, transparent);
    transition: transform .2s var(--ease-out), box-shadow .2s, filter .2s;
  }
  .why-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px color-mix(in srgb, var(--acc) 45%, transparent); filter: brightness(1.06); }
  .why-btn .why-emoji { font-size: 17px; }
  .why-btn .why-arrow { display: flex; }
  .dd-ringwrap { margin-left: auto; flex: none; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .dd-ring { position: relative; width: 104px; height: 104px; }
  .dd-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); display: block; }
  .dd-ring-track { fill: none; stroke: color-mix(in srgb, var(--text-muted) 28%, transparent); stroke-width: 7; }
  .dd-ring-fill { fill: none; stroke: var(--match-color); stroke-width: 7; stroke-linecap: round; transition: stroke-dashoffset 1s var(--ease-out); filter: drop-shadow(0 0 8px var(--match-soft)); }
  .dd-ring-num { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--match-color); font-size: 26px; font-weight: 900; line-height: 1; }
  .dd-ring-cap { font-size: 10px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); }

  .dd-detail-layout { display: grid; grid-template-columns: minmax(0, 1fr) 340px; gap: 22px; align-items: start; margin-top: 22px; }
  .dd-main { display: flex; flex-direction: column; gap: 22px; min-width: 0; }
  .dd-rail { position: sticky; top: 78px; height: calc(100vh - 110px); display: flex; flex-direction: column; gap: 18px; min-width: 0; }
  .dd-majors-panel { min-width: 0; min-height: 0; flex: 1; display: flex; flex-direction: column; }
  .dd-discipline-card { padding: 30px 34px; }
  .dd-section-head { flex: none; display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 16px; }
  .dd-section-title { font-size: 18px; font-weight: 900; color: var(--text-primary); margin-top: 6px; }
  .dd-section-head .hint { font-size: 13px; color: var(--text-muted); font-weight: 600; white-space: nowrap; }
  .dd-overview { margin-top: 16px; padding-left: 16px; border-left: 3px solid color-mix(in srgb, var(--acc) 55%, transparent); }
  .dd-overview p { font-size: 15px; color: var(--text-secondary); line-height: 1.72; }
  .dd-overview p + p { margin-top: 12px; }
  .intro-video-card { padding: 0; overflow: hidden; }
  .intro-video-slot {
    min-height: 260px;
    aspect-ratio: 16 / 9;
    display: grid;
    place-items: center;
    border-radius: inherit;
    background:
      radial-gradient(circle at 50% 45%, color-mix(in srgb, var(--acc) 22%, transparent), transparent 48%),
      linear-gradient(135deg, color-mix(in srgb, var(--acc) 12%, rgba(255,255,255,0.04)), rgba(255,255,255,0.03));
    border: 1px solid color-mix(in srgb, var(--acc) 24%, transparent);
  }
  :root[data-theme="light"] .intro-video-slot {
    background:
      radial-gradient(circle at 50% 45%, color-mix(in srgb, var(--acc) 16%, transparent), transparent 52%),
      linear-gradient(135deg, color-mix(in srgb, var(--acc) 9%, rgba(253,248,242,0.94)), rgba(255,255,255,0.72));
    border-color: color-mix(in srgb, var(--acc) 20%, rgba(232,224,213,0.9));
  }
  .intro-video-play {
    width: 64px; height: 64px; border-radius: 999px;
    display: grid; place-items: center;
    color: #fff;
    background: linear-gradient(135deg, var(--acc), color-mix(in srgb, var(--acc) 68%, #000));
    box-shadow: 0 12px 30px color-mix(in srgb, var(--acc) 34%, transparent);
  }
  .intro-video-play svg { width: 24px; height: 24px; margin-left: 3px; }

  /* ── Related Majors (mobile .major-list / .major-card) ── */
  .rm-grid { min-height: 0; display: grid; grid-template-columns: 1fr; gap: 12px; overflow-y: auto; padding-right: 6px; scrollbar-width: thin; scrollbar-color: color-mix(in srgb, var(--acc) 48%, transparent) transparent; }
  .rm-grid::-webkit-scrollbar { width: 6px; }
  .rm-grid::-webkit-scrollbar-track { background: transparent; }
  .rm-grid::-webkit-scrollbar-thumb { background: color-mix(in srgb, var(--acc) 42%, transparent); border-radius: 999px; }
  @media (max-width: 1040px) {
    .dd-detail-layout { grid-template-columns: 1fr; }
    .dd-rail { position: static; height: auto; }
    .dd-majors-panel { flex: none; }
    .rm-grid { overflow: visible; padding-right: 0; }
  }
  @media (max-width: 860px) {
    .dd-hero { align-items: flex-start; flex-direction: column; }
    .dd-hero-main { align-items: flex-start; }
    .rm-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 640px) {
    .dd-hero { padding: 28px 22px; }
    .dd-hero-main { flex-direction: column; gap: 16px; }
    .dd-ring { width: 104px; height: 104px; }
    .dd-section-head { align-items: flex-start; flex-direction: column; gap: 6px; }
    .dd-section-head .hint { white-space: normal; }
  }
  .rm-card { display: flex; align-items: center; gap: 14px; padding: 16px 18px; min-width: 0; }
  .rm-ico { width: 46px; height: 46px; border-radius: 12px; flex: none; display: grid; place-items: center; font-size: 22px;
    background: color-mix(in srgb, var(--acc) 14%, transparent);
    box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--acc) 22%, transparent); }
  .rm-info { flex: 1; min-width: 0; }
  .rm-name { font-size: 15px; font-weight: 800; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rm-tag { display: none; }
  .rm-pct { font-size: 18px; font-weight: 900; color: var(--match-color); flex: none; min-width: 48px; text-align: right; }
  .rm-card.locked { opacity: .5; filter: blur(1.5px); pointer-events: none; user-select: none; }
  .rm-locked-banner { display: flex; align-items: center; gap: 10px; margin-top: 16px; padding: 15px 20px; border-radius: 14px; cursor: pointer;
    background: color-mix(in srgb, var(--acc) 9%, transparent); border: 1px solid color-mix(in srgb, var(--acc) 24%, transparent);
    font-size: 13.5px; font-weight: 700; color: var(--text-secondary); transition: background var(--tr-fast); }
  .rm-locked-banner:hover { background: color-mix(in srgb, var(--acc) 14%, transparent); }
  .rm-locked-banner b { color: var(--text-primary); }
  .rm-locked-banner .lk { font-size: 20px; }
</style>
</head>
<body class="app" data-page="disciplines" data-crumb="Discipline Detail">
  <div class="main">
    <div class="content fade-in" id="root"></div>
  </div>

  <script src="../../../shared/scripts/data/majors-data.js"></script>
  <script src="../../../shared/scripts/ui/i18n.js?v=3"></script>
  <script src="../../_shell/desktop.js?v=12"></script>
  <script>
    /* i18n helpers */
    function t(k){ return (window.BDi18n && BDi18n.t) ? BDi18n.t(k) : k; }
    function tf(k,v){ return (window.BDi18n && BDi18n.tf) ? BDi18n.tf(k,v) : t(k); }

    /* ── Nội dung nguyên văn từ 6 file mobile detail/(kt|tn|xh|nv|yt|nn).html ── */
    var DETAIL = {
      kt: { ico:'⚙️', name:'Engineering & Technology', rank:'#1 Ranked Match', match:94,
        desc:'Applying mathematics and science to design, build, and optimize systems, structures, and technologies that shape our world.' },
      tn: { ico:'🔬', name:'Natural Sciences', rank:'#2 Ranked Match', match:89,
        desc:'Understanding the physical and natural world through observation, experimentation, and analysis.' },
      xh: { ico:'🧠', name:'Social Sciences', rank:'#3 Ranked Match', match:34,
        desc:'Exploring human behaviour, social structures, and the forces that shape societies, communities, and collective decision-making.' },
      nv: { ico:'📖', name:'Humanities', rank:'#4 Ranked Match', match:32,
        desc:'Understanding the human experience through language, literature, philosophy, history, and the cultural traditions that define civilisations.' },
      yt: { ico:'🩺', name:'Medical & Health Sciences', rank:'#5 Ranked Match', match:64,
        desc:'Dedicated to understanding, preserving, and restoring human health through science, compassionate care, and evidence-based practice.' },
      nn: { ico:'🌾', name:'Agricultural Sciences', rank:'#6 Ranked Match', match:62,
        desc:'Advancing sustainable food production, land stewardship, and environmental resilience to nourish and sustain a growing global population.' }
    };
    /* 3 discipline overview points (mobile dùng chung cho mọi ngành) */
    var HIGHLIGHTS = [
      'Includes core fields like Physics, Chemistry, and Biology.',
      'Emphasizes empirical evidence and measurable data analysis.',
      'Lays the foundation for medicine and environmental studies.'
    ];

    var key = BD.param('d', 'kt');
    if (!DETAIL[key]) key = 'kt';
    var d = DETAIL[key];
    document.title = d.name + ' — BeyonDegrees.ai';

    /* Aurora tint theo ngành (mobile per-disc aurora) */
    var TINT = {
      kt:'rgba(124,58,237,0.55)', tn:'rgba(244,63,94,0.45)', yt:'rgba(6,214,160,0.45)',
      nn:'rgba(245,158,11,0.42)', xh:'rgba(168,85,247,0.50)', nv:'rgba(59,130,246,0.50)'
    };
    document.documentElement.style.setProperty('--blob-p1', TINT[key]);
    document.documentElement.style.setProperty('--blob-p4', TINT[key]);

    /* Back về trang trước (mobile history.back()), fallback discipline-match */
    function goBack() { if (history.length > 1) history.back(); else location.href = '../../discipline/match/'; }
    window.goBack = goBack;

    /* ── Related Majors từ majors-data.js (lọc theo discCode) ── */
    var _MAJORS = (typeof MAJORS_DATA !== 'undefined') ? MAJORS_DATA : (window.MAJORS_DATA || []);
    function matchPct(id) {
      try { var r = JSON.parse(localStorage.getItem('quizResults') || '{}'); if (r[id]) return r[id]; } catch (e) {}
      return ((id * 17 + 31) % 30) + 62;
    }
    function clampPct(value, fallback) {
      var n = parseInt(value, 10);
      if (!isFinite(n)) return fallback;
      return Math.max(0, Math.min(100, n));
    }
    function disciplineMatchPct(code) {
      try {
        var scores = JSON.parse(localStorage.getItem('disciplineScores') || '{}');
        if (scores && Object.prototype.hasOwnProperty.call(scores, code)) {
          return clampPct(scores[code], DETAIL[code].match);
        }
      } catch (e) {}
      return DETAIL[code].match;
    }
    function matchTone(pct) {
      return pct >= 85 ? 'match-high' : pct >= 70 ? 'match-mid' : 'match-low';
    }
    /* Lock related majors khi chưa làm đủ 20 câu (mobile parity) */
    var rawProgress  = parseInt(localStorage.getItem('quizProgress')  || '0', 10);
    var rawMilestone = parseInt(localStorage.getItem('quizMilestone') || '0', 10);
    var answered = rawMilestone >= 30 ? 30 : Math.max(rawProgress, rawMilestone);
    var locked = answered < 20;

    var relMajors = _MAJORS.filter(function (m) { return m.discCode === key; })
      .map(function (m) {
        var pctNum = clampPct(matchPct(m.id), 0);
        return Object.assign({}, m, { pctNum: pctNum });
      })
      .sort(function (a, b) {
        return (b.pctNum - a.pctNum) || a.title.localeCompare(b.title);
      });
    var rmCards = relMajors.map(function (m) {
      var tag = m.desc.length > 64 ? m.desc.slice(0, 64).replace(/\s\S+$/, '') + '…' : m.desc;
      var pct = locked ? '??' : m.pctNum;
      var pctCls = locked ? '' : ' ' + matchTone(m.pctNum);
      return '<a class="card hoverable rm-card' + (locked ? ' locked' : '') + '" href="../../major/detail/?major=' + encodeURIComponent(m.title) + '">' +
        '<div class="rm-ico">' + m.icon + '</div>' +
        '<div class="rm-info"><div class="rm-name">' + m.title + '</div><div class="rm-tag">' + tag + '</div></div>' +
        '<span class="rm-pct' + pctCls + '">' + pct + '%</span>' +
      '</a>';
    }).join('');

    var overview = [d.desc].concat(HIGHLIGHTS).map(function (text) {
      return '<p>' + text + '</p>';
    }).join('');

    var lockBanner = '';
    if (locked) {
      var rem = 20 - answered;
      lockBanner = '<div class="rm-locked-banner" id="rmLock"><span class="lk">🔒</span>' +
        '<span>' + tf('disc.detail.lock_majors', { n: rem }) + '</span></div>';
    }

    var dPct = disciplineMatchPct(key);
    var dTone = matchTone(dPct);
    var ringC = 2 * Math.PI * 46;
    var ringOff = ringC * (1 - dPct / 100);
    var ring =
      '<div class="dd-ringwrap ' + dTone + '">' +
        '<div class="dd-ring">' +
          '<svg viewBox="0 0 104 104">' +
            '<circle class="dd-ring-track" cx="52" cy="52" r="46"/>' +
            '<circle class="dd-ring-fill" cx="52" cy="52" r="46" stroke-dasharray="' + ringC.toFixed(1) + '" stroke-dashoffset="' + ringOff.toFixed(1) + '"/>' +
          '</svg>' +
          '<b class="dd-ring-num">' + dPct + '%</b>' +
        '</div>' +
        '<span class="dd-ring-cap">' + t('disc.match') + '</span>' +
      '</div>';
    var why =
      '<a class="why-btn" href="../../discipline/why/?d=' + key + '">' +
        '<span class="why-emoji">&#128269;</span>' +
        '<span>' + t('disc.detail.why_btn') + '</span>' +
        '<span class="why-arrow"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>' +
      '</a>';
    var introVideo =
      '<div class="card intro-video-card" aria-label="Discipline intro video">' +
        '<div class="intro-video-slot">' +
          '<div class="intro-video-play"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg></div>' +
        '</div>' +
      '</div>';

    document.getElementById('root').innerHTML =
      '<div class="acc-' + key + ' dd-page">' +
        '<button class="btn btn-ghost dd-back" onclick="goBack()">' + t('common.back') + '</button>' +
        '<div class="card glass-hero dd-hero">' +
          '<div class="dd-hero-main">' +
            '<div class="big-ico">' + d.ico + '</div>' +
            '<div>' +
              '<h1>' + t('disc.name.' + key) + '</h1>' +
              '<div class="dd-hero-meta">' +
                '<span class="chip violet dd-rank">🏅 ' + tf('disc.detail.ranked_match', { n: parseInt(d.rank.replace(/\D/g, ''), 10) || 1 }) + '</span>' +
              '</div>' +
            '</div>' +
          '</div>' +
          ring +
        '</div>' +
        '<div class="dd-detail-layout">' +
          '<div class="dd-main">' +
            '<div class="card dd-discipline-card">' +
              '<span class="section-label">' + t('disc.detail.overview_label') + '</span>' +
              '<div class="dd-section-title">' + t('disc.detail.covers') + '</div>' +
              '<div class="dd-overview">' + overview + '</div>' +
            '</div>' +
            introVideo +
          '</div>' +
          '<div class="dd-rail">' +
            why +
            '<div class="dd-majors-panel">' +
              '<div class="dd-section-head">' +
                '<div class="dd-section-title">' + t('disc.detail.related') + '</div>' +
                '<span class="hint">' + tf('disc.detail.related_count', { n: relMajors.length, name: t('disc.name.' + key) }) + '</span>' +
              '</div>' +
              '<div class="rm-grid">' + rmCards + '</div>' +
              lockBanner +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>';

    var lk = document.getElementById('rmLock');
    if (lk) lk.onclick = function () { location.href = '../../quiz/quiz-card/'; };
  </script>
</body>
</html>
