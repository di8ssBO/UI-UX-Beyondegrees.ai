<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About me — BeyonDegrees.ai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../assets/desktop.css">
<style>
  /* ── Hero (mobile .hero-section → desktop 2 cột trong 1 card) ── */
  .hero-card { padding: 48px; display: grid; grid-template-columns: 130px 1fr; gap: 36px; align-items: center; }
  .hero-ring-wrap { position: relative; width: 116px; height: 116px; }
  .hero-ring-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .hero-ring-wrap #heroEmoji {
    position: absolute; inset: 0; display: grid; place-items: center; font-size: 44px;
    filter: drop-shadow(0 4px 12px rgba(124,58,237,0.4));
  }
  :root[data-theme="light"] .hero-ring-wrap #heroEmoji { filter: drop-shadow(0 4px 12px rgba(201,107,85,0.30)); }
  .hero-tagline { font-size: 13px; color: var(--text-muted); font-weight: 600; }
  :root[data-theme="light"] .hero-tagline { color: #6b5440; }
  .hero-card h1 { font-size: 34px; font-weight: 800; letter-spacing: -0.01em; line-height: 1.25; margin: 6px 0 4px; color: var(--text-primary); }
  .hero-card .hero-sub { font-size: 15px; color: var(--text-secondary); line-height: 1.6; }
  :root[data-theme="light"] .hero-card h1 { color: #2c1f14; }
  :root[data-theme="light"] .hero-card .hero-sub { color: #5c4535; font-weight: 500; }
  .cta-row { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; }

  /* ── Disciplines (mobile .discipline-card 2 cột → desktop 3 cột) ── */
  .section-label-mobile {
    font-size: 11px; font-weight: 800; letter-spacing: 2.5px;
    color: rgba(167,139,250,0.75); text-transform: uppercase;
    display: block; text-align: center; margin: 40px 0 18px;
  }
  :root[data-theme="light"] .section-label-mobile { color: #a84e30; font-weight: 900; }
  .disciplines-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  @media (max-width: 1100px) { .disciplines-grid { grid-template-columns: repeat(2, 1fr); } }
  .discipline-card {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(16px) saturate(140%);
    -webkit-backdrop-filter: blur(16px) saturate(140%);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 14px;
    padding: 26px 18px;
    text-align: center; cursor: pointer; user-select: none;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.06);
    transition: background .25s ease, border-color .25s ease,
      transform .2s cubic-bezier(0.34,1.56,0.64,1), box-shadow .25s ease;
    position: relative; overflow: hidden;
  }
  .discipline-icon { font-size: 32px; line-height: 1; }
  .discipline-card span { font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.8); line-height: 1.3; }
  /* dark: tint theo --disc như mobile */
  .discipline-card:hover {
    background: color-mix(in srgb, var(--disc) 14%, rgba(255,255,255,0.06));
    border-color: color-mix(in srgb, var(--disc) 40%, transparent);
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 8px 24px color-mix(in srgb, var(--disc) 25%, transparent), inset 0 1px 0 rgba(255,255,255,0.1);
  }
  .discipline-card.selected {
    background: color-mix(in srgb, var(--disc) 18%, rgba(255,255,255,0.06));
    border-color: color-mix(in srgb, var(--disc) 55%, transparent);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--disc) 15%, transparent),
      0 8px 24px color-mix(in srgb, var(--disc) 20%, transparent);
  }
  /* light: trắng + strip 3px + halo + icon glow (mobile parity) */
  :root[data-theme="light"] .discipline-card {
    background: #ffffff;
    border: 1px solid color-mix(in srgb, var(--disc) 32%, rgba(232,224,213,0.65));
    box-shadow: inset 0 1px 0 #fff, 0 2px 6px rgba(58,46,38,0.05),
      0 6px 16px color-mix(in srgb, var(--disc) 12%, rgba(92,69,53,0.06));
  }
  :root[data-theme="light"] .discipline-card::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px; z-index: 1;
    background: linear-gradient(90deg,
      color-mix(in srgb, var(--disc) 80%, #fff) 0%,
      var(--disc) 50%,
      color-mix(in srgb, var(--disc) 75%, #000) 100%);
  }
  :root[data-theme="light"] .discipline-card::after {
    content: ""; position: absolute; bottom: -30%; right: -20%;
    width: 75%; height: 90%; border-radius: 50%;
    background: radial-gradient(circle, color-mix(in srgb, var(--disc) 20%, transparent) 0%, transparent 70%);
    filter: blur(18px); z-index: 0; pointer-events: none; opacity: 0.65;
  }
  :root[data-theme="light"] .discipline-card > * { position: relative; z-index: 2; }
  :root[data-theme="light"] .discipline-icon {
    filter: drop-shadow(0 2px 6px color-mix(in srgb, var(--disc) 32%, transparent));
  }
  :root[data-theme="light"] .discipline-card span { color: #2c1f14; font-weight: 800; }
  :root[data-theme="light"] .discipline-card:hover {
    border-color: color-mix(in srgb, var(--disc) 60%, transparent);
    box-shadow: inset 0 1px 0 #fff, 0 4px 10px rgba(58,46,38,0.08),
      0 12px 32px color-mix(in srgb, var(--disc) 28%, transparent);
  }
  :root[data-theme="light"] .discipline-card:hover span { color: color-mix(in srgb, var(--disc) 65%, #2c1f14); }
  :root[data-theme="light"] .discipline-card.selected {
    background: linear-gradient(135deg,
      color-mix(in srgb, var(--disc) 14%, #fff) 0%,
      color-mix(in srgb, var(--disc) 22%, #fff) 100%);
    border-color: color-mix(in srgb, var(--disc) 60%, transparent);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.85),
      0 0 0 3px color-mix(in srgb, var(--disc) 22%, transparent),
      0 10px 24px color-mix(in srgb, var(--disc) 30%, transparent);
  }
  :root[data-theme="light"] .discipline-card.selected span { color: color-mix(in srgb, var(--disc) 70%, #2c1f14); }
</style>
</head>
<body class="app" data-page="home" data-crumb="About me">
  <div class="main">
    <div class="content fade-in">

      <!-- HERO — đúng nội dung mobile hero-section -->
      <section class="card glass-hero hero-card">
        <div class="hero-ring-wrap">
          <svg viewBox="0 0 76 76" fill="none">
            <circle cx="38" cy="38" r="32" stroke="rgba(255,255,255,0.08)" stroke-width="3"/>
            <circle id="heroRingFill" cx="38" cy="38" r="32"
              stroke="#1863DC" stroke-width="3" stroke-linecap="round" fill="none"/>
          </svg>
          <span id="heroEmoji">🚀</span>
        </div>
        <div>
          <p class="hero-tagline" id="heroTagline">Discover your academic identity</p>
          <h1 id="heroTitle">What major are you interested in?</h1>
          <p class="hero-sub" id="heroSub">Answer 30 questions and let AI find your perfect match.</p>
          <div class="cta-row">
            <button class="btn btn-primary" id="ctaPrimary">Start Quiz →</button>
            <button class="btn btn-ghost" id="ctaSecondary" style="display:none;"></button>
          </div>
        </div>
      </section>

      <!-- DISCIPLINES — 6 ngành, đúng icon + tên + màu mobile -->
      <h3 class="section-label-mobile">Choose 1 or more disciplines</h3>
      <div class="disciplines-grid fade-in-stagger">
        <div class="discipline-card" data-disc="kt" style="--disc:#7c3aed">
          <div class="discipline-icon">⚙️</div><span>Engineering</span>
        </div>
        <div class="discipline-card" data-disc="yt" style="--disc:#06d6a0">
          <div class="discipline-icon">🩺</div><span>Medical</span>
        </div>
        <div class="discipline-card" data-disc="tn" style="--disc:#f43f5e">
          <div class="discipline-icon">🔬</div><span>Natural Sci</span>
        </div>
        <div class="discipline-card" data-disc="nn" style="--disc:#f59e0b">
          <div class="discipline-icon">🌱</div><span>Agricultural</span>
        </div>
        <div class="discipline-card" data-disc="xh" style="--disc:#a855f7">
          <div class="discipline-icon">🧠</div><span>Social Sci</span>
        </div>
        <div class="discipline-card" data-disc="nv" style="--disc:#3b82f6">
          <div class="discipline-icon">📜</div><span>Humanities</span>
        </div>
      </div>

    </div>
  </div>

  <script src="../../../shared/scripts/i18n.js"></script>
  <script src="../../assets/desktop.js?v=3"></script>
  <script>
    /* Discipline selection toggle (mobile parity) */
    document.querySelectorAll('.discipline-card').forEach(function (card) {
      card.addEventListener('click', function () { card.classList.toggle('selected'); });
    });

    /* Progress-based hero state — same logic & copy as mobile initProgress() */
    (function initProgress() {
      var p = parseInt(localStorage.getItem('quizProgress') || '0', 10);
      var m = parseInt(localStorage.getItem('quizMilestone') || '0', 10);
      var key = m >= 30 ? 30 : m >= 20 ? 20 : m >= 10 ? 10 : p > 0 ? 1 : 0;

      var C = 201.1; /* 2π × 32 */
      var pcts = { 0: 0, 1: 0.05, 10: 0.333, 20: 0.667, 30: 1 };
      var ring = document.getElementById('heroRingFill');
      ring.style.strokeDasharray = C;
      ring.style.strokeDashoffset = C * (1 - (pcts[key] || 0));
      if (key === 30) ring.style.stroke = '#f59e0b'; /* gold = complete */

      var STATES = {
        0:  { emoji: '🚀', tagline: 'Discover your academic identity',
              title: 'What major are you interested in?',
              sub: 'Answer 30 questions and let AI find your perfect match.' },
        1:  { emoji: '💪', tagline: 'Great start! Keep going',
              title: "You're on your way to finding your match",
              sub: 'Answered ' + p + ' question' + (p > 1 ? 's' : '') + '. Pick up where you left off!' },
        10: { emoji: '🔥', tagline: 'Quiz Stage 1 complete!',
              title: 'Your top discipline is revealed 🔥',
              sub: 'Keep going! 20 more questions to unlock your Major matches.' },
        20: { emoji: '⚡', tagline: 'Quiz Stage 2 complete!',
              title: 'AI found your Major matches ⚡',
              sub: '10 more questions to unlock your University matches.' },
        30: { emoji: '✨', tagline: 'Profile complete!',
              title: 'Your academic identity is complete ✨',
              sub: 'BeyonDegrees has found your perfect university matches.' }
      };
      var s = STATES[key];
      document.getElementById('heroEmoji').textContent = s.emoji;
      document.getElementById('heroTagline').textContent = s.tagline;
      document.getElementById('heroTitle').textContent = s.title;
      document.getElementById('heroSub').textContent = s.sub;

      var BTNS = {
        0:  { b1: 'Start Quiz →', u1: '../../quiz/quiz-card/', b2: null },
        1:  { b1: 'Continue Quiz →', u1: '../../quiz/quiz-card/', b2: null },
        10: { b1: 'Continue Quiz →', u1: '../../quiz/quiz-card/', b2: { t: 'View Discipline Results ›', u: '../../discipline/match/' } },
        20: { b1: 'Continue Quiz →', u1: '../../quiz/quiz-card/', b2: { t: 'View Major Results ›', u: '../../major/recommendations/' } },
        30: { b1: 'View Match →', u1: '../../university/matches/', b2: { t: 'View University Results ›', u: '../../university/matches/' } }
      };
      var b = BTNS[key];
      var btn1 = document.getElementById('ctaPrimary');
      var btn2 = document.getElementById('ctaSecondary');
      btn1.textContent = b.b1;
      btn1.onclick = function () { location.href = b.u1; };
      if (b.b2) {
        btn2.style.display = 'inline-flex';
        btn2.textContent = b.b2.t;
        btn2.onclick = function () { location.href = b.b2.u; };
      }
    })();
  </script>
</body>
</html>
