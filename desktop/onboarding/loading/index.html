<!DOCTYPE html>
<html lang="en">
<head>
<!-- anti-fouc -->
<script>document.documentElement.setAttribute("data-theme",(localStorage.getItem("bd-theme")||"light"));</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Loading — BeyonDegrees.ai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_shell/desktop.css?v=3">
<style>
  .load-layout { display: grid; grid-template-columns: 1fr 1.1fr; gap: 24px; max-width: 1020px; margin: 0 auto; align-items: stretch; }
  /* ── Orb + phase ── */
  .orb-card { text-align: center; padding: 40px 32px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  /* Main-character canvas (mobile parity): discipline chips orbit, converge
     into a glowing "YOU" sphere, then scatter — looping. */
  .mc-wrap { position: relative; width: 190px; height: 194px; margin: 0 auto 24px; flex-shrink: 0; }
  #mcCanvas { display: block; width: 190px; height: 190px; }
  .you-pulse-ring {
    position: absolute; top: 50%; left: 50%;
    width: 130px; height: 130px; margin: -65px 0 0 -65px;
    border-radius: 50%; border: 2px solid transparent; pointer-events: none; opacity: 0;
  }
  .you-pulse-ring.pulsing { animation: youPulse 1.6s ease-out forwards; }
  @keyframes youPulse {
    0%   { opacity:1; transform:scale(0.45); border-color:rgba(139,92,246,0.7); box-shadow:0 0 0 0 rgba(139,92,246,0.35); }
    55%  { opacity:0.5; transform:scale(0.95); border-color:rgba(139,92,246,0.25); box-shadow:0 0 18px 6px rgba(139,92,246,0.12); }
    100% { opacity:0; transform:scale(1.3); border-color:transparent; box-shadow:0 0 28px 14px rgba(139,92,246,0); }
  }
  :root[data-theme="light"] .you-pulse-ring.pulsing { animation: youPulseLight 1.6s ease-out forwards; }
  @keyframes youPulseLight {
    0%   { opacity:1; transform:scale(0.45); border-color:rgba(124,58,237,0.65); box-shadow:0 0 0 0 rgba(124,58,237,0.28); }
    55%  { opacity:0.45; transform:scale(0.95); border-color:rgba(124,58,237,0.2); box-shadow:0 0 16px 6px rgba(124,58,237,0.08); }
    100% { opacity:0; transform:scale(1.3); border-color:transparent; box-shadow:0 0 24px 12px rgba(124,58,237,0); }
  }
  .phase-label {
    font-size: 11px; font-weight: 800; letter-spacing: 2.5px; text-transform: uppercase;
    color: rgba(167,139,250,0.75);
  }
  :root[data-theme="light"] .phase-label { color: #a84e30; font-weight: 900; }
  .phase-title { font-size: 26px; font-weight: 900; margin-top: 6px; color: var(--text-primary); }
  .time-left { font-size: 13px; color: var(--text-muted); margin-top: 10px; }
  .q-progress { font-size: 13px; font-weight: 700; color: var(--text-secondary); margin-top: 18px; }
  .q-progress b { color: var(--mint-500); }
  :root[data-theme="light"] .q-progress b { color: #047857; }

  /* ── DNA forming (mobile DNA bars) ── */
  .dna-title { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 800; margin-bottom: 18px; color: var(--text-primary); }
  .dna-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .dna-row .ico { width: 34px; height: 34px; border-radius: 10px; display: grid; place-items: center; font-size: 16px;
    background: color-mix(in srgb, var(--acc) 16%, transparent); flex: none; }
  .dna-row .name { width: 170px; font-size: 13px; font-weight: 700; color: var(--text-secondary); }
  .dna-row .bar { flex: 1; height: 6px; }
  .dna-row .pct { width: 44px; text-align: right; font-size: 13px; font-weight: 900; color: var(--acc-pct); }
  /* Fun fact */
  .fact-card { margin-top: 22px; padding: 18px 20px; border-radius: 14px;
    background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.25); }
  :root[data-theme="light"] .fact-card { background: rgba(232,168,107,0.12); border-color: rgba(232,168,107,0.38); }
  .fact-card .fk { font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--orange-400); }
  :root[data-theme="light"] .fact-card .fk { color: #b26344; }
  .fact-card p { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-top: 6px; min-height: 40px; }
  .fact-dots { display: flex; gap: 5px; margin-top: 10px; }
  .fact-dots i { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.15); }
  :root[data-theme="light"] .fact-dots i { background: #e0d5c5; }
  .fact-dots i.on { background: var(--orange-400); }
  :root[data-theme="light"] .fact-dots i.on { background: #c96b55; }

  /* ── End overlay: Results ready (mobile parity) ── */
  .done-overlay {
    position: fixed; inset: 0; z-index: 200; display: none;
    align-items: center; justify-content: center;
    background: rgba(6,6,15,0.78); backdrop-filter: blur(12px);
  }
  :root[data-theme="light"] .done-overlay { background: rgba(245,237,224,0.85); }
  .done-overlay.show { display: flex; }
  .done-box { text-align: center; animation: fadeUp .55s var(--ease-out) both; }
  .done-box .big { font-size: 72px; }
  .done-box h2 { font-size: 30px; font-weight: 900; margin-top: 10px; color: var(--text-primary); }
  .done-box p { color: var(--text-secondary); margin-top: 8px; }
  .done-box .row { display: flex; gap: 12px; justify-content: center; margin-top: 24px; }
</style>
</head>
<body class="app" data-page="quiz" data-crumb="AI Loading Screen">
  <div class="main">
    <div class="content fade-in">
      <div class="load-layout">

        <!-- Orb + phases -->
        <div class="card glass-hero orb-card">
          <div class="mc-wrap">
            <canvas id="mcCanvas" width="320" height="320"></canvas>
            <div id="youPulseRing" class="you-pulse-ring"></div>
          </div>
          <div class="phase-label" id="phaseLabel">Analyzing</div>
          <div class="phase-title" id="phaseTitle">Your Academic DNA</div>
          <div class="time-left" id="timeLeft">~25 seconds left</div>
          <div class="bar mt-6" style="width:100%;"><span id="mainBar" style="width:3%"></span></div>
          <div class="q-progress"><b id="qDone">30</b> / 30 <span data-i18n="loading.questions_done">questions ✓</span></div>
        </div>

        <!-- DNA forming + fun facts -->
        <div class="card">
          <div class="dna-title">🧬 <span data-i18n="loading.dna_forming">Academic DNA forming</span></div>
          <div id="dnaRows"></div>
          <div class="fact-card">
            <div class="fk" data-i18n="loading.did_you_know">💡 Did you know?</div>
            <p id="factText">73% of students switch majors after year one due to a poor initial choice.</p>
            <div class="fact-dots" id="factDots"></div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Stage complete / Results ready (stage-aware) -->
  <div class="done-overlay" id="doneOverlay">
    <div class="done-box">
      <div class="big" id="doneEmoji">🎉</div>
      <h2 id="doneTitle">Results are ready!</h2>
      <p id="doneSub">AI has analyzed <b id="doneCount">30</b> of your answers</p>
      <div class="row">
        <a class="btn btn-primary" id="doneBtn" href="../../results/match-reveal/">See my results →</a>
        <button class="btn btn-ghost" onclick="location.reload()" data-i18n="loading.replay_demo">↺ Replay demo</button>
      </div>
    </div>
  </div>

  <script src="../../../shared/scripts/data/loading-data.js"></script>
  <script src="../../../shared/scripts/ui/i18n.js?v=3"></script>
  <script src="../../_shell/desktop.js?v=7"></script>
  <script>
    /* i18n helpers — named tr()/tf() (this file uses local `t` for elapsed time) */
    function tr(k){ return (window.BDi18n && BDi18n.t) ? BDi18n.t(k) : k; }
    function tf(k,v){ return (window.BDi18n && BDi18n.tf) ? BDi18n.tf(k,v) : tr(k); }

    /* ── Stage-aware setup: this loading screen runs after every 10-question
       batch. ?stage=1|2 return to the quiz; ?stage=3 (default) → results. ── */
    var STAGE = parseInt(new URLSearchParams(location.search).get('stage') || '3', 10);
    if (STAGE !== 1 && STAGE !== 2 && STAGE !== 3) STAGE = 3;
    var STAGE_DONE = STAGE * 10;
    var STAGE_INFO = {
      1: { emoji: '🔥', title: tr('loading.stage1_title'), btn: tr('loading.continue_quiz'), href: '../../quiz/quiz-card/' },
      2: { emoji: '🚀', title: tr('loading.stage2_title'), btn: tr('loading.continue_quiz'), href: '../../quiz/quiz-card/' },
      3: { emoji: '🎉', title: tr('loading.ready'), btn: tr('quiz.see_result'), href: '../../results/match-reveal/' }
    }[STAGE];
    (function applyStage() {
      var set = function (id, v) { var el = document.getElementById(id); if (el) el.textContent = v; };
      set('qDone', STAGE_DONE);
      set('doneCount', STAGE_DONE);
      set('doneEmoji', STAGE_INFO.emoji);
      set('doneTitle', STAGE_INFO.title);
      var sub = document.getElementById('doneSub');
      if (sub) sub.innerHTML = tf('quiz.ready_sub', { n: '<b id="doneCount">' + STAGE_DONE + '</b>' });
      var b = document.getElementById('doneBtn');
      if (b) { b.textContent = STAGE_INFO.btn; b.setAttribute('href', STAGE_INFO.href); }
    })();

    /* ── Shared loading data ── */
    var PHASES       = window.BD_PHASES;
    var DNA_SCHEDULE = window.BD_DNA_SCHEDULE;
    var FUN_FACTS    = [
      tr('loading.ff.0'), tr('loading.ff.1'), tr('loading.ff.2'),
      tr('loading.ff.3'), tr('loading.ff.4'), tr('loading.ff.5')
    ];
    /* discipline code → translated DNA-bar name */
    var DNA_NAME_KEY = { kt:'loading.dna.engineering', yt:'loading.dna.health', nv:'loading.dna.humanities', nn:'loading.dna.agriculture', xh:'loading.dna.social', tn:'loading.dna.natural' };
    var DURATION = 17;

    /* DNA rows */
    var rows = document.getElementById('dnaRows');
    DNA_SCHEDULE.forEach(function (d) {
      var el = document.createElement('div');
      el.className = 'dna-row acc-' + d.disc;
      el.innerHTML =
        '<div class="ico">' + d.ico + '</div>' +
        '<div class="name">' + (DNA_NAME_KEY[d.disc] ? tr(DNA_NAME_KEY[d.disc]) : d.name) + '</div>' +
        '<div class="bar"><span class="dc-pfill" id="dna-' + d.disc + '" style="width:0%"></span></div>' +
        '<div class="pct" id="dnap-' + d.disc + '">0%</div>';
      rows.appendChild(el);
    });
    /* initial fun fact in the active language */
    var _ft = document.getElementById('factText'); if (_ft) _ft.textContent = FUN_FACTS[0];

    /* Fact dots */
    var dots = document.getElementById('factDots');
    FUN_FACTS.forEach(function (_, i) {
      var s = document.createElement('i'); if (i === 0) s.className = 'on'; dots.appendChild(s);
    });
    var curFact = 0;
    setInterval(function () {
      curFact = (curFact + 1) % FUN_FACTS.length;
      document.getElementById('factText').textContent = FUN_FACTS[curFact];
      Array.prototype.forEach.call(dots.children, function (d, i) { d.className = i === curFact ? 'on' : ''; });
    }, 3400);

    /* Pulse the YOU ring when data flows into the main character */
    function pulseYouRing() {
      var ring = document.getElementById('youPulseRing');
      if (!ring) return;
      ring.classList.remove('pulsing'); void ring.offsetWidth; ring.classList.add('pulsing');
    }

    /* Main loop */
    var t0 = Date.now();
    var dnaFired = {};
    var iv = setInterval(function () {
      var t = (Date.now() - t0) / 1000;
      var pr = Math.min(t / DURATION, 1);
      document.getElementById('mainBar').style.width = (pr * 100) + '%';
      document.getElementById('timeLeft').textContent = tf('loading.countdown', { n: Math.max(0, Math.ceil(DURATION - t)) });
      var ph = Math.min(Math.floor(pr * PHASES.length), PHASES.length - 1);
      document.getElementById('phaseLabel').textContent = tr(PHASES[ph].i18nLabel);
      document.getElementById('phaseTitle').textContent = tr(PHASES[ph].i18nTitle);
      DNA_SCHEDULE.forEach(function (d) {
        if (t > d.start) {
          if (!dnaFired[d.disc]) { dnaFired[d.disc] = true; pulseYouRing(); }
          var p = Math.min((t - d.start) / 4, 1) * d.target;
          document.getElementById('dna-' + d.disc).style.width = p + '%';
          document.getElementById('dnap-' + d.disc).textContent = Math.round(p) + '%';
        }
      });
      if (pr >= 1) {
        clearInterval(iv);
        setTimeout(function () { document.getElementById('doneOverlay').classList.add('show'); }, 500);
      }
    }, 120);
  </script>

  <!-- ── Main Character canvas animation (ported from mobile) ── -->
  <script>
  (function () {
    var YOU_WORDS = { en:'YOU', vi:'BẠN', hi:'आप', fr:'TOI', ar:'أنت' };
    function getYouWord() {
      var lang; try { lang = localStorage.getItem('bd-lang') || 'en'; } catch (e) { lang = 'en'; }
      return YOU_WORDS[lang] || 'YOU';
    }

    var COLORS       = ['#8b5cf6','#06d6a0','#60a5fa','#fbbf24','#c084fc','#22d3ee'];
    var COLORS_LIGHT = ['#7c3aed','#059669','#2563eb','#d97706','#db2777','#0891b2'];
    var ICONS        = ['💻','⚕️','📖','🌱','🌍','🔬'];

    var TGT_A = COLORS.map(function (_, i) { return (i * 60 - 90) * Math.PI / 180; });
    var ez  = function (p) { return p < .5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2; };
    var eo3 = function (p) { return 1 - Math.pow(1 - p, 3); };
    var clp = function (v, a, b) { return Math.max(a, Math.min(b, v)); };
    var rng = function (t, a, b) { return clp((t - a) / (b - a), 0, 1); };
    var mix = function (a, b, t) { return a + (b - a) * t; };

    var tokens = COLORS.map(function (color) {
      return {
        color: color,
        chaos0: Math.random() * Math.PI * 2,
        cDist:  22 + Math.random() * 32,
        cSpeed: (0.45 + Math.random() * 0.55) * (Math.random() < .5 ? 1 : -1)
      };
    });

    var cvs = document.getElementById('mcCanvas');
    if (!cvs) return;
    var ctx = cvs.getContext('2d');
    var W = 160, H = 160, cx = W / 2, cy = H / 2, ORBIT_R = 46, CYCLE = 6000;
    ctx.scale(2, 2);
    var t0 = null;

    function frame(now) {
      if (!t0) t0 = now;
      var abs = (now - t0) / 1000;
      var cyc = (now - t0) % CYCLE;
      ctx.clearRect(0, 0, W, H);

      var settleP   = ez(rng(cyc, CYCLE * .15, CYCLE * .42));
      var convergeP = eo3(rng(cyc, CYCLE * .42, CYCLE * .57));
      var youP      = eo3(rng(cyc, CYCLE * .57, CYCLE * .76));
      var youFadeP  = rng(cyc, CYCLE * .76, CYCLE * .85);
      var scatterP  = eo3(rng(cyc, CYCLE * .83, CYCLE * .95));
      var dimP      = rng(cyc, CYCLE * .95, CYCLE);

      var isLight = document.documentElement.getAttribute('data-theme') === 'light';

      tokens.forEach(function (tk, i) {
        var chaosA   = tk.chaos0 + tk.cSpeed * abs;
        var settledA = TGT_A[i];
        var da = settledA - chaosA;
        da = ((da + Math.PI * 3) % (Math.PI * 2)) - Math.PI;
        var displayA = scatterP > 0 ? mix(settledA, chaosA, scatterP) : mix(chaosA, chaosA + da, settleP);
        var displayDist = scatterP > 0
          ? mix(0, tk.cDist, scatterP)
          : mix(mix(tk.cDist, ORBIT_R, settleP), 0, convergeP);
        var x = cx + displayDist * Math.cos(displayA);
        var y = cy + displayDist * Math.sin(displayA);
        var alpha = (scatterP > 0 ? scatterP : (1 - convergeP)) * (1 - dimP * .6);
        var col = isLight ? COLORS_LIGHT[i] : COLORS[i];

        ctx.save();
        ctx.globalAlpha = Math.max(0, alpha) * (isLight ? 0.15 : 0.22);
        var glow = ctx.createRadialGradient(x, y, 5, x, y, 26);
        glow.addColorStop(0, col);
        glow.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = glow;
        ctx.beginPath(); ctx.arc(x, y, 26, 0, Math.PI * 2); ctx.fill();

        ctx.globalAlpha = Math.max(0, alpha) * (isLight ? 0.92 : 0.88);
        ctx.fillStyle = isLight ? 'rgba(255,255,255,0.95)' : 'rgba(12,10,30,0.90)';
        ctx.beginPath(); ctx.arc(x, y, 17, 0, Math.PI * 2); ctx.fill();

        ctx.globalAlpha = Math.max(0, alpha) * (isLight ? 0.55 : 0.75);
        ctx.strokeStyle = col;
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(x, y, 17, 0, Math.PI * 2); ctx.stroke();

        ctx.globalAlpha = Math.max(0, alpha);
        ctx.font = '14px sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(ICONS[i], x, y + 1);
        ctx.restore();
      });

      // Dashed orbit ring
      if (settleP > .15 && convergeP < .8) {
        ctx.save();
        ctx.strokeStyle = 'rgba(167,139,250,' + (Math.min(settleP, 1 - convergeP) * .22) + ')';
        ctx.lineWidth = .5; ctx.setLineDash([3, 6]);
        ctx.beginPath(); ctx.arc(cx, cy, ORBIT_R, 0, Math.PI * 2); ctx.stroke();
        ctx.restore();
      }

      // YOU phase — glowing sphere orb
      var ya = eo3(youP) * Math.max(0, 1 - youFadeP);
      if (ya > .01) {
        var rr = eo3(youP);
        var R  = 38 * rr;
        ctx.save();
        ctx.globalAlpha = ya;

        if (isLight) {
          var haloL = ctx.createRadialGradient(cx, cy, R * .6, cx, cy, R * 1.6);
          haloL.addColorStop(0, 'rgba(205,164,255,' + (.19 * ya) + ')');
          haloL.addColorStop(1, 'rgba(124,58,237,0)');
          ctx.fillStyle = haloL;
          ctx.beginPath(); ctx.arc(cx, cy, R * 1.6, 0, Math.PI * 2); ctx.fill();

          var sphereL = ctx.createRadialGradient(cx - R * .28, cy - R * .28, 0, cx, cy, R);
          sphereL.addColorStop(0,    'rgba(220,210,255,' + (.97 * ya) + ')');
          sphereL.addColorStop(0.38, 'rgba(205,164,255,' + (.85 * ya) + ')');
          sphereL.addColorStop(1,    'rgba(30,10,80,'    + (.70 * ya) + ')');
          ctx.fillStyle = sphereL;
          ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.fill();
        } else {
          var haloD = ctx.createRadialGradient(cx, cy, R * .6, cx, cy, R * 1.7);
          haloD.addColorStop(0, 'rgba(139,92,246,' + (.26 * ya) + ')');
          haloD.addColorStop(1, 'rgba(139,92,246,0)');
          ctx.fillStyle = haloD;
          ctx.beginPath(); ctx.arc(cx, cy, R * 1.7, 0, Math.PI * 2); ctx.fill();

          var sphereD = ctx.createRadialGradient(cx - R * .28, cy - R * .28, 0, cx, cy, R);
          sphereD.addColorStop(0,    'rgba(220,210,255,' + (.97 * ya) + ')');
          sphereD.addColorStop(0.38, 'rgba(124,58,237,'  + (.88 * ya) + ')');
          sphereD.addColorStop(1,    'rgba(20,5,50,'     + (.75 * ya) + ')');
          ctx.fillStyle = sphereD;
          ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.fill();
        }

        var spec = ctx.createRadialGradient(cx - R * .52, cy - R * .50, 0, cx - R * .35, cy - R * .35, R * .55);
        spec.addColorStop(0, 'rgba(255,255,255,' + (.42 * ya) + ')');
        spec.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = spec;
        ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.fill();

        ctx.shadowColor = 'rgba(0,0,0,0.85)';
        ctx.shadowBlur  = 8;
        ctx.fillStyle   = '#ffffff';
        ctx.font = "800 " + Math.round(15 * rr + 4) + "px 'Plus Jakarta Sans','Inter',sans-serif";
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(getYouWord(), cx, cy);
        ctx.restore();
      }

      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  })();
  </script>
</body>
</html>
