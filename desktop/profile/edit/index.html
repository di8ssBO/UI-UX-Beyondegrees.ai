<!DOCTYPE html>
<html lang="en">
<head>
<!-- anti-fouc -->
<script>document.documentElement.setAttribute("data-theme",(localStorage.getItem("bd-theme")||"light"));</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Profile — BeyonDegrees.ai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_shell/desktop.css?v=4">
<style>
  .pe-head { display: flex; align-items: center; gap: 20px; padding: 30px 32px; }
  .profile-card { display: flex; align-items: center; gap: 28px; padding: 28px 32px; }
  .avatar-editor { display: flex; flex-direction: column; align-items: center; gap: 12px; flex: none; }
  .profile-avatar-preview {
    width: 112px; height: 112px; border-radius: 28px;
    display: grid; place-items: center; overflow: hidden;
    color: #fff; font-size: 48px;
    background:
      radial-gradient(circle at 32% 24%, rgba(255,255,255,0.34), transparent 30%),
      linear-gradient(135deg, var(--violet-600), var(--violet-400));
    border: 1px solid rgba(255,255,255,0.18);
    box-shadow: 0 14px 34px rgba(124,58,237,0.32), inset 0 1px 0 rgba(255,255,255,0.25);
    background-position: center;
    background-size: cover;
  }
  .profile-avatar-preview.has-image .avatar-emoji { opacity: 0; }
  :root[data-theme="light"] .profile-avatar-preview {
    background:
      radial-gradient(circle at 32% 24%, rgba(255,255,255,0.44), transparent 30%),
      linear-gradient(135deg, #e8917a, #c96b55);
    border-color: rgba(232,224,213,0.78);
    box-shadow: 0 14px 32px rgba(201,107,85,0.22), inset 0 1px 0 rgba(255,255,255,0.60);
  }
  .avatar-upload-label {
    display: inline-flex; align-items: center; justify-content: center;
    min-height: 36px; padding: 9px 14px; border-radius: 999px;
    font-size: 12px; font-weight: 800; color: var(--text-primary);
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    cursor: pointer; transition: background .15s, border-color .15s, transform .15s;
  }
  .avatar-upload-label:hover { background: rgba(124,58,237,0.14); border-color: rgba(124,58,237,0.28); transform: translateY(-1px); }
  :root[data-theme="light"] .avatar-upload-label { background: rgba(255,255,255,0.86); border-color: #e8e0d5; color: #5c4535; }
  :root[data-theme="light"] .avatar-upload-label:hover { background: rgba(201,107,85,0.12); border-color: rgba(201,107,85,0.28); }
  .profile-card-body { flex: 1; min-width: 0; }
  .profile-card-body .field { max-width: 460px; margin-top: 16px; }
  .profile-card-body .input { font-size: 16px; font-weight: 700; }
  .arch { font-size: 13px; color: var(--text-secondary); font-weight: 600; }
  .arch a { color: var(--violet-400); font-weight: 800; }
  :root[data-theme="light"] .arch a { color: #a84e30; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .field label { display: block; font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 7px; }
  :root[data-theme="light"] .field label { color: #a84e30; }
  .field .note { font-size: 11px; color: var(--text-muted); margin-top: 5px; }
  .field.full { grid-column: 1 / -1; }
  /* Segmented (mobile "I want to study") */
  .seg { display: flex; gap: 8px; }
  .seg button {
    flex: 1; padding: 11px; border-radius: 12px; font-size: 13px; font-weight: 700;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); color: var(--text-secondary);
    transition: all .15s;
  }
  .seg button.on {
    background: linear-gradient(135deg, var(--violet-600), var(--violet-500));
    border-color: transparent; color: #fff; box-shadow: 0 4px 14px rgba(124,58,237,0.35);
  }
  :root[data-theme="light"] .seg button { background: rgba(255,255,255,0.85); border-color: #e8e0d5; color: #5c4535; }
  :root[data-theme="light"] .seg button.on { background: linear-gradient(135deg, #e8917a, #c96b55); box-shadow: 0 4px 14px rgba(201,107,85,0.35); }
  .check-row { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; color: var(--text-secondary); }
  .check-row input { width: 17px; height: 17px; accent-color: #7c3aed; }
  :root[data-theme="light"] .check-row input { accent-color: #c96b55; }
  .danger-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .btn-danger { color: var(--red-400); border: 1px solid rgba(255,71,87,0.40); background: rgba(255,71,87,0.07); }
  .btn-danger:hover { background: rgba(255,71,87,0.15); }
  /* Reset modal (mobile parity) */
  .modal { position: fixed; inset: 0; z-index: 200; display: none; align-items: center; justify-content: center;
    background: rgba(6,6,15,0.72); backdrop-filter: blur(10px); }
  :root[data-theme="light"] .modal { background: rgba(245,237,224,0.82); }
  .modal.show { display: flex; }
  .modal .box { max-width: 420px; text-align: center; padding: 36px; animation: fadeUp .4s var(--ease-out) both; }
  .modal h3 { font-size: 20px; font-weight: 900; color: var(--text-primary); }
  .modal p { font-size: 14px; color: var(--text-secondary); line-height: 1.65; margin-top: 10px; }
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); padding: 12px 22px; border-radius: 999px;
    background: var(--mint-500); color: #06281e; font-weight: 800; font-size: 14px;
    box-shadow: 0 8px 24px rgba(6,214,160,0.40); transition: transform .35s cubic-bezier(.2,1.4,.4,1); z-index: 999; }
  :root[data-theme="light"] .toast { background: #4a9e7a; color: #fff; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  @media (max-width: 760px) {
    .profile-card { align-items: flex-start; flex-direction: column; }
    .avatar-editor { align-items: flex-start; }
  }
</style>
</head>
<body class="app" data-page="profile" data-crumb="Profile · Edit Profile">
  <div class="main">
    <div class="content fade-in" style="max-width: 820px;">
      <h1 class="page-title" data-i18n="edit.title">Edit Profile</h1>

      <div class="card profile-card mt-6">
        <div class="avatar-editor">
          <div class="profile-avatar-preview" id="avatarPreview" role="img" aria-label="Profile avatar">
            <span class="avatar-emoji">&#128049;</span>
          </div>
          <label class="avatar-upload-label" for="avatarUpload">Upload image</label>
          <input id="avatarUpload" type="file" accept="image/*" hidden>
        </div>
        <div class="profile-card-body">
          <span class="section-label">Profile</span>
          <div class="field">
            <label for="fullNameInput">H&#7885; t&#234;n</label>
            <input class="input" id="fullNameInput" value="Your Name">
          </div>
        </div>
      </div>

      <div class="card glass-hero pe-head mt-6">
        <div class="arch"><span data-i18n="edit.archetype">Academic Archetype:</span> <a href="../../quiz/quiz-card/" data-i18n="edit.find_out">Find Out</a></div>
      </div>

      <div class="card mt-6">
        <div class="form-grid">
          <div class="field full"><label data-i18n="edit.email">Email</label>
            <input class="input" type="email" value="hoangphuc@beyondegrees.ai" disabled>
            <div class="note" data-i18n="edit.email_hint">Contact support to change the email.</div>
          </div>
          <div class="field full"><label data-i18n="edit.location">Location</label><input class="input" value="Ho Chi Minh City, Vietnam"></div>
          <div class="field full"><label data-i18n="edit.study">I want to study</label>
            <div class="seg" id="segStudy">
              <button class="on" data-i18n="edit.study.abroad">Abroad</button><button data-i18n="edit.study.in_country">In my country</button><button data-i18n="edit.study.either">Either</button>
            </div>
          </div>
          <div class="field full"><label data-i18n="edit.degree">I'm working toward a...</label>
            <div class="seg" id="segDegree">
              <button class="on" data-i18n="edit.degree.bachelor">Bachelor's Degree</button><button data-i18n="edit.degree.master">Master's Degree</button>
              <button data-i18n="edit.degree.phd">PhD / Doctorate</button><button data-i18n="edit.degree.associate">Associate's Degree</button>
            </div>
          </div>
          <div class="field full">
            <label class="check-row" style="display:flex;text-transform:none;letter-spacing:0;font-size:14px;">
              <input type="checkbox"> <span data-i18n="edit.already_know">I already know what I want to study</span>
            </label>
          </div>
        </div>
        <div class="flex mt-8" style="gap:12px;flex-wrap:wrap;">
          <button class="btn btn-primary" id="saveBtn" data-i18n="edit.save">Save Changes</button>
          <button class="btn btn-ghost" data-i18n="edit.leave_review">Leave Review</button>
        </div>
      </div>

      <div class="card mt-6">
        <span class="section-label" data-i18n="edit.danger_zone">Danger zone</span>
        <div class="danger-row mt-4">
          <button class="btn btn-danger" id="resetBtn" data-i18n="edit.reset">Reset Account</button>
          <button class="btn btn-ghost" data-i18n="edit.logout">Logout</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Reset modal (mobile parity) -->
  <div class="modal" id="resetModal">
    <div class="card box">
      <h3 data-i18n="edit.reset_title">Reset Account?</h3>
      <p data-i18n="edit.reset_body">This will clear <b>all quiz progress</b> and all your answers.<br>You'll start fresh from <b>Question 1</b>.</p>
      <div class="flex mt-6" style="gap:10px;justify-content:center;">
        <button class="btn btn-danger" id="resetConfirm" data-i18n="edit.reset_confirm">Reset &amp; Start Over</button>
        <button class="btn btn-ghost" id="resetCancel" data-i18n="edit.cancel">Cancel</button>
      </div>
    </div>
  </div>
  <div class="toast" id="toast" data-i18n="edit.toast_saved">✅ Profile saved!</div>

  <script src="../../../shared/scripts/ui/i18n.js?v=3"></script>
  <script src="../../_shell/desktop.js?v=12"></script>
  <script>
    ['segStudy', 'segDegree'].forEach(function (id) {
      var seg = document.getElementById(id);
      seg.addEventListener('click', function (e) {
        if (e.target.tagName !== 'BUTTON') return;
        seg.querySelectorAll('button').forEach(function (b) { b.classList.remove('on'); });
        e.target.classList.add('on');
      });
    });
    var avatarInput = document.getElementById('avatarUpload');
    var avatarPreview = document.getElementById('avatarPreview');
    var fullNameInput = document.getElementById('fullNameInput');
    function setAvatar(src) {
      if (!avatarPreview) return;
      if (src) {
        avatarPreview.style.backgroundImage = 'url("' + src + '")';
        avatarPreview.classList.add('has-image');
      } else {
        avatarPreview.style.backgroundImage = '';
        avatarPreview.classList.remove('has-image');
      }
    }
    try {
      var savedAvatar = localStorage.getItem('bd-profile-avatar') || '';
      var savedName = localStorage.getItem('bd-full-name') || localStorage.getItem('bd-username') || '';
      if (savedAvatar) setAvatar(savedAvatar);
      if (savedName && fullNameInput) fullNameInput.value = savedName;
    } catch (e) {}
    if (avatarInput) {
      avatarInput.addEventListener('change', function () {
        var file = avatarInput.files && avatarInput.files[0];
        if (!file || !file.type || file.type.indexOf('image/') !== 0) return;
        var reader = new FileReader();
        reader.onload = function () {
          var src = String(reader.result || '');
          setAvatar(src);
          try { localStorage.setItem('bd-profile-avatar', src); } catch (e) {}
        };
        reader.readAsDataURL(file);
      });
    }
    document.getElementById('saveBtn').onclick = function () {
      try {
        var fullName = fullNameInput ? fullNameInput.value.trim() : '';
        if (fullName) {
          localStorage.setItem('bd-full-name', fullName);
          localStorage.setItem('bd-username', fullName);
        }
      } catch (e) {}
      var t = document.getElementById('toast');
      t.classList.add('show'); setTimeout(function () { t.classList.remove('show'); }, 2200);
    };
    var modal = document.getElementById('resetModal');
    document.getElementById('resetBtn').onclick = function () { modal.classList.add('show'); };
    document.getElementById('resetCancel').onclick = function () { modal.classList.remove('show'); };
    document.getElementById('resetConfirm').onclick = function () {
      localStorage.removeItem('quizProgress');
      localStorage.removeItem('quizMilestone');
      localStorage.removeItem('quizCounts');
      localStorage.removeItem('quizAnswerLog');
      location.href = '../../onboarding/home/';
    };
  </script>
</body>
</html>
