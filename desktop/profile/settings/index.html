<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account Settings — BeyonDegrees.ai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../assets/desktop.css">
<style>
  .set-row { display: flex; align-items: center; gap: 16px; padding: 17px 4px; }
  .set-row .ic { width: 40px; height: 40px; border-radius: 11px; display: grid; place-items: center; font-size: 17px; flex: none;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10); }
  :root[data-theme="light"] .set-row .ic { background: #fdf8f2; border-color: #e8e0d5; }
  .set-row b { font-size: 14.5px; color: var(--text-primary); }
  .set-row .ctrl { margin-left: auto; }
  /* Theme/Language segmented (mobile sheet → desktop inline) */
  .seg { display: flex; gap: 8px; flex-wrap: wrap; }
  .seg button {
    padding: 9px 18px; border-radius: 999px; font-size: 13px; font-weight: 700;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); color: var(--text-secondary);
    transition: all .15s;
  }
  .seg button.on {
    background: linear-gradient(135deg, var(--violet-600), var(--violet-500));
    border-color: transparent; color: #fff; box-shadow: 0 4px 14px rgba(124,58,237,0.35);
  }
  :root[data-theme="light"] .seg button { background: rgba(255,255,255,0.85); border-color: #e8e0d5; color: #5c4535; }
  :root[data-theme="light"] .seg button.on { background: linear-gradient(135deg, #e8917a, #c96b55); box-shadow: 0 4px 14px rgba(201,107,85,0.35); }
  /* Switch */
  .switch { position: relative; width: 46px; height: 26px; border-radius: 13px; flex: none; cursor: pointer;
    background: rgba(255,255,255,0.10); border: 1px solid rgba(255,255,255,0.14); transition: background .2s; }
  :root[data-theme="light"] .switch { background: #e8e0d5; border-color: #d8ccbf; }
  .switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; border-radius: 50%;
    background: var(--text-muted); transition: all .2s; }
  :root[data-theme="light"] .switch::after { background: #fff; box-shadow: 0 1px 4px rgba(92,69,53,0.25); }
  .switch.on { background: linear-gradient(135deg, var(--violet-600), var(--violet-500)); border-color: transparent;
    box-shadow: 0 2px 10px rgba(124,58,237,0.35); }
  :root[data-theme="light"] .switch.on { background: linear-gradient(135deg, #e8917a, #c96b55); box-shadow: 0 2px 10px rgba(201,107,85,0.35); }
  .switch.on::after { left: 22px; background: #fff; }
  .btn-danger { color: var(--red-400); border: 1px solid rgba(255,71,87,0.40); background: rgba(255,71,87,0.07); }
  .btn-danger:hover { background: rgba(255,71,87,0.15); }
</style>
</head>
<body class="app" data-page="settings" data-crumb="Profile · Account Settings">
  <div class="main">
    <div class="content fade-in" style="max-width: 720px;">
      <h1 class="page-title" data-i18n="settings.title">Account Settings</h1>

      <div class="card mt-8">
        <div class="set-row row-line">
          <div class="ic">🌐</div><b data-i18n="settings.language">Language</b>
          <div class="ctrl seg" id="segLang">
            <button data-lang="en">🇺🇸 English</button>
            <button data-lang="vi">🇻🇳 Tiếng Việt</button>
            <button data-lang="hi">🇮🇳 हिन्दी</button>
            <button data-lang="fr">🇫🇷 Français</button>
            <button data-lang="ar">🇸🇦 العربية</button>
          </div>
        </div>
        <div class="set-row row-line">
          <div class="ic">🎨</div><b data-i18n="settings.theme">Theme</b>
          <div class="ctrl seg" id="segTheme">
            <button data-t="light" data-i18n="settings.theme.light">☀️ Light</button>
            <button data-t="dark" data-i18n="settings.theme.dark">🌙 Dark</button>
            <button data-t="system" data-i18n="settings.theme.system">🖥️ System</button>
          </div>
        </div>
        <div class="set-row">
          <div class="ic">🔔</div><b data-i18n="settings.notifications">Notifications</b>
          <div class="ctrl switch on" id="swNoti"></div>
        </div>
      </div>

      <div class="card mt-6">
        <span class="section-label" data-i18n="settings.account">Account</span>
        <div class="flex mt-4" style="gap:12px;flex-wrap:wrap;">
          <button class="btn btn-ghost" data-i18n="settings.log_out">Log Out</button>
          <button class="btn btn-danger" data-i18n="settings.delete_account">Delete Account</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../../../shared/scripts/i18n.js"></script>
  <script src="../../assets/desktop.js?v=3"></script>
  <script>
    /* Theme segmented — đồng bộ bd-theme với toàn app */
    var segTheme = document.getElementById('segTheme');
    function syncSeg() {
      var cur = localStorage.getItem('bd-theme') || 'light';
      segTheme.querySelectorAll('button').forEach(function (b) {
        b.classList.toggle('on', b.dataset.t === cur);
      });
    }
    segTheme.addEventListener('click', function (e) {
      var b = e.target.closest('button'); if (!b) return;
      var t = b.dataset.t;
      if (t === 'system') t = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', t);
      localStorage.setItem('bd-theme', t);
      var tg = document.querySelector('.theme-toggle');
      if (tg) tg.innerHTML = t === 'light' ? '🌙 Dark mode' : '☀️ Light mode';
      syncSeg();
    });
    syncSeg();
    new MutationObserver(syncSeg).observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

    /* Language segmented — đổi ngôn ngữ thật qua BDi18n (đồng bộ bd-lang với toàn app) */
    var segLang = document.getElementById('segLang');
    function syncSegLang() {
      /* Đọc trực tiếp localStorage — BDi18n.init() có thể chưa chạy xong tại
         thời điểm script này thực thi (cùng kiểu timing với buildNav() ở desktop.js) */
      var cur = localStorage.getItem('bd-lang') || 'en';
      segLang.querySelectorAll('button').forEach(function (b) {
        var isOn = b.dataset.lang === cur;
        b.classList.toggle('on', isOn);
        b.setAttribute('aria-pressed', isOn ? 'true' : 'false');
      });
    }
    segLang.addEventListener('click', function (e) {
      var b = e.target.closest('button'); if (!b) return;
      var lang = b.dataset.lang || 'en';
      var applied = false;
      try { localStorage.setItem('bd-lang', lang); } catch (err) {}
      try {
        if (window.BDi18n && typeof window.BDi18n.apply === 'function') {
          window.BDi18n.apply(lang);
          applied = true;
        }
      } catch (err) {}
      if (!applied) {
        document.documentElement.setAttribute('lang', lang);
        document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
        document.documentElement.setAttribute('data-lang', lang);
      }
      syncSegLang();
      setTimeout(function () { location.reload(); }, 50);
    });
    syncSegLang();
    document.getElementById('swNoti').onclick = function () { this.classList.toggle('on'); };
  </script>
</body>
</html>
