<!DOCTYPE html>
<html lang="en">
<head>
<!-- anti-fouc -->
<script>document.documentElement.setAttribute("data-theme",(localStorage.getItem("bd-theme")||"light"));</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0; url=../edit/">
<script>window.location.replace('../edit/');</script>
<title>Profile — BeyonDegrees.ai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_shell/desktop.css?v=4">
<style>
  .p-hero { display: flex; align-items: center; gap: 24px; padding: 40px; }
  .p-animal-avatar {
    width: 92px; height: 92px; border-radius: 50%;
    display: grid; place-items: center; font-size: 42px;
    background: linear-gradient(135deg, var(--violet-600), var(--violet-400));
    box-shadow: 0 8px 24px rgba(124,58,237,0.40), inset 0 2px 8px rgba(255,255,255,0.25);
  }
  :root[data-theme="light"] .p-animal-avatar {
    background: linear-gradient(135deg, #e8917a, #c96b55);
    box-shadow: 0 8px 24px rgba(201,107,85,0.35), inset 0 2px 8px rgba(255,255,255,0.30);
  }
  .p-hero .bio { font-size: 14px; color: var(--text-muted); margin-top: 10px; }
  /* Menu (mobile list) */
  .menu-item {
    display: flex; align-items: center; gap: 14px; padding: 17px 20px;
    font-size: 14.5px; font-weight: 700; color: var(--text-primary);
    transition: background .15s;
  }
  .menu-item:hover { background: rgba(124,58,237,0.08); }
  :root[data-theme="light"] .menu-item:hover { background: rgba(201,107,85,0.07); }
  .menu-item .ic { width: 40px; height: 40px; border-radius: 11px; display: grid; place-items: center; font-size: 17px; flex: none;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10); }
  :root[data-theme="light"] .menu-item .ic { background: #fdf8f2; border-color: #e8e0d5; }
  .menu-item .arrow { margin-left: auto; color: var(--text-muted); font-weight: 900; }
  .menu-card { padding: 6px; }
</style>
</head>
<body class="app" data-page="profile" data-crumb="Profile">
  <div class="main">
    <div class="content fade-in" style="max-width:760px;">

      <div class="card glass-hero p-hero">
        <div>
          <div class="p-animal-avatar" role="img" aria-label="Profile avatar">&#128049;</div>
          <div class="bio" data-i18n="profile.no_bio">No bio available</div>
        </div>
        <a class="btn btn-primary" style="margin-left:auto;" href="../../profile/edit/" data-i18n="profile.edit">Edit Profile</a>
      </div>

      <div class="card menu-card mt-6">
        <a class="menu-item row-line" href="#"><span class="ic">💎</span><span data-i18n="profile.subscription">Subscription</span><span class="arrow">›</span></a>
        <a class="menu-item row-line" href="../../profile/edit/"><span class="ic">✏️</span><span data-i18n="profile.edit">Edit Profile</span><span class="arrow">›</span></a>
        <a class="menu-item row-line" href="../../profile/settings/"><span class="ic">⚙️</span><span data-i18n="profile.settings">Account Settings</span><span class="arrow">›</span></a>
        <a class="menu-item row-line" href="#"><span class="ic">🔖</span><span data-i18n="profile.saved">Saved</span><span class="arrow">›</span></a>
        <a class="menu-item" href="#"><span class="ic">🐞</span><span data-i18n="profile.report_bug">Report a Bug</span><span class="arrow">›</span></a>
      </div>

    </div>
  </div>
  <script src="../../../shared/scripts/ui/i18n.js?v=3"></script>
  <script src="../../_shell/desktop.js?v=12"></script>
</body>
</html>
