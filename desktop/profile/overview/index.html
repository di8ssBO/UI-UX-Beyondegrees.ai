<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — BeyonDegrees.ai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../assets/desktop.css">
<style>
  .p-hero { display: flex; align-items: center; gap: 24px; padding: 40px; }
  .p-avatar { width: 92px; height: 92px; border-radius: 50%; display: grid; place-items: center;
    font-size: 30px; font-weight: 900; color: #fff; flex: none;
    background: linear-gradient(135deg, var(--violet-600), var(--violet-400));
    box-shadow: 0 8px 24px rgba(124,58,237,0.40), inset 0 2px 8px rgba(255,255,255,0.25); }
  :root[data-theme="light"] .p-avatar { background: linear-gradient(135deg, #e8917a, #c96b55); box-shadow: 0 8px 24px rgba(201,107,85,0.35), inset 0 2px 8px rgba(255,255,255,0.30); }
  .p-hero h1 { font-size: 26px; font-weight: 900; color: var(--text-primary); }
  .p-hero .bio { font-size: 14px; color: var(--text-muted); margin-top: 4px; }
  /* Menu (mobile list) */
  .menu-item {
    display: flex; align-items: center; gap: 14px; padding: 17px 20px;
    font-size: 14.5px; font-weight: 700; color: var(--text-primary);
    transition: background .15s;
  }
  .menu-item:hover { background: rgba(124,58,237,0.08); }
  :root[data-theme="light"] .menu-item:hover { background: rgba(201,107,85,0.07); }
  .menu-item .ic { width: 40px; height: 40px; border-radius: 11px; display: grid; place-items: center; font-size: 17px; flex: none;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10); }
  :root[data-theme="light"] .menu-item .ic { background: #fdf8f2; border-color: #e8e0d5; }
  .menu-item .arrow { margin-left: auto; color: var(--text-muted); font-weight: 900; }
  .menu-card { padding: 6px; }
</style>
</head>
<body class="app" data-page="profile" data-crumb="Profile">
  <div class="main">
    <div class="content fade-in" style="max-width:760px;">

      <div class="card glass-hero p-hero">
        <div class="p-avatar">HP</div>
        <div>
          <h1>Hoang Phuc</h1>
          <div class="bio">No bio available</div>
        </div>
        <a class="btn btn-primary" style="margin-left:auto;" href="../../profile/edit/">Edit Profile</a>
      </div>

      <div class="card menu-card mt-6">
        <a class="menu-item row-line" href="#"><span class="ic">💎</span>Subscription<span class="arrow">›</span></a>
        <a class="menu-item row-line" href="../../profile/edit/"><span class="ic">✏️</span>Edit Profile<span class="arrow">›</span></a>
        <a class="menu-item row-line" href="../../profile/settings/"><span class="ic">⚙️</span>Account Settings<span class="arrow">›</span></a>
        <a class="menu-item row-line" href="#"><span class="ic">🔖</span>Saved<span class="arrow">›</span></a>
        <a class="menu-item" href="#"><span class="ic">🐞</span>Report a Bug<span class="arrow">›</span></a>
      </div>

    </div>
  </div>
  <script src="../../../shared/scripts/i18n.js"></script>
  <script src="../../assets/desktop.js?v=3"></script>
</body>
</html>
