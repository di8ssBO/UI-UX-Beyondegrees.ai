<!DOCTYPE html>
<html lang="en">
<head>
<!-- anti-fouc -->
<script>document.documentElement.setAttribute("data-theme",(localStorage.getItem("bd-theme")||"light"));</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz &mdash; BeyonDegrees.ai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_shell/desktop.css?v=3">
<style>
  /* ── Quiz wrap ── */
  .quiz-wrap { max-width: 860px; margin: 0 auto; position: relative; z-index: 1; }

  /* ── Header ── */
  .quiz-header {
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
    margin-bottom: 12px;
  }
  .quiz-header .undo-btn { justify-self: start; }
  .quiz-header .counter-wrap { justify-self: center; text-align: center; }
  .undo-btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05);
    color: var(--text-muted); display: grid; place-items: center;
    backdrop-filter: blur(4px); transition: all .2s; font-size: 15px;
  }
  .undo-btn:hover { border-color: var(--violet-500); color: var(--violet-400); }
  :root[data-theme="light"] .undo-btn { background: #fdf8f2; border-color: #e8e0d5; }
  :root[data-theme="light"] .undo-btn:hover { border-color: #c96b55; color: #a84e30; }
  .counter-wrap { font-size: 14px; font-weight: 700; color: var(--text-secondary); }
  .counter-current { color: var(--violet-400); font-size: 18px; }
  :root[data-theme="light"] .counter-current { color: #a84e30; }

  /* ── Score chips ── */
  .score-row { display: flex; gap: 8px; justify-content: center; margin-top: 12px; }
  .score-chip {
    display: flex; align-items: center; gap: 5px; padding: 4px 12px;
    border-radius: 999px; font-size: 12px; font-weight: 700; backdrop-filter: blur(8px);
  }
  .score-chip.agree   { background: rgba(6,214,160,0.12);   color: var(--mint-500);  border: 1px solid rgba(6,214,160,0.25); }
  .score-chip.strong  { background: rgba(124,58,237,0.12);  color: var(--violet-400); border: 1px solid rgba(124,58,237,0.25); }
  .score-chip.neutral { background: rgba(107,107,154,0.12); color: #9d9dbf;          border: 1px solid rgba(107,107,154,0.2); }
  .score-chip.disagree{ background: rgba(255,71,87,0.12);   color: var(--red-400);   border: 1px solid rgba(255,71,87,0.25); }
  :root[data-theme="light"] .score-chip.agree   { color:#047857; background:rgba(5,150,105,0.10); border-color:rgba(5,150,105,0.25); }
  :root[data-theme="light"] .score-chip.strong  { color:#075c9f; background:rgba(2,116,190,0.08); border-color:rgba(2,116,190,0.25); }
  :root[data-theme="light"] .score-chip.neutral { color:#8c7260; background:#fdf8f2; border-color:#e8e0d5; }
  :root[data-theme="light"] .score-chip.disagree{ color:#be123c; background:rgba(225,29,72,0.08); border-color:rgba(225,29,72,0.22); }

  /* ── Card arena ── */
  .card-arena {
    position: relative; height: 540px; margin-top: 18px;
    display: flex; align-items: center; justify-content: center;
  }
  /* Direction hints — big gradient pills with a colored glow + pop-in */
  .dir-hint {
    position: absolute; z-index: 50; font-size: 19px; font-weight: 900;
    padding: 16px 34px; border-radius: 18px; letter-spacing: 1.5px;
    opacity: 0; pointer-events: none; text-transform: uppercase;
    color: #fff; border: none;
    text-shadow: 0 1px 4px rgba(0,0,0,0.22);
    transition: opacity .14s;
  }
  .hint-right {
    right: 0; top: 50%; transform: translateY(-50%);
    background: linear-gradient(135deg, #0ad99f, #06b083);
    box-shadow: 0 14px 38px rgba(6,214,160,0.5), inset 0 0 0 1px rgba(255,255,255,0.18);
  }
  .hint-left {
    left: 0; top: 50%; transform: translateY(-50%);
    background: linear-gradient(135deg, #ff8a94, #e23748);
    box-shadow: 0 14px 38px rgba(255,71,87,0.5), inset 0 0 0 1px rgba(255,255,255,0.18);
  }
  .hint-up {
    top: 12px; left: 50%; transform: translateX(-50%);
    background: linear-gradient(135deg, #a47bff, #7c3aed);
    box-shadow: 0 14px 38px rgba(124,58,237,0.5), inset 0 0 0 1px rgba(255,255,255,0.18);
  }
  .hint-down {
    bottom: 12px; left: 50%; transform: translateX(-50%);
    background: linear-gradient(135deg, #aeaecb, #6b6b9a);
    box-shadow: 0 14px 38px rgba(107,107,154,0.45), inset 0 0 0 1px rgba(255,255,255,0.18);
  }
  .dir-hint.visible { opacity: 1; }
  .hint-right.visible, .hint-left.visible { animation: hintPopY .3s cubic-bezier(0.34,1.56,0.64,1) both; }
  .hint-up.visible, .hint-down.visible    { animation: hintPopX .3s cubic-bezier(0.34,1.56,0.64,1) both; }
  @keyframes hintPopY {
    0%   { opacity: 0; transform: translateY(-50%) scale(.55); }
    60%  { opacity: 1; transform: translateY(-50%) scale(1.18); }
    100% { opacity: 1; transform: translateY(-50%) scale(1); }
  }
  @keyframes hintPopX {
    0%   { opacity: 0; transform: translateX(-50%) scale(.55); }
    60%  { opacity: 1; transform: translateX(-50%) scale(1.18); }
    100% { opacity: 1; transform: translateX(-50%) scale(1); }
  }

  /* ── Card stack ── */
  .card-stack { position: relative; width: 640px; height: 440px; }
  .q-card {
    position: absolute; inset: 0; border-radius: 24px;
    background: #2d1267;
    border: 1px solid rgba(255,255,255,0.10);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.07), 0 30px 80px rgba(24,99,220,0.5);
    transition: transform .35s cubic-bezier(0.34,1.2,0.64,1), opacity .35s, background .6s, box-shadow .6s;
    user-select: none;
  }
  .q-card.back-1 { transform: scale(.95) translateY(16px); opacity: .55; z-index: 1; }
  .q-card.back-2 { transform: scale(.90) translateY(32px); opacity: .30; z-index: 0; }
  .q-card.active-card { z-index: 2; cursor: grab; }
  .q-card.active-card:active { cursor: grabbing; }
  .q-card.fling { transition: transform .45s ease-in, opacity .45s ease-in; }
  .card-inner { position: relative; height: 100%; padding: 44px 48px; display: flex; flex-direction: column; }
  .card-placeholder { display: grid; place-items: center; height: 100%; color: rgba(255,255,255,0.2); font-size: 13px; letter-spacing: 4px; }
  .q-text {
    flex: 1; display: flex; align-items: center;
    font-size: 31px; font-weight: 800; letter-spacing: -0.3px; line-height: 1.45;
    color: rgba(255,255,255,0.96);
  }

  /* Swipe hint: visible Q1 only, fades out after */
  .swipe-hint {
    display: flex; align-items: center; justify-content: center; gap: 14px;
    font-size: 12px; color: rgba(255,255,255,0.40); font-weight: 600;
    transition: opacity 0.5s ease;
  }
  .swipe-hint.hidden { opacity: 0; pointer-events: none; }
  .swipe-hint .hint-arrows { font-weight: 900; letter-spacing: 2px; }

  /* Swipe-guide arrow: flies out in the demoed direction */
  .guide-arrow {
    position: absolute; top: 50%; left: 50%;
    pointer-events: none; z-index: 60; opacity: 0;
    transform: translate(-50%, -50%);
  }
  .guide-arrow-svg { width: 184px; height: auto; display: block; }
  /* Moderate-speed glide: pops in at center, then slides smoothly away (comet trail) */
  .guide-arrow.fly { animation: guideArrowFly 0.9s cubic-bezier(0.22,0.61,0.36,1) both; }
  @keyframes guideArrowFly {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.45); }
    22%  { opacity: 1; transform: translate(-50%, -50%) scale(1.18); }
    100% { opacity: 0; transform: translate(calc(-50% + var(--ax, 0px)), calc(-50% + var(--ay, 0px))) scale(1.06); }
  }

  /* Light mode card */
  :root[data-theme="light"] .q-card .q-text { color: #2c1f14; }
  :root[data-theme="light"] .q-card .swipe-hint { color: rgba(44,31,20,0.45); }
  :root[data-theme="light"] .q-card .card-placeholder { color: rgba(44,31,20,0.25); }

  /* ── Discipline Color Field ── */
  /* Sits inside .content as position:absolute so it stays within the main area */
  .content { position: relative; }
  #colorField {
    position: absolute; inset: -40px -80px;
    z-index: 0; pointer-events: none;
    opacity: 0;
    transition: opacity 1.8s ease, background 1.5s ease;
    border-radius: 0;
  }
  #colorField.disc-active { opacity: 1; }

  /* ═══════════════════════════════════════════════════
     MILESTONE — Planet Burst (ported from mobile)
     Full-screen takeover shown every 10 questions.
     ═══════════════════════════════════════════════════ */
  .milestone-overlay {
    position: fixed; inset: 0; z-index: 300;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    /* Lift the centered content clear of the moon/astronaut scene at the bottom */
    padding-bottom: 210px;
    pointer-events: none; opacity: 0;
    transition: opacity 0.4s ease;
  }
  :root[data-theme="light"] .milestone-overlay { padding-bottom: 0; }
  .milestone-overlay.visible { pointer-events: auto; opacity: 1; }
  .milestone-overlay .ms-legacy { display: none; }

  /* Space background */
  .ms-po-bg { position: absolute; inset: 0; background: #08031b; opacity: 0; transition: opacity 0.35s ease; pointer-events: none; }
  .milestone-overlay.visible .ms-po-bg { opacity: 0.97; }

  /* Aurora glow */
  .ms-po-aurora {
    position: absolute; top: 44%; left: 50%; transform: translate(-50%,-50%);
    width: 460px; height: 460px; border-radius: 50%;
    background: radial-gradient(ellipse at center,rgba(124,58,237,.28) 0%,rgba(6,214,160,.12) 45%,transparent 70%);
    pointer-events: none; opacity: 0; transition: opacity 0.6s ease 0.15s;
  }
  .milestone-overlay.visible .ms-po-aurora { opacity: 1; animation: msPlanetAurora 3.5s ease-in-out infinite; }
  @keyframes msPlanetAurora {
    0%,100%{ transform: translate(-50%,-50%) scale(1); opacity:.85; }
    50%    { transform: translate(-50%,-50%) scale(1.18); opacity:1; }
  }

  /* Stars */
  .ms-po-stars { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
  @keyframes msStarTwinkle { 0%,100%{opacity:.15} 50%{opacity:1} }

  /* Planet system */
  .ms-po-system {
    position: relative; width: 240px; height: 240px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    opacity: 0; transform: scale(0.2) rotate(-15deg);
  }
  @keyframes msSysIn {
    0%  { opacity:0; transform: scale(0.15) rotate(-20deg); }
    55% { opacity:1; transform: scale(1.1) rotate(5deg); }
    75% { transform: scale(0.95) rotate(-1.5deg); }
    90% { transform: scale(1.02) rotate(0.5deg); }
    100%{ opacity:1; transform: scale(1) rotate(0deg); }
  }

  /* Shockwaves */
  .ms-shockwave { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0); border-radius: 50%; border: 2.5px solid; opacity: 0; pointer-events: none; }
  .ms-sw1 { width: 90px; height: 90px; border-color: rgba(167,139,250,.95); }
  .ms-sw2 { width: 90px; height: 90px; border-color: rgba(6,214,160,.8); }
  .ms-sw3 { width: 60px; height: 60px; border-color: rgba(248,250,252,.5); }
  @keyframes msShockOut {
    0%  { transform: translate(-50%,-50%) scale(0); opacity:.95; }
    65% { opacity:.5; }
    100%{ transform: translate(-50%,-50%) scale(4); opacity:0; }
  }

  /* Orb rings */
  .ms-po-ring { position: absolute; border-radius: 50%; }
  .ms-ring-outer {
    width: 160px; height: 160px; border: 1.5px solid transparent;
    border-top-color: rgba(124,58,237,.65); border-right-color: rgba(124,58,237,.2);
    border-bottom-color: rgba(124,58,237,.4); border-left-color: rgba(124,58,237,.1);
    animation: msRspinCW 5.5s linear infinite; filter: drop-shadow(0 0 8px rgba(124,58,237,.45));
  }
  .ms-ring-mid {
    width: 128px; height: 128px; border: 1px solid transparent;
    border-top-color: rgba(6,214,160,.6); border-right-color: rgba(6,214,160,.15);
    border-bottom-color: rgba(6,214,160,.35); border-left-color: rgba(6,214,160,.08);
    animation: msRspinCCW 3.8s linear infinite; filter: drop-shadow(0 0 6px rgba(6,214,160,.35));
  }
  @keyframes msRspinCW  { to{ transform: rotate(360deg);  } }
  @keyframes msRspinCCW { to{ transform: rotate(-360deg); } }

  /* Core orb */
  .ms-po-orb {
    width: 92px; height: 92px; border-radius: 50%;
    background: radial-gradient(circle at 38% 35%,rgba(220,210,255,.98) 0%,rgba(124,58,237,.92) 38%,rgba(20,5,50,.8) 100%);
    box-shadow: 0 0 0 1.5px rgba(167,139,250,.3),0 0 32px rgba(124,58,237,.9),0 0 80px rgba(124,58,237,.5),inset 0 1px 0 rgba(255,255,255,.4);
    display: flex; align-items: center; justify-content: center;
    position: relative; z-index: 3; animation: msOrbGlow 2.2s ease-in-out infinite;
  }
  @keyframes msOrbGlow {
    0%,100%{ box-shadow:0 0 0 1.5px rgba(167,139,250,.3),0 0 32px rgba(124,58,237,.9),0 0 80px rgba(124,58,237,.5),inset 0 1px 0 rgba(255,255,255,.4); transform: scale(1); }
    50%    { box-shadow:0 0 0 1.5px rgba(167,139,250,.5),0 0 52px rgba(124,58,237,1),0 0 120px rgba(124,58,237,.65),inset 0 1px 0 rgba(255,255,255,.45); transform: scale(1.07); }
  }
  .ms-po-orb-emoji { font-size: 38px; line-height: 1; }

  /* Burst particles */
  .ms-bp-anchor { position: absolute; top: 50%; left: 50%; width: 0; height: 0; }
  .ms-bp { position: absolute; width: 13px; height: 13px; border-radius: 50%; transform: translate(-50%,-50%); opacity: 0; pointer-events: none; }
  @keyframes msBpFly0 { 0%{opacity:0;transform:translate(-50%,-50%) scale(0)} 25%{opacity:1;transform:translate(-50%,-50%) translateY(-100px) scale(1.5)} 70%{opacity:.7;transform:translate(-50%,-50%) translateY(-88px) scale(1)} 100%{opacity:0;transform:translate(-50%,-50%) translateY(-96px) scale(.7)} }
  @keyframes msBpFly1 { 0%{opacity:0;transform:translate(-50%,-50%) scale(0)} 25%{opacity:1;transform:translate(-50%,-50%) translate(86px,-50px) scale(1.5)} 70%{opacity:.7;transform:translate(-50%,-50%) translate(76px,-44px) scale(1)} 100%{opacity:0;transform:translate(-50%,-50%) translate(82px,-48px) scale(.7)} }
  @keyframes msBpFly2 { 0%{opacity:0;transform:translate(-50%,-50%) scale(0)} 25%{opacity:1;transform:translate(-50%,-50%) translate(86px,50px) scale(1.5)} 70%{opacity:.7;transform:translate(-50%,-50%) translate(76px,44px) scale(1)} 100%{opacity:0;transform:translate(-50%,-50%) translate(82px,48px) scale(.7)} }
  @keyframes msBpFly3 { 0%{opacity:0;transform:translate(-50%,-50%) scale(0)} 25%{opacity:1;transform:translate(-50%,-50%) translateY(100px) scale(1.5)} 70%{opacity:.7;transform:translate(-50%,-50%) translateY(88px) scale(1)} 100%{opacity:0;transform:translate(-50%,-50%) translateY(96px) scale(.7)} }
  @keyframes msBpFly4 { 0%{opacity:0;transform:translate(-50%,-50%) scale(0)} 25%{opacity:1;transform:translate(-50%,-50%) translate(-86px,50px) scale(1.5)} 70%{opacity:.7;transform:translate(-50%,-50%) translate(-76px,44px) scale(1)} 100%{opacity:0;transform:translate(-50%,-50%) translate(-82px,48px) scale(.7)} }
  @keyframes msBpFly5 { 0%{opacity:0;transform:translate(-50%,-50%) scale(0)} 25%{opacity:1;transform:translate(-50%,-50%) translate(-86px,-50px) scale(1.5)} 70%{opacity:.7;transform:translate(-50%,-50%) translate(-76px,-44px) scale(1)} 100%{opacity:0;transform:translate(-50%,-50%) translate(-82px,-48px) scale(.7)} }

  /* Orbit particles */
  .ms-po-orbit { position: absolute; border-radius: 50%; display: flex; align-items: flex-start; justify-content: center; top: 50%; left: 50%; opacity: 0; transition: opacity 0.4s ease; }
  .ms-o1{width:128px;height:128px;margin:-64px 0 0 -64px;animation:msRspinCW 5.8s linear infinite;}
  .ms-o2{width:150px;height:150px;margin:-75px 0 0 -75px;animation:msRspinCCW 8.2s linear infinite;}
  .ms-o3{width:114px;height:114px;margin:-57px 0 0 -57px;animation:msRspinCW 4.9s linear infinite;}
  .ms-o4{width:140px;height:140px;margin:-70px 0 0 -70px;animation:msRspinCCW 9.4s linear infinite;}
  .ms-o5{width:108px;height:108px;margin:-54px 0 0 -54px;animation:msRspinCW 7.1s linear infinite;}
  .ms-o6{width:156px;height:156px;margin:-78px 0 0 -78px;animation:msRspinCCW 11.5s linear infinite;}
  .ms-po-particle{width:11px;height:11px;border-radius:50%;margin-top:-5.5px;}
  .ms-pp-kt{background:rgba(139,92,246,.95);box-shadow:0 0 12px rgba(139,92,246,.95),0 0 28px rgba(139,92,246,.55);}
  .ms-pp-yt{background:rgba(6,214,160,.95); box-shadow:0 0 12px rgba(6,214,160,.95), 0 0 28px rgba(6,214,160,.55);}
  .ms-pp-nv{background:rgba(59,130,246,.95);box-shadow:0 0 12px rgba(59,130,246,.95),0 0 28px rgba(59,130,246,.55);}
  .ms-pp-nn{background:rgba(245,158,11,.95);box-shadow:0 0 12px rgba(245,158,11,.95),0 0 28px rgba(245,158,11,.55);}
  .ms-pp-xh{background:rgba(168,85,247,.95); box-shadow:0 0 12px rgba(168,85,247,.95),0 0 28px rgba(168,85,247,.55);}
  .ms-pp-tn{background:rgba(244,63,94,.95);  box-shadow:0 0 12px rgba(244,63,94,.95), 0 0 28px rgba(244,63,94,.55);}

  /* Orbit discipline labels — counter-rotate to stay upright */
  .ms-orb-label {
    position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
    font-size: 12px; font-weight: 700; white-space: nowrap; color: rgba(255,255,255,.75);
    background: rgba(15,5,40,.55); backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,.12);
    padding: 2px 5px; border-radius: 999px; pointer-events: none; letter-spacing: .3px;
    opacity: 0; transition: opacity .4s ease .8s;
  }
  .milestone-overlay.visible .ms-orb-label { opacity: 1; }
  @keyframes msLabelCCW { from{ transform: translateX(-50%) rotate(0deg); } to{ transform: translateX(-50%) rotate(-360deg); } }
  @keyframes msLabelCW  { from{ transform: translateX(-50%) rotate(0deg); } to{ transform: translateX(-50%) rotate(360deg);  } }
  .ms-o1 .ms-orb-label { animation: msLabelCCW  5.8s linear infinite; }
  .ms-o2 .ms-orb-label { animation: msLabelCW   8.2s linear infinite; }
  .ms-o3 .ms-orb-label { animation: msLabelCCW  4.9s linear infinite; }
  .ms-o4 .ms-orb-label { animation: msLabelCW   9.4s linear infinite; }
  .ms-o5 .ms-orb-label { animation: msLabelCCW  7.1s linear infinite; }
  .ms-o6 .ms-orb-label { animation: msLabelCW  11.5s linear infinite; }

  /* Milestone text */
  .ms-po-text { position: relative; z-index: 10; text-align: center; margin-top: 30px; display: flex; flex-direction: column; align-items: center; padding: 0 24px; }
  .ms-po-badge { font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 800; color: rgba(6,214,160,.9); margin-bottom: 16px; opacity: 0; transform: translateY(8px); }
  .ms-po-big-emoji { font-size: 64px; line-height: 1; margin-bottom: 16px; opacity: 0; transform: scale(.3) rotate(-20deg); filter: drop-shadow(0 0 28px rgba(255,200,60,.6)); }
  .ms-po-title {
    font-size: 32px; font-weight: 800; line-height: 1.15;
    background: linear-gradient(135deg,#e9d5ff 0%,#06d6a0 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 12px; opacity: 0; transform: scale(.8) translateY(14px);
  }
  .ms-po-sub { font-size: 17px; font-weight: 500; color: rgba(255,255,255,.8); line-height: 1.5; opacity: 0; transform: translateY(10px); margin-bottom: 4px; }
  .ms-po-xp { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%; max-width: 300px; margin-top: 28px; opacity: 0; transform: translateY(18px) scale(.88); }
  .ms-po-progress-wrap { display: flex; align-items: center; width: 100%; padding: 0 4px; }
  .ms-po-progress-track { flex: 1; height: 7px; border-radius: 999px; background: rgba(167,139,250,.2); overflow: hidden; box-shadow: inset 0 1px 3px rgba(0,0,0,.3); }
  .ms-po-progress-fill { height: 100%; border-radius: 999px; width: 0; background: linear-gradient(90deg,#7C3AED,#06d6a0); transition: width .8s cubic-bezier(.34,1.2,.64,1); box-shadow: 0 0 10px rgba(124,58,237,.5); }
  .ms-po-hint { font-size: 12px; color: rgba(255,255,255,.45); margin-top: 22px; opacity: 0; transition: opacity .4s ease; }
  .milestone-overlay.visible .ms-po-hint { opacity: 1; transition-delay: 2s; }

  /* Text entry animations */
  @keyframes msBadgeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes msEmojiIn { 0%{opacity:0;transform:scale(.3) rotate(-20deg)} 60%{opacity:1;transform:scale(1.25) rotate(8deg)} 80%{transform:scale(.93) rotate(-3deg)} 100%{opacity:1;transform:scale(1) rotate(0)} }
  @keyframes msTitleIn { 0%{opacity:0;transform:scale(.8) translateY(14px)} 65%{opacity:1;transform:scale(1.04) translateY(-3px)} 100%{opacity:1;transform:scale(1) translateY(0)} }
  @keyframes msSubIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  @keyframes msXpIn { 0%{opacity:0;transform:translateY(18px) scale(.88)} 65%{opacity:1;transform:translateY(-4px) scale(1.05)} 100%{opacity:1;transform:translateY(0) scale(1)} }

  /* Confetti */
  .ms-confetti { position: absolute; pointer-events: none; z-index: 120; border-radius: 2px; }
  @keyframes msCFall {

  <script>
    /* i18n helper */
    function t(k){ return (window.BDi18n && BDi18n.t) ? BDi18n.t(k) : k; }

    /* aliases — keep existing code working without changes */
    var DISC_COLORS = window.BD_DISC_COLORS;
    var DISC_NAMES  = window.BD_DISC_NAMES;
    var QUESTIONS   = window.BD_QUESTIONS_STATIC;


    /* Resume từ tiến độ đã lưu (chuyển tab sidebar rồi quay lại không bị reset) */
    var idx = (function () {
      var p = parseInt(localStorage.getItem('quizProgress') || '0', 10);
      return (isNaN(p) || p < 0 || p >= QUESTIONS.length) ? 0 : p;
    })();
    var answerLog = (function () {
      try { var a = JSON.parse(localStorage.getItem('quizAnswerLog') || '[]'); return Array.isArray(a) ? a : []; } catch (e) { return []; }
    })();
    var counts = (function () {
      try {
        var c = JSON.parse(localStorage.getItem('quizCounts') || 'null');
        if (c && typeof c === 'object') return { right:c.right||0, up:c.up||0, down:c.down||0, left:c.left||0 };
      } catch (e) {}
      return { right:0, up:0, down:0, left:0 };
    })();
    /* Fresh start (idx 0 ⇒ no answers yet): keep score chips + answer log in
       sync even if a reset cleared progress but left stale counts behind. */
    if (idx === 0) { counts = { right:0, up:0, down:0, left:0 }; answerLog = []; }
    /* Where this session started — used to avoid re-firing a milestone the user
       has already passed when resuming after an AI-loading checkpoint. */
    var START_IDX = idx;
    var $ = function (id) { return document.getElementById(id); };

    function isLight() { return document.documentElement.getAttribute('data-theme') === 'light'; }

    function styleCard(el, disc) {
      var c = DISC_COLORS[disc];
      if (isLight()) {
        el.style.background = c.lightBase;
        el.style.boxShadow = '0 0 0 1px rgba(255,255,255,0.6), 0 30px 80px ' + c.lightGlow;
        el.style.borderColor = 'rgba(255,255,255,0.75)';
      } else {
        el.style.background =
          'radial-gradient(ellipse 90% 80% at 30% 35%, ' + c.glow + ' 0%, transparent 70%), ' + c.dark;
        el.style.boxShadow = '0 0 0 1px rgba(255,255,255,0.07), 0 30px 80px ' + c.glow;
        el.style.borderColor = 'rgba(255,255,255,0.10)';
      }
    }

    function setAurora(disc) {
      var c = DISC_COLORS[disc], r = document.documentElement.style;
      r.setProperty('--blob-p1', c.glow);
      r.setProperty('--blob-p2', 'rgba(59,130,246,0.3)');
      r.setProperty('--blob-p4', c.glow);
    }

    function buildStoryBar() {
      var bar = $('storyBar');
      var html = '';
      for (var i = 0; i < QUESTIONS.length; i++) html += '<div class="story-seg"></div>';
      bar.innerHTML = html;
    }

    function render() {
      var q = QUESTIONS[idx];
      if (!q) return finish();
      $('qCur').textContent = idx + 1;
      var qKey = 'quiz.q.' + q.id;
      var qTr = t(qKey);
      $('qText').textContent = (qTr && qTr !== qKey) ? qTr : q.text;
      styleCard($('activeCard'), q.disc);
      if (QUESTIONS[idx + 1]) styleCard($('backCard1'), QUESTIONS[idx + 1].disc);
      if (QUESTIONS[idx + 2]) styleCard($('backCard2'), QUESTIONS[idx + 2].disc);
      setAurora(q.disc);
      /* story bar: 1 segment per question */
      var segs = $('storyBar').children;
      for (var i = 0; i < segs.length; i++) segs[i].className = 'story-seg' + (i < idx ? ' done' : (i === idx ? ' active' : ''));
      /* counts */
      $('agreeCount').textContent = counts.right;
      $('strongCount').textContent = counts.up;
      $('neutralCount').textContent = counts.down;
      $('disagreeCount').textContent = counts.left;
      /* Static swipe hint only on the very first question */
      var sh = $('swipeHint'); if (sh) sh.classList.toggle('hidden', idx > 0);
      localStorage.setItem('quizProgress', idx);
      localStorage.setItem('quizCounts', JSON.stringify(counts));
      localStorage.setItem('quizAnswerLog', JSON.stringify(answerLog));
    }

    /* Fling target: viewport-relative so the card always clears the whole
       screen regardless of window width (fixed px left it stuck mid-screen
       on wide desktops). Mirrors mobile's full fly-off. */
    function flingTransform(dir) {
      var w = window.innerWidth, h = window.innerHeight;
      switch (dir) {
        case 'right': return 'translate(' + (w + 240) + 'px,-60px) rotate(20deg)';
        case 'left':  return 'translate(' + (-(w + 240)) + 'px,-60px) rotate(-20deg)';
        case 'up':    return 'translate(20px,' + (-(h + 240)) + 'px) rotate(5deg)';
        case 'down':  return 'translate(0,' + (h + 240) + 'px) rotate(0deg)';
      }
      return '';
    }

    function answer(dir) {
      var card = $('activeCard');
      if (card.dataset.busy) return;
      stopGuide();
      card.dataset.busy = '1';
      counts[dir]++; answerLog.push(dir);
      showHint(dir, true); setTimeout(function () { showHint(dir, false); }, 280);
      card.classList.add('fling');
      card.style.transform = flingTransform(dir);
      card.style.opacity = '0';
      setTimeout(function () {
        idx++;
        /* Snap the card straight to center with NO transition, then load the
           next question — so the new card appears in the middle instead of
           sliding back in from the throw direction (mobile parity). */
        card.classList.remove('fling');
        card.style.transition = 'none';
        card.style.transform = '';
        card.style.opacity = '';
        void card.offsetWidth; /* force reflow so the snap is instant */
        card.style.transition = ''; /* restore base transition for next drag/fling */
        delete card.dataset.busy;
        /* Persist before any checkpoint navigation so progress survives. */
        localStorage.setItem('quizProgress', idx);
        localStorage.setItem('quizCounts', JSON.stringify(counts));
        localStorage.setItem('quizAnswerLog', JSON.stringify(answerLog));
        /* Every 10 answers: Planet-Burst milestone → AI loading screen.
           START_IDX guard prevents re-firing when resuming past a checkpoint. */
        if ((idx === 10 || idx === 20 || idx === 30) && START_IDX < idx) {
          localStorage.setItem('quizMilestone', idx);
          showPlanetMilestone(idx / 10, function () { goLoading(idx / 10); });
          return;
        }
        if (idx >= 30) { localStorage.setItem('quizMilestone', 30); return finish(); }
        render();
      }, 430);
    }

    /* Navigate to the AI loading screen for the given stage (1, 2 or 3). */
    function goLoading(stage) {
      document.body.style.transition = 'opacity .3s ease';
      document.body.style.opacity = '0';
      setTimeout(function () { location.href = '../../onboarding/loading/?stage=' + stage; }, 300);
    }

    function finish() { goLoading(3); }

    /* ── Planet Burst Milestone Engine (ported from mobile) ───────── */
    var MS_COPY = {
      1: { emoji: '🔥', badge: t('quiz.ms_badge1'), title: t('quiz.ms_title1'), sub: t('quiz.ms_sub1') },
      2: { emoji: '🚀', badge: t('quiz.ms_badge2'), title: t('quiz.ms_title2'), sub: t('quiz.ms_sub2') },
      3: { emoji: '🏆', badge: t('quiz.ms_badge3'), title: t('quiz.ms_title3'), sub: t('quiz.ms_sub3') }
    };
    var _msTimer = null;

    /* One-time twinkling starfield */
    (function initStars() {
      var starsEl = $('msPlanetStars');
      if (!starsEl) return;
      for (var i = 0; i < 70; i++) {
        var s = document.createElement('div');
        var sz = Math.random() > 0.8 ? 2 : 1;
        s.style.cssText = 'position:absolute;border-radius:50%;'
          + 'width:' + sz + 'px;height:' + sz + 'px;'
          + 'left:' + (Math.random()*100).toFixed(1) + '%;'
          + 'top:'  + (Math.random()*100).toFixed(1) + '%;'
          + 'background:rgba(255,255,255,' + (0.3+Math.random()*0.7).toFixed(2) + ');'
          + 'animation:msStarTwinkle ' + (2+Math.random()*3).toFixed(1) + 's ease-in-out '
          + (Math.random()*3).toFixed(1) + 's infinite;';
        starsEl.appendChild(s);
      }
    })();

    function _msSet(id, v) { var el = $(id); if (el) el.textContent = v; }
    function _msAnim(id, a) { var el = $(id); if (el) el.style.animation = a; }

    function showPlanetMilestone(stage, cb) {
      var ov = $('milestoneOverlay'), sys = $('msPlanetSystem');
      if (!ov || !sys) { cb && cb(); return; }
      var c = MS_COPY[stage] || MS_COPY[1];

      _msReset();

      _msSet('msPlanetOrbEmoji', c.emoji);
      _msSet('msPlanetBigEmoji', c.emoji);
      _msSet('msPlanetBadge',    c.badge);
      _msSet('msPlanetTitle',    c.title);
      _msSet('msPlanetSub',      c.sub);

      var total = QUESTIONS.length || 30;
      var pct   = Math.round(idx / total * 100);
      var fill  = $('msPlanetProgressFill');
      if (fill) { fill.style.transition = 'none'; fill.style.width = '0'; void fill.offsetWidth; fill.style.transition = ''; setTimeout(function () { fill.style.width = pct + '%'; }, 120); }

      ov.classList.add('visible');

      setTimeout(function () { sys.style.animation = 'msSysIn .6s cubic-bezier(.34,1.25,.64,1) forwards'; }, 80);
      setTimeout(function () {
        ['msSw1','msSw2','msSw3'].forEach(function (id, i) {
          var el = $(id); if (el) el.style.animation = 'msShockOut ' + (.65+i*.1) + 's ease-out ' + (i*100) + 'ms forwards';
        });
        for (var b = 0; b < 6; b++) (function (k) {
          var bp = $('msBp' + k); if (bp) bp.style.animation = 'msBpFly' + k + ' .8s cubic-bezier(.34,1.1,.64,1) ' + (k*28) + 'ms forwards';
        })(b);
      }, 320);
      setTimeout(function () { _msConfetti(ov); }, 360);
      setTimeout(function () {
        ov.querySelectorAll('.ms-po-orbit').forEach(function (el, i) { setTimeout(function () { el.style.opacity = '1'; }, i * 45); });
      }, 580);
      setTimeout(function () { _msAnim('msPlanetBadge',    'msBadgeIn .4s ease forwards'); }, 640);
      setTimeout(function () { _msAnim('msPlanetBigEmoji', 'msEmojiIn .6s cubic-bezier(.34,1.3,.64,1) forwards'); }, 780);
      setTimeout(function () { _msAnim('msPlanetTitle',    'msTitleIn .55s cubic-bezier(.34,1.15,.64,1) forwards'); }, 960);
      setTimeout(function () { _msAnim('msPlanetSub',      'msSubIn .4s ease forwards'); }, 1160);
      setTimeout(function () { _msAnim('msPlanetXp',       'msXpIn .55s cubic-bezier(.34,1.2,.64,1) forwards'); }, 1340);

      _msTimer = setTimeout(function () { _msDismiss(ov, cb); }, 4300);
      ov.addEventListener('click', function _tap() {
        ov.removeEventListener('click', _tap);
        clearTimeout(_msTimer);
        _msDismiss(ov, cb);
      }, { once: true });
    }

    function _msDismiss(ov, cb) {
      cb && cb();   /* fire navigation first; overlay stays up through the fade-out */
    }

    function _msReset() {
      var sys = $('msPlanetSystem');
      if (sys) { sys.style.animation = 'none'; sys.style.opacity = '0'; sys.style.transform = 'scale(0.2) rotate(-15deg)'; void sys.offsetWidth; }
      ['msSw1','msSw2','msSw3'].forEach(function (id) { var el = $(id); if (el) { el.style.animation = 'none'; void el.offsetWidth; } });
      for (var b = 0; b < 6; b++) { var bp = $('msBp' + b); if (bp) { bp.style.animation = 'none'; void bp.offsetWidth; } }
      var ov = $('milestoneOverlay');
      if (ov) {
        ov.querySelectorAll('.ms-po-orbit').forEach(function (el) { el.style.opacity = '0'; el.style.transition = 'none'; void el.offsetWidth; el.style.transition = ''; });
        ov.querySelectorAll('.ms-confetti').forEach(function (el) { el.remove(); });
      }
      ['msPlanetBadge','msPlanetBigEmoji','msPlanetTitle','msPlanetSub','msPlanetXp'].forEach(function (id) { var el = $(id); if (el) { el.style.animation = 'none'; void el.offsetWidth; } });
      var pf = $('msPlanetProgressFill');
      if (pf) { pf.style.transition = 'none'; pf.style.width = '0'; void pf.offsetWidth; pf.style.transition = ''; }
    }

    var _MS_CONFETTI = ['#a78bfa','#06d6a0','#fbbf24','#f472b6','#60a5fa','#fb7185','#34d399'];
    function _msConfetti(container) {
      var fw = container.offsetWidth, fh = container.offsetHeight;
      var waves = [
        { count: 50, cyMin: 0,       cyMax: fh*.20, baseDelay: 0.00 },
        { count: 44, cyMin: fh*.15,  cyMax: fh*.40, baseDelay: 0.08 },
        { count: 40, cyMin: fh*.35,  cyMax: fh*.60, baseDelay: 0.16 },
        { count: 32, cyMin: fh*.55,  cyMax: fh*.78, baseDelay: 0.24 },
        { count: 24, cyMin: 0,       cyMax: fh*.70, baseDelay: 0.40 }
      ];
      waves.forEach(function (w) {
        for (var i = 0; i < w.count; i++) (function () {
          var el = document.createElement('div');
          el.className = 'ms-confetti';
          var cx = (Math.random()*fw*1.15 - fw*.08).toFixed(0)+'px';
          var cy = (w.cyMin + Math.random()*(w.cyMax - w.cyMin)).toFixed(0)+'px';
          var dx = (Math.random()*320-160).toFixed(0)+'px';
          var fall = (480 + Math.random()*380).toFixed(0)+'px';
          var spin = (Math.random()*1080-540).toFixed(0)+'deg';
          var dur = (.55+Math.random()*1.5).toFixed(2)+'s';
          var delay = (w.baseDelay + Math.random()*.55).toFixed(2)+'s';
          var color = _MS_CONFETTI[Math.floor(Math.random()*_MS_CONFETTI.length)];
          var size = (4+Math.random()*9).toFixed(0)+'px';
          el.style.cssText = 'left:0;top:0;width:'+size+';height:'+size
            +';border-radius:'+(Math.random()>.4?'50%':'2px')
            +';background:'+color
            +';--cx:'+cx+';--cy:'+cy+';--dx:'+dx+';--spin:'+spin+';--fall:'+fall
            +';animation:msCFall '+dur+' ease-out '+delay+' forwards;opacity:0;';
          container.appendChild(el);
          setTimeout(function () { el.remove(); }, (parseFloat(dur)+parseFloat(delay)+.6)*1000);
        })();
      });
    }

    function showHint(dir, on) {
      var map = { right:'hintRight', left:'hintLeft', up:'hintUp', down:'hintDown' };
      $(map[dir]).classList.toggle('visible', on);
    }

    /* Undo (mobile parity) */
    function undo() {
      if (!answerLog.length || idx === 0) return;
      var last = answerLog.pop();
      counts[last]--; idx--;
      render();
    }
    $('undoBtn').onclick = undo;

    /* Action buttons */
    document.querySelectorAll('.action-btn').forEach(function (b) {
      b.onclick = function () { answer(b.dataset.dir); };
      b.onmouseenter = function () { showHint(b.dataset.dir, true); };
      b.onmouseleave = function () { showHint(b.dataset.dir, false); };
    });

    /* Keyboard */
    document.addEventListener('keydown', function (e) {
      var k = { ArrowRight:'right', ArrowLeft:'left', ArrowUp:'up', ArrowDown:'down' }[e.key];
      if (k) { e.preventDefault(); answer(k); }
      if (e.key === 'z' || e.key === 'Z') undo();
    });

    /* Mouse drag (swipe parity) */
    (function drag() {
      var card = $('activeCard'), sx = 0, sy = 0, dx = 0, dy = 0, on = false;
      card.addEventListener('mousedown', function (e) { stopGuide(); on = true; sx = e.clientX; sy = e.clientY; e.preventDefault(); });
      document.addEventListener('mousemove', function (e) {
        if (!on) return;
        dx = e.clientX - sx; dy = e.clientY - sy;
        card.style.transition = 'none';
        card.style.transform = 'translate(' + dx + 'px,' + dy + 'px) rotate(' + dx / 24 + 'deg)';
        showHint('right', dx > 70); showHint('left', dx < -70);
        showHint('up', dy < -70 && Math.abs(dx) < 70); showHint('down', dy > 70 && Math.abs(dx) < 70);
      });
      document.addEventListener('mouseup', function () {
        if (!on) return; on = false;
        card.style.transition = '';
        ['right','left','up','down'].forEach(function (d) { showHint(d, false); });
        if (dx > 110) answer('right');
        else if (dx < -110) answer('left');
        else if (dy < -110) answer('up');
        else if (dy > 110) answer('down');
        else card.style.transform = '';
        dx = dy = 0;
      });
    })();

    /* Re-style cards khi đổi theme */
    new MutationObserver(function () { render(); })
      .observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

    /* ── Swipe guide: one-time demo nudge on the very first card ──
       The card gently leans right (flash AGREE) then left (flash DISAGREE)
       to show it can be swiped. Cancels instantly on any interaction. */
    var guideActive = false, guideTimer = null, guideDone = false;
    var ARROW_ROT    = { right:'rotate(0deg)', left:'rotate(180deg)', up:'rotate(-90deg)', down:'rotate(90deg)' };
    var ARROW_COLOR  = { right:'var(--mint-500)', left:'var(--red-500)', up:'var(--violet-400)', down:'#9d9dbf' };
    var ARROW_OFFSET = { right:['250px','0px'], left:['-250px','0px'], up:['0px','-185px'], down:['0px','185px'] };
    function playArrow(dir) {
      var a = $('guideArrow'); if (!a) return;
      var svg = $('guideArrowSvg');
      if (svg) {
        svg.style.color = ARROW_COLOR[dir];                       /* gradient uses currentColor */
        svg.style.transform = ARROW_ROT[dir];                     /* point the right-facing arrow */
        svg.style.filter = 'drop-shadow(0 0 22px ' + ARROW_COLOR[dir] + ')'; /* colored glow */
      }
      a.style.setProperty('--ax', ARROW_OFFSET[dir][0]);
      a.style.setProperty('--ay', ARROW_OFFSET[dir][1]);
      a.classList.remove('fly'); void a.offsetWidth; a.classList.add('fly');
    }
    function stopGuide() {
      guideDone = true;
      if (!guideActive) return;
      guideActive = false;
      if (guideTimer) { clearTimeout(guideTimer); guideTimer = null; }
      ['right','left','up','down'].forEach(function (d) { showHint(d, false); });
      var a = $('guideArrow'); if (a) a.classList.remove('fly');
      var card = $('activeCard');
      if (card && !card.dataset.busy) { card.style.transition = ''; card.style.transform = ''; }
    }
    function swipeGuide() {
      if (guideDone || idx !== 0) return;
      var card = $('activeCard');
      if (!card) return;
      guideDone = true; guideActive = true;
      /* Demo all 4 directions: AGREE → / DISAGREE ← / STRONGLY AGREE ↑ / NEUTRAL ↓ */
      var seq = [
        { t: 'translate(78px,0) rotate(6deg)',   hint: 'right' },
        { t: 'translate(0,0) rotate(0deg)',      hint: null   },
        { t: 'translate(-78px,0) rotate(-6deg)', hint: 'left'  },
        { t: 'translate(0,0) rotate(0deg)',      hint: null   },
        { t: 'translate(0,-58px) rotate(0deg)',  hint: 'up'    },
        { t: 'translate(0,0) rotate(0deg)',      hint: null   },
        { t: 'translate(0,54px) rotate(0deg)',   hint: 'down'  },
        { t: 'translate(0,0) rotate(0deg)',      hint: null   }
      ];
      var i = 0;
      card.style.transition = 'transform 0.5s cubic-bezier(0.34,1.2,0.64,1)';
      (function step() {
        if (!guideActive) return;
        var s = seq[i++];
        card.style.transform = s.t;
        ['right','left','up','down'].forEach(function (d) { showHint(d, false); });
        if (s.hint) { showHint(s.hint, true); playArrow(s.hint); }
        guideTimer = setTimeout(i < seq.length ? step : stopGuide, s.hint ? 640 : 340);
      })();
    }

    buildStoryBar();
    render();
    /* kick off the guide shortly after first paint (skipped if resuming) */
    setTimeout(swipeGuide, 750);
  </script>
</body>
</html>
