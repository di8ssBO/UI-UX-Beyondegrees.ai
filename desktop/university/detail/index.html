<!DOCTYPE html>
<html lang="en">
<head>
<!-- anti-fouc -->
<script>document.documentElement.setAttribute("data-theme",(localStorage.getItem("bd-theme")||"light"));</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>University Detail — BeyonDegrees.ai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_shell/desktop.css?v=3">
<style>
  .ud-hero { display: flex; align-items: center; gap: 26px; padding: 40px; }
  .ud-hero .ic { width: 88px; height: 88px; border-radius: 22px; flex: none; display: grid; place-items: center; font-size: 42px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10); }
  :root[data-theme="light"] .ud-hero .ic { background: #fdf8f2; border-color: #e8e0d5; }
  .ud-hero h1 { font-size: 28px; font-weight: 900; letter-spacing: -0.5px; color: var(--text-primary); }
  .ud-hero .loc { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
  .ud-ring { margin-left: auto; flex: none; position: relative; width: 92px; height: 92px; text-align: center; }
  .ud-ring svg { transform: rotate(-90deg); }
  .ud-ring .v { position: absolute; inset: 0; display: grid; place-items: center; }
  .ud-ring .v b { font-size: 22px; font-weight: 900; color: var(--mint-400); }
  :root[data-theme="light"] .ud-ring .v b { color: #047857; }
  .ud-ring .sub { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); display: block; }
  .sec-head { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 800; color: var(--text-primary); margin-bottom: 12px; }
  .sec-head .em { font-size: 18px; }
  .sec-head .meta { margin-left: auto; font-size: 12px; font-weight: 700; color: var(--text-muted); }
  .ud-p { font-size: 13.5px; color: var(--text-secondary); line-height: 1.7; }
  .fin-row { display: flex; justify-content: space-between; gap: 10px; padding: 10px 0; font-size: 13.5px; }
  .fin-row .k { color: var(--text-muted); }
  .fin-row .v { font-weight: 800; color: var(--text-primary); text-align: right; }

  /* ── Tuition & Financials / Admissions — cấu trúc y hệt mobile ── */
  .ud-stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .ud-stat-card { padding: 12px 14px; background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06); border-radius: 12px; }
  .ud-stat-lbl { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); margin-bottom: 5px; }
  .ud-stat-val { font-size: 16px; font-weight: 900; color: var(--text-primary); line-height: 1.2; }
  .ud-stat-val.accent { color: #06D6A0; }
  :root[data-theme="light"] .ud-stat-card { background: linear-gradient(135deg, #4a87a8 0%, #2f6a8c 60%, #214e6e 100%); border: 1.5px solid #173650;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.30), inset 0 -1px 0 rgba(14,36,51,0.40), 0 2px 6px rgba(33,78,110,0.25), 0 8px 20px rgba(74,135,168,0.30); }
  :root[data-theme="light"] .ud-stat-lbl { color: #c4d9e5; text-shadow: 0 1px 2px rgba(14,36,51,0.55); }
  :root[data-theme="light"] .ud-stat-val { color: #ffffff; text-shadow: 0 1px 3px rgba(14,36,51,0.60); }
  :root[data-theme="light"] .ud-stat-val.accent { color: #ffffff; }

  .ud-aid-badge { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 20px; font-size: 13px; font-weight: 800; margin-bottom: 10px; }
  .ud-aid-badge.full  { background: rgba(6,214,160,.14); border: 1px solid rgba(6,214,160,.30); color: #06D6A0; }
  .ud-aid-badge.need  { background: rgba(249,115,22,.12); border: 1px solid rgba(249,115,22,.25); color: #fb923c; }
  .ud-aid-badge.merit { background: rgba(24,99,220,.12);  border: 1px solid rgba(24,99,220,.25);  color: var(--violet-300); }
  :root[data-theme="light"] .ud-aid-badge.full  { background: linear-gradient(135deg, rgba(168,200,196,0.40) 0%, rgba(106,150,144,0.35) 100%); border-color: rgba(106,150,144,0.55); color: #3a5c56; }
  :root[data-theme="light"] .ud-aid-badge.need  { background: linear-gradient(135deg, rgba(232,145,122,0.28) 0%, rgba(201,107,85,0.30) 100%); border-color: rgba(201,107,85,0.50); color: #a84e30; }
  :root[data-theme="light"] .ud-aid-badge.merit { background: linear-gradient(135deg, rgba(127,168,190,0.28) 0%, rgba(74,135,168,0.32) 100%); border-color: rgba(74,135,168,0.50); color: #2f6a8c; }
  .ud-aid-text { font-size: 13px; font-weight: 500; color: var(--text-secondary); line-height: 1.6; }
  .ud-loan-row { display: flex; align-items: center; gap: 10px; padding: 9px 12px; background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06); border-radius: 11px; margin-top: 10px; }
  .ud-loan-icon { width: 32px; height: 32px; border-radius: 8px; background: rgba(251,191,36,.10); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .ud-loan-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); }
  .ud-loan-val { font-size: 13px; font-weight: 700; color: var(--text-primary); margin-top: 2px; }
  :root[data-theme="light"] .ud-loan-row { background: linear-gradient(135deg, rgba(216,204,191,0.40) 0%, rgba(140,114,96,0.14) 100%); border-color: rgba(140,114,96,0.36); }
  :root[data-theme="light"] .ud-loan-icon { background: linear-gradient(135deg, rgba(217,160,64,0.35) 0%, rgba(217,160,64,0.18) 100%); border-color: rgba(217,160,64,0.50); }
  :root[data-theme="light"] .ud-loan-label { color: #6b5440; }
  :root[data-theme="light"] .ud-loan-val { color: #2c1f14; }

  .ud-admit-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 12px; }
  .ud-admit-stat { padding: 10px 8px; background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06); border-radius: 12px; text-align: center; }
  .ud-admit-val { font-size: 17px; font-weight: 900; color: var(--text-primary); line-height: 1.2; }
  .ud-admit-lbl { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); margin-top: 4px; }
  .ud-site-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06); border-radius: 11px; margin-bottom: 10px; }
  .ud-site-icon { width: 30px; height: 30px; border-radius: 8px; background: rgba(24,99,220,.12); display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
  .ud-site-url { flex: 1; font-size: 13px; font-weight: 700; color: var(--violet-400); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  :root[data-theme="light"] .ud-admit-stat { background: linear-gradient(180deg, #ffffff 0%, #fdf8f2 100%); border-color: rgba(140,114,96,0.30); box-shadow: inset 0 1px 0 rgba(255,255,255,0.65), 0 2px 6px rgba(140,114,96,0.08); }
  :root[data-theme="light"] .ud-admit-stats .ud-admit-stat:nth-child(1) { background: linear-gradient(180deg, #ffffff 0%, rgba(232,145,122,0.28) 100%); border-color: rgba(201,107,85,0.44); }
  :root[data-theme="light"] .ud-admit-stats .ud-admit-stat:nth-child(2) { background: linear-gradient(180deg, #ffffff 0%, rgba(168,200,196,0.40) 100%); border-color: rgba(106,150,144,0.44); }
  :root[data-theme="light"] .ud-admit-stats .ud-admit-stat:nth-child(3) { background: linear-gradient(180deg, #ffffff 0%, rgba(127,168,190,0.36) 100%); border-color: rgba(74,135,168,0.44); }
  :root[data-theme="light"] .ud-admit-val { color: #2c1f14; }
  :root[data-theme="light"] .ud-admit-stats .ud-admit-stat:nth-child(1) .ud-admit-lbl { color: #a84e30; }
  :root[data-theme="light"] .ud-admit-stats .ud-admit-stat:nth-child(2) .ud-admit-lbl { color: #3a5c56; }
  :root[data-theme="light"] .ud-admit-stats .ud-admit-stat:nth-child(3) .ud-admit-lbl { color: #2f6a8c; }
  :root[data-theme="light"] .ud-site-row { background: linear-gradient(135deg, rgba(127,168,190,0.14) 0%, rgba(74,135,168,0.10) 100%); border-color: rgba(74,135,168,0.36); }
  :root[data-theme="light"] .ud-site-icon { background: linear-gradient(135deg, rgba(127,168,190,0.40) 0%, rgba(74,135,168,0.20) 100%); border-color: rgba(74,135,168,0.45); }
  :root[data-theme="light"] .ud-site-url { color: #2f6a8c; }

  .ud-apply-btn { width: 100%; padding: 14px; border-radius: 14px; font-size: 14px; font-weight: 800; font-family: inherit; text-align: center;
    background: linear-gradient(135deg, var(--violet-600), var(--violet-500)); border: none; color: #fff; cursor: pointer;
    box-shadow: 0 6px 20px rgba(124,58,237,0.40); display: block; letter-spacing: .01em; transition: transform var(--tr-fast), box-shadow var(--tr-fast); }
  .ud-apply-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(124,58,237,0.50); }
  .ud-apply-btn:active { opacity: .85; }
  :root[data-theme="light"] .ud-apply-btn { background: linear-gradient(135deg, #e8917a 0%, #c96b55 50%, #a84e30 100%); color: #fff;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.30), 0 4px 14px rgba(201,107,85,0.38), 0 10px 26px rgba(201,107,85,0.24); }
  :root[data-theme="light"] .ud-apply-btn:hover { background: linear-gradient(135deg, #f2b09d 0%, #d97f66 50%, #c96b55 100%); }

  /* ── Majors Offered — 2 cột (bố cục cũ) + màu y hệt mobile ── */
  /* Khung bao quanh danh sách major (parity mobile .ud-programs-list) */
  .ud-programs-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0;
    background: rgba(255,255,255,.025); border: 1px solid rgba(255,255,255,.07); border-radius: 14px; overflow: hidden; }
  :root[data-theme="light"] .ud-programs-list {
    background: linear-gradient(180deg, rgba(127,168,190,0.06) 0%, rgba(74,135,168,0.10) 100%);
    border-color: rgba(74,135,168,0.28); }
  /* Đường kẻ mỏng giữa các major: kẻ ngang giữa các hàng (trừ hàng đầu) + kẻ dọc giữa 2 cột */
  .ud-programs-list .ml-item { border-top: 1px solid rgba(255,255,255,.06); }
  .ud-programs-list .ml-item:nth-child(1),
  .ud-programs-list .ml-item:nth-child(2) { border-top: none; }
  .ud-programs-list .ml-item:nth-child(even) { border-left: 1px solid rgba(255,255,255,.06); }
  :root[data-theme="light"] .ud-programs-list .ml-item { border-top-color: rgba(74,135,168,0.16); }
  :root[data-theme="light"] .ud-programs-list .ml-item:nth-child(even) { border-left-color: rgba(74,135,168,0.16); }
  @media (max-width: 980px) {
    .ud-programs-list { grid-template-columns: 1fr; }
    /* 1 cột: hàng thứ 2 trở đi đều cần kẻ trên, bỏ kẻ dọc */
    .ud-programs-list .ml-item:nth-child(2) { border-top: 1px solid rgba(255,255,255,.06); }
    .ud-programs-list .ml-item:nth-child(even) { border-left: none; }
    :root[data-theme="light"] .ud-programs-list .ml-item:nth-child(2) { border-top-color: rgba(74,135,168,0.16); }
  }
  .ml-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; border-radius: 0; min-width: 0; overflow: hidden;
    cursor: pointer; transition: background .15s ease;
  }
  .ml-item:hover { background: rgba(255,255,255,.04); }
  :root[data-theme="light"] .ml-item:hover { background: rgba(74,135,168,0.10); }
  .ml-left { display: flex; align-items: center; gap: 13px; flex: 1; min-width: 0; }
  .ml-ico { width: 46px; height: 46px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex: none; }
  :root[data-theme="light"] .ml-ico {
    background: linear-gradient(135deg, rgba(127,168,190,0.30) 0%, rgba(74,135,168,0.18) 100%) !important;
    border: 1px solid rgba(74,135,168,0.34);
  }
  .ml-info { flex: 1; min-width: 0; }
  .disc-badge { display: inline-flex; align-items: center; gap: 5px; margin-bottom: 3px; }
  .disc-badge .d-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--bc,#888); flex: none; }
  .disc-badge .d-name { font-size: 10px; font-weight: 700; color: var(--bc,#888); letter-spacing: .04em; text-transform: uppercase; opacity: .85; }
  .ml-name { font-size: 15px; font-weight: 700; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  :root[data-theme="light"] .ml-name { color: #2c1f14; font-weight: 800; }
  .ml-sub { font-size: 11.5px; color: var(--text-muted); font-weight: 500; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  :root[data-theme="light"] .ml-sub { color: #5c4535; }
  .ml-right { display: flex; align-items: center; gap: 6px; flex: none; margin-left: 10px; }
  .ml-pct { font-size: 17px; font-weight: 800; }
  .ml-chev { color: var(--text-muted); display: flex; }
  .pct-high { color: #06D6A0; }
  .pct-mid  { color: #fb923c; }
  .pct-low  { color: var(--text-muted); }
  :root[data-theme="light"] .ml-pct.pct-high { color: #3a5c56; }
  :root[data-theme="light"] .ml-pct.pct-mid  { color: #c45540; }
  :root[data-theme="light"] .ml-pct.pct-low  { color: #8c7260; }
  .ud-view-all {
    width: 100%; margin-top: 4px; padding: 11px; border-radius: 11px;
    background: rgba(24,99,220,.08); border: 1px solid rgba(24,99,220,.18); color: var(--violet-300);
    font-size: 13px; font-weight: 800; font-family: inherit; text-align: center; cursor: pointer;
    display: block; transition: background .15s;
  }
  .ud-view-all:hover { background: rgba(24,99,220,.14); }
  :root[data-theme="light"] .ud-view-all {
    background: linear-gradient(135deg, rgba(74,135,168,0.14) 0%, rgba(74,135,168,0.26) 100%);
    border-color: rgba(74,135,168,0.45); color: #2f6a8c; font-weight: 800;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.50), 0 2px 6px rgba(74,135,168,0.12);
  }
  :root[data-theme="light"] .ud-view-all:hover { background: linear-gradient(135deg, rgba(74,135,168,0.20) 0%, rgba(74,135,168,0.36) 100%); }

  /* ── Major × University view (mobile renderMajorInUni parity) ── */
  /* ── Major × University — card LOGO riêng (nền trắng) + caption (major/ngành/%match) NẰM DƯỚI card ── */
  .mxu-logocard {
    width: 100%; min-height: 280px; box-sizing: border-box; padding: 28px 32px;
    display: grid; place-items: center; border-radius: var(--r-xl); overflow: hidden;
    background: #ffffff; border: 1px solid #ece2d2; box-shadow: 0 16px 44px rgba(70,52,28,0.14);
  }
  .mxu-logocard img { max-width: 100%; max-height: 216px; object-fit: contain; }
  .mxu-logocard .em { font-size: 88px; line-height: 1; }
  .mxu-caption { display: flex; align-items: center; justify-content: space-between; gap: 20px; margin-top: 18px; }
  .mxu-cap-left { min-width: 0; }
  .mxu-caption h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.4px; color: var(--text-primary); line-height: 1.15; }
  .mxu-cap-left .mxu-disc-chip { margin-top: 10px; }
  /* % match — hộp vuông màu xanh lá (nằm trên nền trang, theo theme) */
  .mxu-match-box { flex: none; text-align: center; padding: 14px 22px; border-radius: 14px;
    background: rgba(18,199,154,0.10); border: 1.5px solid rgba(18,199,154,0.40); }
  .mxu-match-box b { font-size: 27px; font-weight: 900; line-height: 1; display: block; color: #12c79a; }
  .mxu-match-box span { display: block; font-size: 9px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-top: 5px; }
  :root[data-theme="light"] .mxu-match-box { background: rgba(5,150,105,0.10); border-color: rgba(5,150,105,0.42); }
  :root[data-theme="light"] .mxu-match-box b { color: #047857; }
  @media (max-width: 720px) {
    .mxu-logocard { min-height: 150px; padding: 18px; }
    .mxu-logocard img { max-height: 110px; }
    .mxu-caption { gap: 14px; }
    .mxu-caption h1 { font-size: 23px; }
  }

  /* ── Major × University — thẻ LOGO lớn (major/discipline ở đáy) + thẻ % match riêng bên dưới ── */
  .mxu-lcard { width: 100%; height: 280px; box-sizing: border-box; padding: 26px 32px 24px;
    display: flex; flex-direction: column; border-radius: var(--r-xl); overflow: hidden;
    background: #ffffff; border: 1px solid #ece2d2; box-shadow: 0 16px 44px rgba(70,52,28,0.14); }
  .mxu-lcard-logo { flex: 1; min-height: 0; display: grid; place-items: center; overflow: hidden; }
  .mxu-lcard-logo img { max-width: 100%; max-height: 130px; object-fit: contain; }
  .mxu-lcard-logo .em { font-size: 92px; line-height: 1; }
  .mxu-lcard-cap { flex: none; padding-top: 16px; }
  .mxu-lcard-cap h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.4px; color: #1f1810; line-height: 1.15; }
  .mxu-lcard-cap .mxu-disc-chip { margin-top: 9px; }
  /* tiêu đề major (dưới photo-hero) */
  .mxu-majhead { margin-top: 22px; }
  .mxu-majhead h1 { font-size: 30px; font-weight: 800; letter-spacing: -0.5px; color: var(--text-primary); line-height: 1.15; }
  .mxu-majhead .mxu-disc-chip { margin-top: 10px; }
  /* ── Thẻ % match (AI Match banner, port mobile) ── */
  .mxu-card2 { position: relative; width: 100%; border-radius: var(--r-xl); padding: 26px 30px; overflow: hidden;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 12px 36px rgba(0,0,0,0.22); }
  :root[data-theme="light"] .mxu-card2 { background: linear-gradient(135deg, #fdf8f2 0%, #f6f2e8 52%, #ecf4ed 100%);
    border-color: #ece2d2; box-shadow: 0 16px 44px rgba(70,52,28,0.12); }
  .mxu-c2-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 18px; }
  .mxu-c2-title { font-size: 30px; font-weight: 800; letter-spacing: -0.5px; color: var(--text-primary); line-height: 1.15; }
  .mxu-c2-head .mxu-disc-chip { margin-top: 10px; }
  .mxu-c2-logo { flex: none; width: 92px; height: 92px; border-radius: 18px; display: grid; place-items: center; overflow: hidden;
    background: #ffffff; border: 1px solid #ece2d2; box-shadow: 0 6px 18px rgba(0,0,0,0.18); }
  .mxu-c2-logo img { max-width: 74px; max-height: 74px; object-fit: contain; }
  .mxu-c2-logo .em { font-size: 46px; line-height: 1; }
  .mmc { margin-top: 0; }
  .mmc-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .mmc-chip { display: inline-flex; align-items: center; gap: 6px; padding: 5px 13px; border-radius: 999px;
    font-size: 11px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase;
    background: rgba(24,99,220,.12); border: 1px solid rgba(24,99,220,.28); color: var(--violet-300); }
  :root[data-theme="light"] .mmc-chip { background: rgba(99,102,241,.10); border-color: rgba(99,102,241,.28); color: #6366f1; }
  .mmc-why { font-size: 13px; font-weight: 800; color: var(--violet-400); text-decoration: none; cursor: pointer; white-space: nowrap; }
  :root[data-theme="light"] .mmc-why { color: #c2410c; }
  .mmc-score { display: flex; align-items: flex-end; gap: 14px; margin-bottom: 14px; }
  .mmc-pct { font-size: 52px; font-weight: 900; line-height: .9; letter-spacing: -2px; color: #34d399; }
  :root[data-theme="light"] .mmc-pct { color: #2f6f53; }
  .mmc-sub { font-size: 14px; font-weight: 700; color: var(--text-secondary); line-height: 1.25; padding-bottom: 6px; }
  .mmc-bar { height: 8px; border-radius: 999px; background: rgba(255,255,255,.08); overflow: hidden; margin-bottom: 14px; }
  :root[data-theme="light"] .mmc-bar { background: rgba(120,100,80,.14); }
  .mmc-fill { height: 100%; border-radius: 999px; transition: width .8s cubic-bezier(.34,1.56,.64,1); }
  .mmc-fill.green  { background: linear-gradient(90deg, #06D6A0, #34d399); }
  .mmc-fill.yellow { background: linear-gradient(90deg, #FBBF24, #fde68a); }
  .mmc-fill.red    { background: linear-gradient(90deg, #F87171, #fca5a5); }
  .mmc-factors { display: flex; gap: 8px; flex-wrap: wrap; }
  .mmc-factor { display: inline-flex; align-items: center; gap: 5px; padding: 6px 13px; border-radius: 999px;

      return '<a class="uc uc-v2" href="' + navUrl + '">' +
          '<div class="uc-hero">' +

            '<div class="uc-match-badge ' + matchCls + '">' +

      var btn = document.getElementById('moBtn');
      if (btn) {
        btn.onclick = function () {
          var extras = document.querySelectorAll('#udPrograms .mo-extra');
          var open = extras.length && extras[0].style.display !== 'none';
          extras.forEach(function (el) { el.style.display = open ? 'none' : ''; });
          btn.textContent = open ? ('View all ' + MAJOR_LIST.length + ' majors →') : 'Show less ↑';
        };
      }
    }
    render();
    new MutationObserver(render).observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
  </script>
</body>
</html>
