<!DOCTYPE html>
<html lang="en">
<head>
<!-- anti-fouc -->
<script>document.documentElement.setAttribute("data-theme",(localStorage.getItem("bd-theme")||"light"));</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Why I Match — BeyonDegrees.ai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_shell/desktop.css">
<style>
  /* ── Cấu trúc y hệt discipline/why (hero · AI box · assertions · breakdown · tabs) ── */
  .why-layout { display: grid; grid-template-columns: 1fr 340px; gap: 24px; align-items: start; }
  .why-hero { display: flex; align-items: center; gap: 24px; padding: 32px; position: relative; overflow: hidden; }
  .why-hero::after {
    content: ''; position: absolute; top: -40%; right: -10%;
    width: 55%; height: 140%; border-radius: 50%;
    background: radial-gradient(circle, color-mix(in srgb, var(--acc) 18%, transparent) 0%, transparent 70%);
    filter: blur(30px); pointer-events: none;
  }
  .why-hero > * { position: relative; z-index: 1; }
  .why-hero .ico { width: 72px; height: 72px; border-radius: 18px; display: grid; place-items: center; font-size: 34px; flex: none;
    background: color-mix(in srgb, var(--acc) 16%, transparent);
    border: 1px solid color-mix(in srgb, var(--acc) 32%, transparent); }
  .why-hero h1 { font-size: 26px; font-weight: 900; color: var(--text-primary); }
  .why-hero .rank { font-size: 12px; color: var(--text-muted); font-weight: 600; margin-top: 3px; }
  .why-pct { margin-left: auto; text-align: center; }
  .why-pct b { font-size: 42px; font-weight: 900; color: var(--acc-pct); line-height: 1; }
  .why-pct span { display: block; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); margin-top: 4px; }
  .ai-box { margin-top: 20px; padding: 18px 20px; border-radius: 14px;
    background: color-mix(in srgb, var(--acc) 10%, transparent);
    border: 1px solid color-mix(in srgb, var(--acc) 26%, transparent); }
  .ai-box .lbl { font-size: 11px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: var(--acc-pct); }
  .ai-box p { font-size: 14px; line-height: 1.7; color: var(--text-secondary); margin-top: 8px; }
  .as-row { display: flex; align-items: center; gap: 14px; padding: 13px 0; }
  .as-row p { flex: 1; font-size: 14px; color: var(--text-secondary); line-height: 1.5; }
  .as-chip { flex: none; font-size: 11px; font-weight: 800; padding: 4px 12px; border-radius: 999px; }
  .as-chip.agree    { background: rgba(6,214,160,0.12);   color: var(--mint-500);   border: 1px solid rgba(6,214,160,0.25); }
  .as-chip.strong   { background: rgba(124,58,237,0.12);  color: var(--violet-400); border: 1px solid rgba(124,58,237,0.3); }
  .as-chip.neutral  { background: rgba(107,107,154,0.12); color: #9d9dbf;           border: 1px solid rgba(107,107,154,0.2); }
  .as-chip.disagree { background: rgba(255,71,87,0.12);   color: var(--red-400);    border: 1px solid rgba(255,71,87,0.25); }
  :root[data-theme="light"] .as-chip.agree    { color:#047857; background:rgba(5,150,105,0.10); border-color:rgba(5,150,105,0.25); }
  :root[data-theme="light"] .as-chip.strong   { color:#075c9f; background:rgba(2,116,190,0.08); border-color:rgba(2,116,190,0.25); }
  :root[data-theme="light"] .as-chip.neutral  { color:#8c7260; background:#fdf8f2; border-color:#e8e0d5; }
  :root[data-theme="light"] .as-chip.disagree { color:#be123c; background:rgba(225,29,72,0.08); border-color:rgba(225,29,72,0.22); }
  .bd-row { display: flex; align-items: center; justify-content: space-between; padding: 11px 0; font-size: 14px; font-weight: 700; }
  .bd-row b { font-size: 18px; font-weight: 900; }
</style>
</head>
<body class="app" data-page="universities" data-crumb="Why I Match">
  <div class="main">
    <div class="content fade-in" id="root"></div>
  </div>

  <script src="../../../shared/scripts/data/uni-data.js"></script>
  <script src="../../../shared/scripts/ui/i18n.js"></script>
  <script src="../../_shell/desktop.js?v=3"></script>
  <script>
    /* ── Match-tier theme (mobile UNI_MATCH_COLORS/getMatchTheme) ── */
    var UNI_MATCH_COLORS = {
      high: { primary:'#1863DC', light:'#6BA3FF' },
      mid:  { primary:'#3b82f6', light:'#60a5fa' },
      low:  { primary:'#f59e0b', light:'#fbbf24' }
    };
    function getMatchTheme(pct) { return pct >= 70 ? UNI_MATCH_COLORS.high : pct >= 40 ? UNI_MATCH_COLORS.mid : UNI_MATCH_COLORS.low; }

    /* ── Insight + assertions — nguyên văn mobile getUniInsight/getUniAssertions ── */
    function getUniInsight(u) {
      var known = {
        'mit':        'Your STEM passion and analytical mindset align perfectly with MIT\'s innovation-driven culture and research excellence.',
        'oxford':     'Your interest in interdisciplinary thinking and global networks matches Oxford\'s rigorous tutorial-based academic system.',
        'nus':        'Your openness to multicultural environments and tech interests position you well for NUS\'s global innovation ecosystem.',
        'fulbright':  'Your collaborative spirit and interest in liberal arts align closely with Fulbright Vietnam\'s values-driven education model.',
        'eth':        'Your quantitative strengths and European study ambitions align with ETH Zurich\'s world-class technical research culture.',
        'tum':        'Your engineering interests and cost-conscious planning match TUM\'s high-value, low-tuition model in Germany.',
        'kaist':      'Your passion for cutting-edge technology and competitive academic culture fits KAIST\'s innovation-first environment.',
        'duke':       'Your balanced interest in medicine, policy, and research aligns with Duke\'s holistic, interdisciplinary excellence.',
        'columbia':   'Your global outlook and urban interests resonate with Columbia\'s Ivy League presence in New York City.',
        'ucla':       'Your interest in tech, creativity, and a large campus community matches UCLA\'s dynamic Los Angeles environment.',
        'fpt':        'Your tech ambitions and Vietnam roots align with FPT University\'s strong industry pipeline and local relevance.',
        'rmit':       'Your desire for international credentials in Vietnam matches RMIT\'s Australian-standard education in Ho Chi Minh City.',
        'sciencespo': 'Your global mindset and interest in policy, law, and international affairs are a natural fit for Sciences Po Paris.'
      };
      if (known[u.id]) return known[u.id];
      if (u.match >= 80) return 'Your academic profile and stated preferences align strongly with ' + u.name + '\'s programs, location, and financial aid structure.';
      if (u.match >= 60) return 'There is a solid match between your goals and ' + u.name + '\'s strengths, particularly in your preferred field of study.';
      return 'Your profile shows a partial match with ' + u.name + '. Consider whether the location, cost, and admission requirements fit your plan.';
    }

    function getUniAssertions(u) {
      var a = [];
      var rankStr = (u.ranking || '').toLowerCase();
      var rankNum = parseInt(rankStr.replace(/[^0-9]/g, ''), 10) || 999;
      var isTopTen = rankNum <= 10;
      a.push({ text: 'I prioritize attending a globally ranked, internationally recognized university.',
        answer: isTopTen ? 'strong' : (u.match >= 75 ? 'agree' : 'neutral') });

      var locMap = {
        'USA':'studying in the United States','Canada':'studying in Canada',
        'UK':'studying in the United Kingdom','Germany':'studying in Germany',
        'France':'studying in France','Switzerland':'studying in Switzerland',
        'Netherlands':'studying in the Netherlands','Singapore':'studying in Singapore',
        'Japan':'studying in Japan','China':'studying in China',
        'South Korea':'studying in South Korea','Vietnam':'studying or staying in Vietnam',
        'Australia':'studying in Australia','New Zealand':'studying in New Zealand',
        'India':'studying in India','Thailand':'studying in Thailand',
        'Brazil':'studying in South America','Mexico':'studying in Mexico'
      };
      var locLabel = locMap[u.country] || 'studying internationally';
      a.push({ text: 'I am open to ' + locLabel + ' for my higher education.',
        answer: u.match >= 78 ? 'strong' : u.match >= 52 ? 'agree' : 'neutral' });

      a.push({ text: 'Access to scholarships or financial aid is a key factor in choosing a university.',
        answer: u.aidType === 'full' ? 'strong' : 'agree' });

      var empNum = parseInt(u.employment, 10) || 90;
      a.push({ text: 'I want to attend a university with strong employment outcomes and industry connections.',
        answer: empNum >= 97 ? 'strong' : empNum >= 90 ? 'agree' : 'neutral' });

      var firstProg = (u.programs && u.programs.length > 0) ? u.programs[0] : 'Sciences';
      a.push({ text: 'I have a genuine interest in ' + firstProg + ' as a potential area of study.',
        answer: u.match >= 82 ? 'strong' : u.match >= 62 ? 'agree' : (u.match >= 42 ? 'neutral' : 'disagree') });

      if (u.type === 'priv' || u.type === 'intl') {
        a.push({ text: 'I prefer smaller private universities that offer a more personalized academic community.',
          answer: u.match >= 75 ? 'agree' : 'neutral' });
      } else {
        a.push({ text: 'I am comfortable at large public universities that offer diverse academic opportunities.',
          answer: u.match >= 70 ? 'agree' : 'neutral' });
      }
      return a;
    }
    var LABELS = { agree:'Agree ✓', strong:'Strong ⚡', neutral:'Unsure –', disagree:'Disagree ✕' };

    var id = BD.param('u', 'fulbright');
    var u = (window.UNI_DATA || []).find(function (x) { return x.id === id; }) || UNI_DATA[0];
    var theme = getMatchTheme(u.match);
    document.title = 'Why I Match — ' + u.name;

    function goBack() { if (history.length > 1) history.back(); else location.href = '../../university/matches/'; }
    window.goBack = goBack;

    var assertions = getUniAssertions(u);
    var counts = { agree:0, strong:0, neutral:0, disagree:0 };
    assertions.forEach(function (a) { counts[a.answer]++; });

    var assertRows = assertions.map(function (a) {
      return '<div class="as-row row-line"><p>' + a.text + '</p>' +
        '<span class="as-chip ' + a.answer + '">' + LABELS[a.answer] + '</span></div>';
    }).join('');

    document.getElementById('root').innerHTML =
      '<div style="--acc:' + theme.primary + ';--acc-pct:' + theme.light + ';">' +
        '<button class="btn btn-ghost" onclick="goBack()" style="margin-bottom:18px;">← Back</button>' +
        '<h1 class="page-title">Why I Match 🔍</h1>' +
        '<div class="why-layout mt-6">' +
          '<div>' +
            '<div class="card why-hero">' +
              '<div class="ico">' + (u.icon || '🎓') + '</div>' +
              '<div><h1>' + u.name + '</h1><div class="rank">' + (u.ranking || '') + '</div></div>' +
              '<div class="why-pct"><b>' + u.match + '%</b><span>Match</span></div>' +
            '</div>' +
            '<div class="ai-box">' +
              '<div class="lbl">✦ AI Analysis</div>' +
              '<p>' + getUniInsight(u) + '</p>' +
            '</div>' +
            '<div class="card mt-6">' +
              '<span class="section-label">Answered assertions</span>' +
              '<div class="mt-4">' + assertRows + '</div>' +
            '</div>' +
          '</div>' +
          '<div>' +
            '<div class="card">' +
              '<span class="section-label">Response breakdown</span>' +
              '<div class="mt-4">' +
                '<div class="bd-row row-line"><span class="as-chip agree">Agree ✓</span><b>' + counts.agree + '</b></div>' +
                '<div class="bd-row row-line"><span class="as-chip strong">Strong agree ⚡</span><b>' + counts.strong + '</b></div>' +
                '<div class="bd-row row-line"><span class="as-chip neutral">Unsure –</span><b>' + counts.neutral + '</b></div>' +
                '<div class="bd-row"><span class="as-chip disagree">Disagree ✕</span><b>' + counts.disagree + '</b></div>' +
              '</div>' +
            '</div>' +
            '<a class="btn btn-primary mt-6" style="width:100%;" href="../../university/detail/?u=' + u.id + '">Explore this university →</a>' +
            '<a class="btn btn-ghost mt-2" style="width:100%;margin-top:10px;" href="../../university/matches/">← Back to results</a>' +
          '</div>' +
        '</div>' +
      '</div>';
  </script>
</body>
</html>
