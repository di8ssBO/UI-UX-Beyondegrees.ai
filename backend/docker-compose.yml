services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: beyondegrees
    ports: ['5432:5432']
    volumes: ['pgdata:/var/lib/postgresql/data']
  api:
    build: .
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/beyondegrees
      PGSSL: "false"
      JWT_SECRET: doi_secret_that_o_day_1234567890
      FANAR_API_URL: https://api.fanar.qa/v1/chat/completions
      FANAR_API_KEY: ${FANAR_API_KEY}
      AI_TIMEOUT_MS: "20000"
      CORS_ORIGINS: http://localhost:5173
    ports: ['3000:3000']
    depends_on: [db]
volumes:
  pgdata: {}