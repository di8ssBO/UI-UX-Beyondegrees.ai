<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BeyonDegrees.ai</title>
  <link rel="manifest" href="/mobile/manifest.json">
  <meta name="theme-color" content="#1a0533">
  <link rel="icon" type="image/png" sizes="192x192" href="/shared/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/shared/icons/icon-180.png">

  <!-- Device router: runs before paint, picks desktop vs mobile, then redirects.
       Override with ?v=mobile or ?v=desktop (remembered in localStorage). -->
  <script>
  (function () {
    var MOBILE = '/mobile/auth/index.html';
    var DESKTOP = '/desktop/auth/index.html';

    function detect() {
      // 1) Explicit override via query string wins, and is remembered.
      try {
        var q = new URL(location.href).searchParams.get('v');
        if (q === 'mobile' || q === 'desktop') {
          localStorage.setItem('bd-device', q);
          return q;
        }
      } catch (e) {}

      // 2) A previously remembered manual choice.
      try {
        var saved = localStorage.getItem('bd-device');
        if (saved === 'mobile' || saved === 'desktop') return saved;
      } catch (e) {}

      // 3) Auto-detect.
      var ua = navigator.userAgent || '';
      var uaMobile = /Android|webOS|iPhone|iPod|BlackBerry|IEMobile|Opera Mini|Mobile/i.test(ua);
      // iPadOS 13+ reports as "Macintosh"; disambiguate via touch support.
      var iPadOS = /Macintosh/.test(ua) && typeof document !== 'undefined' && 'ontouchend' in document;
      var coarse = window.matchMedia('(pointer: coarse)').matches;
      var narrow = window.matchMedia('(max-width: 1024px)').matches;

      return (uaMobile || iPadOS || (coarse && narrow)) ? 'mobile' : 'desktop';
    }

    var target = detect() === 'mobile' ? MOBILE : DESKTOP;
    // replace() so the router doesn't sit in the back-button history.
    location.replace(target + location.search);
  })();
  </script>

  <style>
    html, body { margin: 0; height: 100%; background: #1a0533; color: #fff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    .wrap { height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px; text-align: center; padding: 24px; }
    img { width: 72px; height: 72px; opacity: .95; }
    .spinner { width: 28px; height: 28px; border: 3px solid rgba(255,255,255,.25);
      border-top-color: #fff; border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .muted { color: rgba(255,255,255,.6); font-size: 14px; }
    .switch { margin-top: 10px; font-size: 13px; }
    .switch a { color: #c4b5fd; text-decoration: none; }
    .switch a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <!-- Shown only if JS is disabled or the redirect is slow. -->
  <div class="wrap">
    <img src="/shared/icons/icon-192.png" alt="BeyonDegrees">
    <div class="spinner" aria-hidden="true"></div>
    <div class="muted">Đang mở BeyonDegrees…</div>
    <div class="switch">
      <a href="/mobile/auth/index.html?v=mobile">Phiên bản Mobile</a>
      &nbsp;·&nbsp;
      <a href="/desktop/auth/index.html?v=desktop">Phiên bản Desktop</a>
    </div>
  </div>
</body>
</html>
