<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planet Milestone — BeyonDegrees.ai</title>
  <style>
/* ══════════════════════════════════════════════════
   BASE
══════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
}
body {
  font-family: var(--font);
  background: #06060f;
  color: #f8fafc;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 28px 16px 52px;
}

/* ── Header ── */
.page-eyebrow {
  font-size: 10px; letter-spacing: 2.5px; font-weight: 700;
  text-transform: uppercase; color: rgba(255,255,255,0.35);
  margin-bottom: 8px; text-align: center;
}
.page-headline {
  font-size: 24px; font-weight: 900; text-align: center;
  background: linear-gradient(135deg, #a78bfa 0%, #06d6a0 100%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.page-desc {
  font-size: 12px; color: rgba(255,255,255,0.4);
  text-align: center; margin-bottom: 28px;
}

/* ══════════════════════════════════════════════════
   DEVICE FRAME
══════════════════════════════════════════════════ */
.device-frame {
  width: 390px; height: 760px;
  border-radius: 48px;
  border: 2px solid rgba(255,255,255,0.1);
  overflow: hidden;
  background: #09041e;
  position: relative;
  box-shadow:
    0 0 0 8px rgba(124,58,237,0.06),
    0 60px 120px rgba(0,0,0,0.85),
    inset 0 0 60px rgba(124,58,237,0.05);
}
.device-notch {
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 126px; height: 34px;
  background: #06060f;
  border-radius: 0 0 22px 22px;
  z-index: 200;
}

/* ══════════════════════════════════════════════════
   LOADING SCREEN BACKGROUND (static placeholder)
══════════════════════════════════════════════════ */
.loading-bg {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center;
  padding-top: 44px;
  gap: 14px;
  background: radial-gradient(ellipse 80% 60% at 50% 30%, rgba(124,58,237,0.12) 0%, transparent 65%),
              #09041e;
}

/* Aurora blobs (bg) */
.aurora {
  position: absolute; inset: 0; pointer-events: none; overflow: hidden;
}
.blob {
  position: absolute; border-radius: 50%;
  filter: blur(60px); opacity: 0.25;
}
.blob1 { width:220px; height:200px; top:-40px; left:-40px; background:#4c1d95; }
.blob2 { width:180px; height:180px; top:80px; right:-50px; background:#0f766e; }
.blob3 { width:200px; height:160px; bottom:100px; left:20px; background:#1e3a8a; }
.blob4 { width:160px; height:180px; bottom:60px; right:10px; background:#6d28d9; }

/* BG story bar */
.bg-bar {
  position: absolute; top: 38px; left: 14px; right: 14px;
  display: flex; gap: 4px; z-index: 5;
}
.bg-seg {
  flex: 1; height: 3px; border-radius: 2px;
  background: rgba(255,255,255,0.12); overflow: hidden;
}
.bg-seg-fill { height:100%; border-radius:2px; background: linear-gradient(90deg,#7c3aed,#a78bfa); }

/* BG — Main Character canvas (replaces planet orb) */
#mcCanvas { display:block; width:160px; height:160px; margin-top:46px; flex-shrink:0; }

/* BG phase text */
.bg-phase { text-align:center; z-index:5; position:relative; }
.bg-phase-label {
  display:block; font-size:10px; font-weight:800;
  letter-spacing:2.5px; text-transform:uppercase;
  color:#a78bfa; margin-bottom:4px;
}
.bg-phase-title { font-size:19px; font-weight:800; color:#f8fafc; }

/* BG placeholder cards */
.bg-card {
  width: calc(100% - 28px);
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:16px; padding:14px;
  position:relative; z-index:5;
}
.bg-card-row {
  display:flex; align-items:center; gap:8px; margin-bottom:9px;
}
.bg-card-row:last-child { margin-bottom:0; }
.bg-dot { width:7px;height:7px;border-radius:50%;flex-shrink:0; }
.bg-bar-track {
  flex:1; height:6px; border-radius:3px;
  background:rgba(255,255,255,0.07); overflow:hidden;
}
.bg-bar-fill { height:100%; border-radius:3px; }

/* BG tab bar */
.bg-tabs {
  position:absolute; bottom:0; left:0; right:0;
  height:72px; background:rgba(9,4,30,0.92);
  border-top:1px solid rgba(255,255,255,0.07);
  backdrop-filter:blur(16px);
  display:flex; align-items:center; justify-content:space-around;
  padding-bottom:8px; z-index:10;
}
.bg-tab {
  display:flex; flex-direction:column; align-items:center; gap:3px;
  opacity:0.35;
}
.bg-tab.active { opacity:1; }
.bg-tab-icon { font-size:20px; }
.bg-tab-label { font-size:9px; color:#a78bfa; font-weight:600; }

/* ══════════════════════════════════════════════════
   PLANET MILESTONE OVERLAY
══════════════════════════════════════════════════ */
.planet-overlay {
  position:absolute; inset:0; z-index:50;
  display:flex; flex-direction:column; align-items:center;
  justify-content:flex-start;
  pointer-events:none;
  opacity:0;
  transition:opacity 0.4s ease;
}
.planet-overlay.visible {
  opacity:1;
  pointer-events:all;
}

/* Space background */
.po-bg {
  position:absolute; inset:0;
  background:#08031b;
  opacity:0; transition:opacity 0.35s ease;
}
.planet-overlay.visible .po-bg { opacity:0.97; }

/* Deep space star dust */
.po-stars {
  position:absolute; inset:0; overflow:hidden; pointer-events:none;
}

/* Central aurora glow */
.po-aurora {
  position:absolute;
  top:38%; left:50%;
  transform:translate(-50%,-50%);
  width:360px; height:360px;
  border-radius:50%;
  background:radial-gradient(ellipse at center,
    rgba(124,58,237,0.28) 0%,
    rgba(6,214,160,0.12) 45%,
    transparent 70%
  );
  pointer-events:none;
  opacity:0; transition:opacity 0.6s ease 0.15s;
  animation:none;
}
.planet-overlay.visible .po-aurora {
  opacity:1;
  animation:auroraBreath 3.5s ease-in-out infinite;
}
@keyframes auroraBreath {
  0%,100%{ transform:translate(-50%,-50%) scale(1); opacity:0.85; }
  50%    { transform:translate(-50%,-50%) scale(1.18); opacity:1; }
}

/* Story bar */
.po-story-bar {
  position:absolute; top:38px; left:14px; right:14px;
  display:flex; gap:4px; z-index:20;
  opacity:0; transition:opacity 0.3s ease 0.05s;
}
.planet-overlay.visible .po-story-bar { opacity:1; }
.po-seg {
  flex:1; height:3px; border-radius:2px;
  background:rgba(255,255,255,0.18); overflow:hidden;
}
.po-seg-fill {
  height:100%; border-radius:2px; width:0%;
  background:linear-gradient(90deg,#7c3aed,#a78bfa,#06d6a0);
  box-shadow:0 0 8px rgba(167,139,250,0.6);
  transition:width 0.4s ease;
}
.po-seg.done .po-seg-fill { width:100%; }

/* ── PLANET SYSTEM ── */
.po-system {
  position:relative;
  width:210px; height:210px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
  margin-top:180px; /* visual center with text below */
  opacity:0;
  transform:scale(0.2) rotate(-15deg);
}

/* Shockwave rings */
.shockwave {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%) scale(0);
  width:90px; height:90px; border-radius:50%;
  border:2.5px solid;
  opacity:0; pointer-events:none;
}
.sw1 { border-color:rgba(167,139,250,0.95); }
.sw2 { border-color:rgba(6,214,160,0.8); }
.sw3 { border-color:rgba(248,250,252,0.5); width:60px; height:60px; }
@keyframes shockOut {
  0%  { transform:translate(-50%,-50%) scale(0); opacity:0.95; }
  65% { opacity:0.5; }
  100%{ transform:translate(-50%,-50%) scale(4); opacity:0; }
}

/* Overlay Main Character canvas positioned via inline style */

/* ── Burst particles (fly out, then fade) ── */
.bp-anchor { position:absolute; top:50%; left:50%; width:0; height:0; }
.bp {
  position:absolute;
  width:13px; height:13px; border-radius:50%;
  transform:translate(-50%,-50%);
  opacity:0; pointer-events:none;
}
@keyframes bpFly0 { 0%{opacity:0;transform:translate(-50%,-50%) scale(0)} 25%{opacity:1;transform:translate(-50%,-50%) translateY(-100px) scale(1.5)} 70%{opacity:.7;transform:translate(-50%,-50%) translateY(-88px) scale(1)} 100%{opacity:0;transform:translate(-50%,-50%) translateY(-96px) scale(.7)} }
@keyframes bpFly1 { 0%{opacity:0;transform:translate(-50%,-50%) scale(0)} 25%{opacity:1;transform:translate(-50%,-50%) translate(86px,-50px) scale(1.5)} 70%{opacity:.7;transform:translate(-50%,-50%) translate(76px,-44px) scale(1)} 100%{opacity:0;transform:translate(-50%,-50%) translate(82px,-48px) scale(.7)} }
@keyframes bpFly2 { 0%{opacity:0;transform:translate(-50%,-50%) scale(0)} 25%{opacity:1;transform:translate(-50%,-50%) translate(86px,50px) scale(1.5)} 70%{opacity:.7;transform:translate(-50%,-50%) translate(76px,44px) scale(1)} 100%{opacity:0;transform:translate(-50%,-50%) translate(82px,48px) scale(.7)} }
@keyframes bpFly3 { 0%{opacity:0;transform:translate(-50%,-50%) scale(0)} 25%{opacity:1;transform:translate(-50%,-50%) translateY(100px) scale(1.5)} 70%{opacity:.7;transform:translate(-50%,-50%) translateY(88px) scale(1)} 100%{opacity:0;transform:translate(-50%,-50%) translateY(96px) scale(.7)} }
@keyframes bpFly4 { 0%{opacity:0;transform:translate(-50%,-50%) scale(0)} 25%{opacity:1;transform:translate(-50%,-50%) translate(-86px,50px) scale(1.5)} 70%{opacity:.7;transform:translate(-50%,-50%) translate(-76px,44px) scale(1)} 100%{opacity:0;transform:translate(-50%,-50%) translate(-82px,48px) scale(.7)} }
@keyframes bpFly5 { 0%{opacity:0;transform:translate(-50%,-50%) scale(0)} 25%{opacity:1;transform:translate(-50%,-50%) translate(-86px,-50px) scale(1.5)} 70%{opacity:.7;transform:translate(-50%,-50%) translate(-76px,-44px) scale(1)} 100%{opacity:0;transform:translate(-50%,-50%) translate(-82px,-48px) scale(.7)} }

/* ── Orbit particles (permanent after burst) ── */
.po-orbit {
  position:absolute; border-radius:50%;
  display:flex; align-items:flex-start; justify-content:center;
  top:50%; left:50%;
  opacity:0; transition:opacity 0.4s ease;
}
.po-o1{width:128px;height:128px;margin:-64px 0 0 -64px;animation:rspinCW 5.8s linear infinite;}
.po-o2{width:150px;height:150px;margin:-75px 0 0 -75px;animation:rspinCCW 8.2s linear infinite;}
.po-o3{width:114px;height:114px;margin:-57px 0 0 -57px;animation:rspinCW 4.9s linear infinite;}
.po-o4{width:140px;height:140px;margin:-70px 0 0 -70px;animation:rspinCCW 9.4s linear infinite;}
.po-o5{width:108px;height:108px;margin:-54px 0 0 -54px;animation:rspinCW 7.1s linear infinite;}
.po-o6{width:156px;height:156px;margin:-78px 0 0 -78px;animation:rspinCCW 11.5s linear infinite;}
.po-particle{width:11px;height:11px;border-radius:50%;margin-top:-5.5px;}
.pp-kt{background:rgba(139,92,246,.95);box-shadow:0 0 12px rgba(139,92,246,.95),0 0 28px rgba(139,92,246,.55);}
.pp-yt{background:rgba(6,214,160,.95); box-shadow:0 0 12px rgba(6,214,160,.95), 0 0 28px rgba(6,214,160,.55);}
.pp-nv{background:rgba(59,130,246,.95);box-shadow:0 0 12px rgba(59,130,246,.95),0 0 28px rgba(59,130,246,.55);}
.pp-nn{background:rgba(245,158,11,.95);box-shadow:0 0 12px rgba(245,158,11,.95),0 0 28px rgba(245,158,11,.55);}
.pp-xh{background:rgba(168,85,247,.95); box-shadow:0 0 12px rgba(168,85,247,.95),0 0 28px rgba(168,85,247,.55);}
.pp-tn{background:rgba(244,63,94,.95);  box-shadow:0 0 12px rgba(244,63,94,.95), 0 0 28px rgba(244,63,94,.55);}

/* ── Milestone text ── */
.po-text {
  position:relative; z-index:10;
  text-align:center;
  margin-top:20px;
  display:flex; flex-direction:column; align-items:center; gap:0;
}
.po-badge {
  display:inline-block;
  font-size:9px; letter-spacing:3px; text-transform:uppercase; font-weight:800;
  color:rgba(167,139,250,0.75);
  margin-bottom:10px;
  opacity:0; transform:translateY(8px);
}
.po-big-emoji {
  font-size:56px; line-height:1;
  margin-bottom:12px;
  opacity:0; transform:scale(0.3) rotate(-20deg);
  filter:drop-shadow(0 0 24px rgba(255,200,60,.5));
}
.po-title {
  font-size:30px; font-weight:900; line-height:1.1;
  background:linear-gradient(135deg, #c4b5fd 0%, #06d6a0 100%);
  -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:8px;
  opacity:0; transform:scale(0.8) translateY(14px);
}
.po-sub {
  font-size:15px; color:rgba(255,255,255,.6); line-height:1.4;
  opacity:0; transform:translateY(10px);
}
.po-xp {
  display:inline-flex; align-items:center; gap:7px;
  padding:8px 22px; border-radius:999px;
  background:rgba(167,139,250,.1);
  border:1px solid rgba(167,139,250,.35);
  font-size:14px; font-weight:800; color:#c4b5fd;
  margin-top:18px;
  backdrop-filter:blur(16px);
  box-shadow:0 0 24px rgba(167,139,250,.2), inset 0 1px 0 rgba(255,255,255,.08);
  opacity:0; transform:translateY(18px) scale(0.88);
  letter-spacing:0.3px;
}

/* Tap hint */
.po-hint {
  position:absolute; bottom:82px; left:0; right:0;
  text-align:center; font-size:11px;
  color:rgba(255,255,255,.25); letter-spacing:0.5px;
  z-index:20; opacity:0;
}

/* ══════════════════════════════════════════════════
   CONFETTI
══════════════════════════════════════════════════ */
.confetti {
  position:absolute; pointer-events:none; z-index:60;
  border-radius:2px;
}
@keyframes cFall {
  0%  { opacity:1; transform:translate(var(--cx),var(--cy)) rotate(0deg) scale(1); }
  85% { opacity:.8; }
  100%{ opacity:0; transform:translate(calc(var(--cx) + var(--dx)),calc(var(--cy) + 480px)) rotate(var(--spin)) scale(.5); }
}

/* ══════════════════════════════════════════════════
   SHARED KEYFRAMES
══════════════════════════════════════════════════ */
@keyframes rspinCW  { to{ transform:rotate(360deg);  } }
@keyframes rspinCCW { to{ transform:rotate(-360deg); } }

@keyframes sysIn {
  0%  { opacity:0; transform:scale(0.15) rotate(-20deg); }
  55% { opacity:1; transform:scale(1.1) rotate(5deg); }
  75% { transform:scale(0.95) rotate(-1.5deg); }
  90% { transform:scale(1.02) rotate(0.5deg); }
  100%{ opacity:1; transform:scale(1) rotate(0deg); }
}
@keyframes badgeIn  { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
@keyframes emojiIn  {
  0%  {opacity:0;transform:scale(.3) rotate(-20deg)}
  60% {opacity:1;transform:scale(1.25) rotate(8deg)}
  80% {transform:scale(.93) rotate(-3deg)}
  100%{opacity:1;transform:scale(1) rotate(0)}
}
@keyframes titleIn  {
  0%  {opacity:0;transform:scale(.8) translateY(14px)}
  65% {opacity:1;transform:scale(1.04) translateY(-3px)}
  100%{opacity:1;transform:scale(1) translateY(0)}
}
@keyframes subIn    { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
@keyframes xpIn     {
  0%  {opacity:0;transform:translateY(18px) scale(.88)}
  65% {opacity:1;transform:translateY(-4px) scale(1.05)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes hintIn   { from{opacity:0} to{opacity:1} }
@keyframes orbitIn  { from{opacity:0} to{opacity:1} }

/* ══════════════════════════════════════════════════
   CONTROLS
══════════════════════════════════════════════════ */
.controls {
  margin-top:28px; display:flex; flex-direction:column;
  align-items:center; gap:14px;
}
.ctrl-label {
  font-size:10px; letter-spacing:2px; text-transform:uppercase;
  color:rgba(255,255,255,.3); font-weight:600;
}
.btn-row { display:flex; gap:10px; }
.ctrl-btn {
  padding:11px 22px; border-radius:14px; border:none;
  font-size:13px; font-weight:800; cursor:pointer;
  font-family:var(--font);
  transition:transform .15s, box-shadow .15s;
  letter-spacing:.2px;
}
.ctrl-btn:hover  { transform:translateY(-3px); }
.ctrl-btn:active { transform:translateY(0); }
.btn-a { background:linear-gradient(135deg,#5b21b6,#a78bfa); color:#fff; box-shadow:0 6px 20px rgba(124,58,237,.55); }
.btn-b { background:linear-gradient(135deg,#065f46,#06d6a0); color:#fff; box-shadow:0 6px 20px rgba(6,214,160,.45); }
.btn-c { background:linear-gradient(135deg,#9a3412,#f97316); color:#fff; box-shadow:0 6px 20px rgba(249,115,22,.45); }
.btn-a:hover { box-shadow:0 10px 30px rgba(124,58,237,.7); }
.btn-b:hover { box-shadow:0 10px 30px rgba(6,214,160,.6); }
.btn-c:hover { box-shadow:0 10px 30px rgba(249,115,22,.6); }
  </style>
</head>
<body>

<p class="page-eyebrow">BeyonDegrees.ai — Concept Preview</p>
<h1 class="page-headline">Option B — Planet Burst Milestone</h1>
<p class="page-desc">Solar system celebration · Tap buttons below to trigger</p>

<div class="device-frame" id="deviceFrame">
  <div class="device-notch"></div>

  <!-- ░░ LOADING SCREEN BG ░░ -->
  <div class="loading-bg" id="loadingBg">
    <div class="aurora">
      <div class="blob blob1"></div><div class="blob blob2"></div>
      <div class="blob blob3"></div><div class="blob blob4"></div>
    </div>

    <div class="bg-bar">
      <div class="bg-seg" id="bgSeg0"><div class="bg-seg-fill" style="width:0%"></div></div>
      <div class="bg-seg" id="bgSeg1"><div class="bg-seg-fill" style="width:0%"></div></div>
      <div class="bg-seg" id="bgSeg2"><div class="bg-seg-fill" style="width:0%"></div></div>
      <div class="bg-seg" id="bgSeg3"><div class="bg-seg-fill" style="width:0%"></div></div>
      <div class="bg-seg" id="bgSeg4"><div class="bg-seg-fill" style="width:0%"></div></div>
    </div>

    <canvas id="mcCanvas" width="320" height="320"></canvas>

    <div class="bg-phase">
      <span class="bg-phase-label">ANALYZING</span>
      <h2 class="bg-phase-title">Your Academic DNA</h2>
    </div>

    <div class="bg-card">
      <div class="bg-card-row"><div class="bg-dot" style="background:#8b5cf6"></div><div class="bg-bar-track"><div class="bg-bar-fill" style="width:72%;background:linear-gradient(90deg,#7c3aed,#a78bfa)"></div></div></div>
      <div class="bg-card-row"><div class="bg-dot" style="background:#06d6a0"></div><div class="bg-bar-track"><div class="bg-bar-fill" style="width:45%;background:linear-gradient(90deg,#059669,#34d399)"></div></div></div>
      <div class="bg-card-row"><div class="bg-dot" style="background:#3b82f6"></div><div class="bg-bar-track"><div class="bg-bar-fill" style="width:60%;background:linear-gradient(90deg,#1d4ed8,#60a5fa)"></div></div></div>
      <div class="bg-card-row"><div class="bg-dot" style="background:#f59e0b"></div><div class="bg-bar-track"><div class="bg-bar-fill" style="width:28%;background:linear-gradient(90deg,#d97706,#fbbf24)"></div></div></div>
    </div>
  </div>

  <!-- ░░ PLANET MILESTONE OVERLAY ░░ -->
  <div class="planet-overlay" id="planetOverlay">
    <!-- Space bg + aurora -->
    <div class="po-bg"></div>
    <div class="po-aurora"></div>
    <div class="po-stars" id="poStars"></div>

    <!-- Story bar (updated per milestone) -->
    <div class="po-story-bar">
      <div class="po-seg" id="poSeg0"><div class="po-seg-fill"></div></div>
      <div class="po-seg" id="poSeg1"><div class="po-seg-fill"></div></div>
      <div class="po-seg" id="poSeg2"><div class="po-seg-fill"></div></div>
      <div class="po-seg" id="poSeg3"><div class="po-seg-fill"></div></div>
      <div class="po-seg" id="poSeg4"><div class="po-seg-fill"></div></div>
    </div>

    <!-- ── Planet system ── -->
    <div class="po-system" id="poSystem">
      <!-- Shockwave rings -->
      <div class="shockwave sw1" id="sw1"></div>
      <div class="shockwave sw2" id="sw2"></div>
      <div class="shockwave sw3" id="sw3"></div>

      <!-- Main Character canvas (overlay) -->
      <canvas id="mcCanvasOv" width="420" height="420" style="width:210px;height:210px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none"></canvas>

      <!-- poOrbEmoji kept hidden for JS compatibility -->
      <span id="poOrbEmoji" style="display:none"></span>

      <!-- Burst particles (fly out, fade) -->
      <div class="bp-anchor">
        <div class="bp" id="bp0" style="background:#8b5cf6;box-shadow:0 0 18px rgba(139,92,246,.95),0 0 40px rgba(139,92,246,.5)"></div>
        <div class="bp" id="bp1" style="background:#06d6a0;box-shadow:0 0 18px rgba(6,214,160,.95),0 0 40px rgba(6,214,160,.5)"></div>
        <div class="bp" id="bp2" style="background:#3b82f6;box-shadow:0 0 18px rgba(59,130,246,.95),0 0 40px rgba(59,130,246,.5)"></div>
        <div class="bp" id="bp3" style="background:#f59e0b;box-shadow:0 0 18px rgba(245,158,11,.95),0 0 40px rgba(245,158,11,.5)"></div>
        <div class="bp" id="bp4" style="background:#a855f7;box-shadow:0 0 18px rgba(168,85,247,.95),0 0 40px rgba(168,85,247,.5)"></div>
        <div class="bp" id="bp5" style="background:#f43f5e;box-shadow:0 0 18px rgba(244,63,94,.95),0 0 40px rgba(244,63,94,.5)"></div>
      </div>

      <!-- Orbit particles (continuous) -->
      <div class="po-orbit po-o1" id="po-o1"><div class="po-particle pp-kt"></div></div>
      <div class="po-orbit po-o2" id="po-o2"><div class="po-particle pp-yt"></div></div>
      <div class="po-orbit po-o3" id="po-o3"><div class="po-particle pp-nv"></div></div>
      <div class="po-orbit po-o4" id="po-o4"><div class="po-particle pp-nn"></div></div>
      <div class="po-orbit po-o5" id="po-o5"><div class="po-particle pp-xh"></div></div>
      <div class="po-orbit po-o6" id="po-o6"><div class="po-particle pp-tn"></div></div>
    </div>

    <!-- ── Text content ── -->
    <div class="po-text">
      <span class="po-badge"  id="poBadge">MILESTONE</span>
      <span class="po-big-emoji" id="poBigEmoji">🔥</span>
      <h2  class="po-title"  id="poTitle">1/3 Done!</h2>
      <p   class="po-sub"   id="poSub">Keep going! 💪</p>
      <div class="po-xp"    id="poXp">⚡ +10 XP</div>
    </div>

    <!-- Tap hint -->
    <div class="po-hint" id="poHint">Tap anywhere to continue</div>
  </div><!-- /planet-overlay -->

</div><!-- /device-frame -->

<div class="controls">
  <p class="ctrl-label">Trigger milestone</p>
  <div class="btn-row">
    <button class="ctrl-btn btn-a" onclick="triggerMilestone(1)">🔥 1/3 Done</button>
    <button class="ctrl-btn btn-b" onclick="triggerMilestone(2)">⚡ Halfway</button>
    <button class="ctrl-btn btn-c" onclick="triggerMilestone(3)">🚀 2/3 Done</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════
   PLANET MILESTONE ENGINE  —  Option B  —  BeyonDegrees.ai
═══════════════════════════════════════════════════════════ */
'use strict';

/* ── Data ── */
const MS_DATA = {
  1: {
    emoji:'🔥', orbEmoji:'🔥',
    title:'1/3 Done!', sub:'Keep going! 💪', badge:'MILESTONE 1/3', xp:'+10 XP',
    segs:[100,0,0,0,0],
    aurora:'rgba(124,58,237,.32)',
  },
  2: {
    emoji:'⚡', orbEmoji:'⚡',
    title:'Halfway!', sub:"You're on fire! 🌟", badge:'HALFWAY THERE', xp:'+20 XP',
    segs:[100,100,100,0,0],
    aurora:'rgba(6,214,160,.28)',
  },
  3: {
    emoji:'🚀', orbEmoji:'🚀',
    title:'2/3 Done!', sub:'Almost there! 🎯', badge:'2/3 COMPLETE', xp:'+25 XP',
    segs:[100,100,100,100,100],
    aurora:'rgba(249,115,22,.28)',
  },
};

const BP_ANIMS = ['bpFly0','bpFly1','bpFly2','bpFly3','bpFly4','bpFly5'];

let _active = false;
let _dismissTimer = null;

/* ── Stars (one-time setup) ── */
(function initStars() {
  const container = document.getElementById('poStars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    const size = Math.random() > 0.8 ? 2 : 1;
    const x = Math.random() * 100;
    const y = Math.random() * 100;
    const delay = (Math.random() * 3).toFixed(2);
    const dur   = (2 + Math.random() * 3).toFixed(2);
    s.style.cssText = `
      position:absolute; border-radius:50%;
      width:${size}px; height:${size}px;
      left:${x}%; top:${y}%;
      background:rgba(255,255,255,${(0.3 + Math.random() * 0.7).toFixed(2)});
      animation:starTwinkle ${dur}s ease-in-out ${delay}s infinite;
    `;
    container.appendChild(s);
  }
  // Add keyframe
  const style = document.createElement('style');
  style.textContent = `@keyframes starTwinkle{0%,100%{opacity:.2}50%{opacity:1}}`;
  document.head.appendChild(style);
})();

/* ── Trigger ── */
function triggerMilestone(n) {
  if (_active) {
    forceDismiss();
    setTimeout(() => triggerMilestone(n), 500);
    return;
  }
  _active = true;

  const ms  = MS_DATA[n];
  const ov  = document.getElementById('planetOverlay');
  const sys = document.getElementById('poSystem');

  /* 1. Populate content */
  document.getElementById('poBigEmoji').textContent = ms.emoji;
  document.getElementById('poOrbEmoji').textContent  = ms.orbEmoji;
  document.getElementById('poTitle').textContent      = ms.title;
  document.getElementById('poSub').textContent        = ms.sub;
  document.getElementById('poBadge').textContent      = ms.badge;
  document.getElementById('poXp').textContent         = '⚡ ' + ms.xp;

  /* Story bar */
  for (let i = 0; i < 5; i++) {
    const fill = document.querySelector('#poSeg' + i + ' .po-seg-fill');
    if (fill) { fill.style.width = (ms.segs[i] || 0) + '%'; }
    const seg = document.getElementById('poSeg' + i);
    if (seg) seg.classList.toggle('done', ms.segs[i] === 100);
  }

  /* Aurora color */
  document.querySelector('.po-aurora').style.background =
    `radial-gradient(ellipse at center, ${ms.aurora} 0%, rgba(6,214,160,.1) 45%, transparent 70%)`;

  /* 2. Show overlay */
  resetAll();
  ov.classList.add('visible');

  /* 3. Planet system springs in (t=80ms) */
  at(80, () => {
    sys.style.animation = 'sysIn .6s cubic-bezier(.34,1.25,.64,1) forwards';
  });

  /* 4. Shockwave + burst particles (t=320ms) */
  at(320, () => {
    fireShockwaves();
    fireBurstParticles();
  });

  /* 5. Confetti (t=360ms) */
  at(360, () => spawnConfetti(32));

  /* 6. Orbit particles fade in (t=580ms) */
  at(580, () => {
    document.querySelectorAll('.po-orbit').forEach((el, i) => {
      setTimeout(() => { el.style.opacity = '1'; }, i * 45);
    });
  });

  /* 7. Badge (t=640ms) */
  at(640, () => animate('poBadge', 'badgeIn .4s ease forwards'));

  /* 8. Big emoji (t=780ms) */
  at(780, () => animate('poBigEmoji', 'emojiIn .6s cubic-bezier(.34,1.3,.64,1) forwards'));

  /* 9. Title (t=960ms) */
  at(960, () => animate('poTitle', 'titleIn .55s cubic-bezier(.34,1.15,.64,1) forwards'));

  /* 10. Sub (t=1160ms) */
  at(1160, () => animate('poSub', 'subIn .4s ease forwards'));

  /* 11. XP (t=1340ms) */
  at(1340, () => animate('poXp', 'xpIn .55s cubic-bezier(.34,1.2,.64,1) forwards'));

  /* 12. Hint (t=1700ms) */
  at(1700, () => animate('poHint', 'hintIn .5s ease forwards'));

  /* 13. Auto-dismiss (t=3400ms) */
  _dismissTimer = setTimeout(dismiss, 3400);

  /* Tap to dismiss */
  ov.addEventListener('click', dismiss, { once: true });
}

/* ── Shockwaves ── */
function fireShockwaves() {
  ['sw1','sw2','sw3'].forEach((id, i) => {
    const el = document.getElementById(id);
    el.style.animation = `shockOut ${0.65 + i * 0.1}s ease-out ${i * 100}ms forwards`;
  });
}

/* ── Burst particles ── */
function fireBurstParticles() {
  for (let i = 0; i < 6; i++) {
    const el = document.getElementById('bp' + i);
    if (!el) continue;
    el.style.animation = `bpFly${i} .8s cubic-bezier(.34,1.1,.64,1) ${i * 28}ms forwards`;
  }
}

/* ── Confetti ── */
const CONFETTI_COLORS = ['#a78bfa','#06d6a0','#fbbf24','#f472b6','#60a5fa','#fb7185','#34d399'];
function spawnConfetti(n) {
  const frame = document.getElementById('deviceFrame');
  const fw = frame.offsetWidth;
  const fh = frame.offsetHeight;

  for (let i = 0; i < n; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    const cx    = (Math.random() * fw * .5 + fw * .25).toFixed(0) + 'px';
    const cy    = (fh * .36 + (Math.random() * 60 - 30)).toFixed(0) + 'px';
    const dx    = (Math.random() * 160 - 80).toFixed(0) + 'px';
    const spin  = (Math.random() * 720 - 360).toFixed(0) + 'deg';
    const dur   = (.75 + Math.random() * 1.1).toFixed(2) + 's';
    const delay = (Math.random() * .35).toFixed(2) + 's';
    const color = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
    const size  = (5 + Math.random() * 7).toFixed(0) + 'px';
    const round = Math.random() > .5;
    el.style.cssText = `
      left:0;top:0;
      width:${size};height:${size};
      border-radius:${round ? '50%' : '2px'};
      background:${color};
      --cx:${cx};--cy:${cy};--dx:${dx};--spin:${spin};
      animation:cFall ${dur} ease-out ${delay} forwards;
      opacity:0;
    `;
    frame.appendChild(el);
    setTimeout(() => el.remove(), (parseFloat(dur)+parseFloat(delay)+.5)*1000);
  }
}

/* ── Dismiss ── */
function dismiss() {
  if (!_active) return;
  clearTimeout(_dismissTimer);
  const ov = document.getElementById('planetOverlay');
  ov.style.transition = 'opacity .45s ease';
  ov.style.opacity    = '0';
  ov.removeEventListener('click', dismiss);
  setTimeout(() => {
    ov.classList.remove('visible');
    ov.style.opacity    = '';
    ov.style.transition = '';
    _active = false;
  }, 460);
}
function forceDismiss() {
  clearTimeout(_dismissTimer);
  const ov = document.getElementById('planetOverlay');
  ov.classList.remove('visible');
  ov.style.opacity = '';
  _active = false;
}

/* ── Reset ── */
function resetAll() {
  const sys = document.getElementById('poSystem');
  sys.style.animation = 'none';
  sys.style.opacity   = '0';
  sys.style.transform = 'scale(0.2) rotate(-15deg)';
  void sys.offsetWidth;

  /* Shockwaves */
  ['sw1','sw2','sw3'].forEach(id => {
    const el = document.getElementById(id);
    el.style.animation = 'none';
    void el.offsetWidth;
  });

  /* Burst particles */
  for (let i = 0; i < 6; i++) {
    const el = document.getElementById('bp' + i);
    if (!el) continue;
    el.style.animation = 'none';
    void el.offsetWidth;
  }

  /* Orbit particles */
  document.querySelectorAll('.po-orbit').forEach(el => {
    el.style.opacity = '0';
    el.style.transition = 'none';
    void el.offsetWidth;
    el.style.transition = '';
  });

  /* Text elements */
  ['poBadge','poBigEmoji','poTitle','poSub','poXp','poHint'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.style.animation = 'none';
    void el.offsetWidth;
  });

  /* Remove old confetti */
  document.querySelectorAll('#deviceFrame .confetti').forEach(el => el.remove());
}

/* ── Helpers ── */
function at(ms, fn) { return setTimeout(fn, ms); }
function animate(id, anim) {
  const el = document.getElementById(id);
  if (el) el.style.animation = anim;
}
</script>

<!-- ── Nhân Vật Chính — Main Character Animation ── -->
<script>
(function () {
  const COLORS = ['#8b5cf6','#06d6a0','#60a5fa','#fbbf24','#c084fc','#22d3ee'];
  const LABELS = ['KT','YT','NV','NN','XH','TN'];
  const TGT_A  = COLORS.map((_,i) => (i*60-90)*Math.PI/180);
  const ez  = p => p < .5 ? 2*p*p : 1-(-2*p+2)**2/2;
  const eo3 = p => 1-(1-p)**3;
  const clp = (v,a,b) => Math.max(a,Math.min(b,v));
  const rng = (t,a,b) => clp((t-a)/(b-a),0,1);
  const mix = (a,b,t) => a+(b-a)*t;

  function buildTokens() {
    return LABELS.map((label,i) => ({
      label, color: COLORS[i],
      chaos0: Math.random()*Math.PI*2,
      cDist:  22+Math.random()*32,
      cSpeed: (0.45+Math.random()*0.55)*(Math.random()<.5?1:-1),
    }));
  }

  function startAnim(cvs, ORBIT_R, CYCLE, tokens) {
    const ctx = cvs.getContext('2d');
    const W = cvs.width/2, H = cvs.height/2;
    const cx = W/2, cy = H/2;
    ctx.scale(2,2);
    let t0 = null;

    function frame(now) {
      if (!t0) t0 = now;
      const abs = (now-t0)/1000;
      const cyc = (now-t0) % CYCLE;
      ctx.clearRect(0,0,W,H);

      const settleP   = ez(rng(cyc, CYCLE*.22, CYCLE*.48));
      const convergeP = eo3(rng(cyc, CYCLE*.48, CYCLE*.62));
      const youP      = eo3(rng(cyc, CYCLE*.62, CYCLE*.72));
      const youFadeP  = rng(cyc, CYCLE*.72, CYCLE*.80);
      const scatterP  = eo3(rng(cyc, CYCLE*.78, CYCLE*.93));
      const dimP      = rng(cyc, CYCLE*.93, CYCLE);

      tokens.forEach((tk,i) => {
        const chaosA  = tk.chaos0 + tk.cSpeed*abs;
        const settledA = TGT_A[i];
        let da = settledA-chaosA;
        da = ((da+Math.PI*3)%(Math.PI*2))-Math.PI;
        const displayA = scatterP > 0
          ? mix(settledA, chaosA, scatterP)
          : mix(chaosA, chaosA+da, settleP);
        const displayDist = scatterP > 0
          ? mix(0, tk.cDist, scatterP)
          : mix(mix(tk.cDist, ORBIT_R, settleP), 0, convergeP);

        const x = cx+displayDist*Math.cos(displayA);
        const y = cy+displayDist*Math.sin(displayA);
        const alpha = (scatterP>0 ? scatterP : (1-convergeP)) * (1-dimP*.6);

        ctx.save();
        ctx.globalAlpha = alpha*.18*(0.5+settleP*.5);
        ctx.fillStyle = tk.color;
        ctx.beginPath(); ctx.arc(x,y,12,0,Math.PI*2); ctx.fill();
        ctx.restore();

        ctx.save();
        ctx.globalAlpha = Math.max(0,alpha);
        ctx.fillStyle   = tk.color;
        ctx.font = `800 ${9+3*settleP}px -apple-system,sans-serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(tk.label,x,y);
        ctx.restore();
      });

      // Dashed orbit ring
      if (settleP > .15 && convergeP < .8) {
        ctx.save();
        ctx.strokeStyle = `rgba(167,139,250,${Math.min(settleP,1-convergeP)*.22})`;
        ctx.lineWidth = .5; ctx.setLineDash([3,6]);
        ctx.beginPath(); ctx.arc(cx,cy,ORBIT_R,0,Math.PI*2); ctx.stroke();
        ctx.restore();
      }

      // YOU text
      const ya = eo3(youP)*Math.max(0,1-youFadeP);
      if (ya > .01) {
        ctx.save();
        ctx.globalAlpha = ya;
        ctx.strokeStyle = 'rgba(196,181,253,.5)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(cx,cy,28*eo3(youP),0,Math.PI*2); ctx.stroke();
        ctx.fillStyle = '#c4b5fd';
        ctx.font = `800 18px -apple-system,sans-serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('YOU',cx,cy);
        ctx.restore();
      }

      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }

  // BG loading canvas — subtle idle loop (6s)
  const bgCvs = document.getElementById('mcCanvas');
  if (bgCvs) startAnim(bgCvs, 46, 6000, buildTokens());

  // Overlay canvas — dramatic full loop (5s) with bigger orbit
  const ovCvs = document.getElementById('mcCanvasOv');
  if (ovCvs) startAnim(ovCvs, 72, 5000, buildTokens());
})();
</script>
