<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academic DNA Card — BeyonDegrees.ai</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* ── RESET & BASE ─────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bd-blue:       #1863DC;
      --bd-blue-2:     #0274BE;
      --bd-mint:       #06D6A0;
      --bd-orange:     #F97316;
      --bd-navy:       #1A1A2E;
      --bd-dark:       #0A0A1A;
      --card-bg:       rgba(255,255,255,0.05);
      --card-bg-hover: rgba(255,255,255,0.08);
      --card-border:   rgba(255,255,255,0.08);
      --card-border-h: rgba(24,99,220,0.45);
      --text-1: #FFFFFF;
      --text-2: rgba(255,255,255,0.65);
      --text-3: rgba(255,255,255,0.35);
      --text-blue: #6BA3FF;
      --grad-blue:  linear-gradient(135deg, #1863DC, #0274BE);
      --grad-bg:    linear-gradient(135deg, #0A0A1A 0%, #1A1A2E 55%, #0A0A1A 100%);
      --glow-blue:  0 12px 40px rgba(24,99,220,0.35);
      --glow-hover: 0 20px 50px rgba(24,99,220,0.4);
      --glow-btn:   0 8px 24px rgba(24,99,220,0.45);
      --r-sm: 8px; --r-md: 14px; --r-lg: 20px; --r-xl: 28px; --r-full: 100px;
      --font: 'Inter', -apple-system, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--grad-bg);
      min-height: 100vh;
      color: var(--text-1);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 64px;
      overflow-x: hidden;
    }

    /* ── AURORA BLOBS ─────────────────────────────── */
    .blob {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      animation: float 8s ease-in-out infinite;
      filter: blur(60px);
    }
    .blob-1 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(24,99,220,0.18) 0%, transparent 70%); top: -200px; right: -200px; }
    .blob-2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(6,214,160,0.12) 0%, transparent 70%); bottom: -100px; left: -100px; animation-delay: -3s; }
    .blob-3 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(24,99,220,0.10) 0%, transparent 70%); top: 40%; left: 20%; animation-delay: -5s; }
    @keyframes float {
      0%, 100% { transform: translateY(0px) scale(1); }
      50%       { transform: translateY(-20px) scale(1.03); }
    }

    /* ── PAGE WRAPPER ──────────────────────────────── */
    .page-wrapper { position: relative; z-index: 1; width: 100%; max-width: 520px; }

    /* ── HEADER ───────────────────────────────────── */
    .page-header {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-row {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-bottom: 8px;
    }
    .logo-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--grad-blue);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 900;
      box-shadow: var(--glow-blue);
    }
    .logo-text {
      font-size: 18px; font-weight: 800;
      background: linear-gradient(135deg, #fff, #6BA3FF);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .page-title {
      font-size: 13px; font-weight: 600;
      color: var(--text-3); letter-spacing: 2px; text-transform: uppercase;
    }

    /* ── CARD ─────────────────────────────────────── */
    .dna-card {
      width: 100%;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5), var(--glow-blue);
      position: relative;
    }

    /* Card inner gradient overlay */
    .card-gradient-top {
      position: absolute; top: 0; left: 0; right: 0; height: 160px;
      background: linear-gradient(180deg, rgba(24,99,220,0.25) 0%, transparent 100%);
      pointer-events: none; z-index: 0;
    }
    .card-content { position: relative; z-index: 1; padding: 28px 24px 24px; }

    /* ── CARD HEADER ──────────────────────────────── */
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px;
    }
    .card-label {
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: #6BA3FF;
      background: rgba(24,99,220,0.15);
      border: 1px solid rgba(24,99,220,0.3);
      padding: 4px 10px; border-radius: 100px;
    }
    .card-badge {
      width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg, rgba(24,99,220,0.3), rgba(6,214,160,0.2));
      border: 1px solid rgba(255,255,255,0.12);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    /* ── MAIN STAT ────────────────────────────────── */
    .main-stat { text-align: center; margin-bottom: 20px; }
    .main-pct {
      font-size: 72px; font-weight: 900; line-height: 1;
      background: linear-gradient(135deg, #1863DC, #6BA3FF, #06D6A0);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      display: block; margin-bottom: 4px;
    }
    .main-disc {
      font-size: 18px; font-weight: 800; color: #fff;
      margin-bottom: 6px;
    }
    .main-sub { font-size: 13px; color: var(--text-3); font-weight: 500; }

    /* ── DNA BARS ─────────────────────────────────── */
    .dna-bars { display: flex; flex-direction: column; gap: 10px; margin-bottom: 22px; }
    .dna-row { display: flex; align-items: center; gap: 10px; }
    .dna-icon { font-size: 14px; width: 20px; text-align: center; flex-shrink: 0; }
    .dna-name { font-size: 12px; font-weight: 600; color: var(--text-2); width: 130px; flex-shrink: 0; }
    .dna-bar-track {
      flex: 1; height: 6px; border-radius: 100px;
      background: rgba(255,255,255,0.08); overflow: hidden;
    }
    .dna-bar-fill {
      height: 100%; border-radius: 100px;
      transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .dna-pct { font-size: 12px; font-weight: 700; color: var(--text-2); width: 32px; text-align: right; flex-shrink: 0; }

    /* Bar color variants */
    .bar-blue  { background: linear-gradient(90deg, #1863DC, #6BA3FF); }
    .bar-mint  { background: linear-gradient(90deg, #06D6A0, #34D399); }
    .bar-violet{ background: linear-gradient(90deg, #8B5CF6, #A78BFA); }
    .bar-orange{ background: linear-gradient(90deg, #F97316, #FB923C); }
    .bar-teal  { background: linear-gradient(90deg, #0891B2, #22D3EE); }
    .bar-green { background: linear-gradient(90deg, #16A34A, #4ADE80); }

    /* ── TAGLINE ──────────────────────────────────── */
    .tagline {
      background: rgba(24,99,220,0.12);
      border: 1px solid rgba(24,99,220,0.25);
      border-radius: 14px;
      padding: 12px 16px;
      margin-bottom: 22px;
      text-align: center;
    }
    .tagline-text {
      font-size: 13px; font-weight: 600; color: #6BA3FF; line-height: 1.5;
    }

    /* ── SHARE SECTION ────────────────────────────── */
    .share-label {
      font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--text-3);
      margin-bottom: 12px; text-align: center;
    }
    .share-row {
      display: flex; gap: 10px; margin-bottom: 14px;
    }
    .share-btn {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 7px;
      padding: 11px 12px; border-radius: 12px; border: none;
      font-family: var(--font); font-size: 13px; font-weight: 700;
      cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none; color: #fff;
    }
    .share-btn:hover { transform: translateY(-2px); }
    .share-instagram {
      background: linear-gradient(135deg, #833AB4, #E1306C, #F77737);
      box-shadow: 0 4px 16px rgba(225,48,108,0.4);
    }
    .share-instagram:hover { box-shadow: 0 8px 24px rgba(225,48,108,0.5); }
    .share-tiktok {
      background: linear-gradient(135deg, #010101, #69C9D0);
      box-shadow: 0 4px 16px rgba(105,201,208,0.3);
    }
    .share-tiktok:hover { box-shadow: 0 8px 24px rgba(105,201,208,0.4); }
    .share-copy {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: none;
    }
    .share-copy:hover { background: rgba(255,255,255,0.13); border-color: rgba(24,99,220,0.4); }

    /* ── CTA ──────────────────────────────────────── */
    .cta-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 14px; border-radius: 14px; border: none;
      background: var(--grad-blue);
      color: #fff; font-family: var(--font); font-size: 15px; font-weight: 800;
      cursor: pointer; text-decoration: none;
      box-shadow: var(--glow-btn);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .cta-btn:hover { transform: translateY(-2px); box-shadow: var(--glow-hover); }

    /* ── CONTROLS (below card) ───────────────────── */
    .controls {
      display: flex; gap: 10px; margin-top: 20px; justify-content: center; flex-wrap: wrap;
    }
    .ctrl-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 18px; border-radius: 100px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      color: var(--text-2); font-family: var(--font);
      font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .ctrl-btn:hover { background: rgba(24,99,220,0.15); border-color: rgba(24,99,220,0.4); color: #fff; transform: translateY(-1px); }
    .ctrl-btn.active { background: rgba(24,99,220,0.2); border-color: rgba(24,99,220,0.5); color: #6BA3FF; }

    /* ── TOAST ────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: rgba(6,214,160,0.15); backdrop-filter: blur(16px);
      border: 1px solid rgba(6,214,160,0.35); border-radius: 100px;
      padding: 10px 20px; color: #06D6A0; font-size: 13px; font-weight: 700;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 999; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── BOTTOM NAV HINT ──────────────────────────── */
    .bottom-hint {
      margin-top: 28px; text-align: center;
      font-size: 12px; color: var(--text-3);
    }
    .bottom-hint a { color: #6BA3FF; text-decoration: none; font-weight: 600; }
    .bottom-hint a:hover { color: #fff; }
  </style>
</head>
<body>

  <!-- Aurora blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="page-wrapper">

    <!-- Header -->
    <div class="page-header">
      <div class="logo-row">
        <div class="logo-icon">B</div>
        <span class="logo-text">BeyonDegrees.ai</span>
      </div>
      <div class="page-title">Academic DNA · Shareable Card</div>
    </div>

    <!-- DNA Card -->
    <div class="dna-card" id="dnaCard">
      <div class="card-gradient-top"></div>
      <div class="card-content">

        <!-- Card Header -->
        <div class="card-header">
          <div class="card-label">🧬 Academic DNA</div>
          <div class="card-badge">✨</div>
        </div>

        <!-- Main Stat -->
        <div class="main-stat">
          <span class="main-pct" id="mainPct">67%</span>
          <div class="main-disc" id="mainDisc">Engineering &amp; Tech</div>
          <div class="main-sub" id="mainSub">Your strongest academic match</div>
        </div>

        <!-- DNA Bars -->
        <div class="dna-bars" id="dnaBars">
          <!-- Rendered by JS -->
        </div>

        <!-- Tagline -->
        <div class="tagline">
          <div class="tagline-text" id="taglineText">
            Your Academic DNA: <strong>67% Engineering</strong> | <strong>52% Humanities</strong>
          </div>
        </div>

        <!-- Share -->
        <div class="share-label">Share your results</div>
        <div class="share-row">
          <button class="share-btn share-instagram" onclick="handleShare('instagram')">
            <span>📸</span> Instagram
          </button>
          <button class="share-btn share-tiktok" onclick="handleShare('tiktok')">
            <span>🎵</span> TikTok
          </button>
          <button class="share-btn share-copy" onclick="handleShare('copy')">
            <span>🔗</span> Copy
          </button>
        </div>

        <!-- CTA -->
        <a href="../onboarding/home/" class="cta-btn">
          Discover yours <span>→</span>
        </a>

      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="ctrl-btn active" id="btn0" onclick="loadProfile(0)">👤 Tech Profile</button>
      <button class="ctrl-btn" id="btn1" onclick="loadProfile(1)">🎨 Arts Profile</button>
      <button class="ctrl-btn" id="btn2" onclick="loadProfile(2)">🔬 Science Profile</button>
    </div>

    <div class="bottom-hint">
      ← <a href="./match-reveal/">Back to Results</a> &nbsp;·&nbsp; <a href="../../index.html">All Screens</a>
    </div>

  </div>

  <!-- Toast -->
  <div class="toast" id="toast">✓ Link copied to clipboard!</div>

  <script>
    const PROFILES = [
      {
        name: 'Tech Profile',
        mainPct: '67%',
        mainDisc: 'Engineering &amp; Tech',
        mainSub: 'Your strongest academic match',
        tagline: 'Your Academic DNA: <strong>67% Engineering</strong> | <strong>52% Humanities</strong>',
        bars: [
          { icon: '⚡', name: 'Engineering & Tech',  pct: 67, cls: 'bar-blue'   },
          { icon: '📚', name: 'Humanities',           pct: 52, cls: 'bar-violet' },
          { icon: '🔬', name: 'Natural Sciences',     pct: 48, cls: 'bar-teal'   },
          { icon: '🩺', name: 'Health & Medicine',    pct: 35, cls: 'bar-mint'   },
          { icon: '🌐', name: 'Social Sciences',      pct: 30, cls: 'bar-orange' },
          { icon: '🌾', name: 'Agriculture',           pct: 15, cls: 'bar-green'  },
        ]
      },
      {
        name: 'Arts Profile',
        mainPct: '81%',
        mainDisc: 'Humanities',
        mainSub: 'Your strongest academic match',
        tagline: 'Your Academic DNA: <strong>81% Humanities</strong> | <strong>60% Social Sciences</strong>',
        bars: [
          { icon: '📚', name: 'Humanities',           pct: 81, cls: 'bar-violet' },
          { icon: '🌐', name: 'Social Sciences',      pct: 60, cls: 'bar-orange' },
          { icon: '⚡', name: 'Engineering & Tech',   pct: 38, cls: 'bar-blue'   },
          { icon: '🩺', name: 'Health & Medicine',    pct: 32, cls: 'bar-mint'   },
          { icon: '🔬', name: 'Natural Sciences',     pct: 28, cls: 'bar-teal'   },
          { icon: '🌾', name: 'Agriculture',           pct: 12, cls: 'bar-green'  },
        ]
      },
      {
        name: 'Science Profile',
        mainPct: '74%',
        mainDisc: 'Natural Sciences',
        mainSub: 'Your strongest academic match',
        tagline: 'Your Academic DNA: <strong>74% Natural Sciences</strong> | <strong>65% Health &amp; Medicine</strong>',
        bars: [
          { icon: '🔬', name: 'Natural Sciences',     pct: 74, cls: 'bar-teal'   },
          { icon: '🩺', name: 'Health & Medicine',    pct: 65, cls: 'bar-mint'   },
          { icon: '⚡', name: 'Engineering & Tech',   pct: 55, cls: 'bar-blue'   },
          { icon: '🌾', name: 'Agriculture',           pct: 40, cls: 'bar-green'  },
          { icon: '🌐', name: 'Social Sciences',      pct: 22, cls: 'bar-orange' },
          { icon: '📚', name: 'Humanities',           pct: 18, cls: 'bar-violet' },
        ]
      }
    ];

    let currentProfile = 0;

    function renderBars(bars) {
      const container = document.getElementById('dnaBars');
      container.innerHTML = bars.map(b => `
        <div class="dna-row">
          <span class="dna-icon">${b.icon}</span>
          <span class="dna-name">${b.name}</span>
          <div class="dna-bar-track">
            <div class="dna-bar-fill ${b.cls}" style="width:0%" data-target="${b.pct}%"></div>
          </div>
          <span class="dna-pct">${b.pct}%</span>
        </div>
      `).join('');
      // Animate bars in
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          container.querySelectorAll('.dna-bar-fill').forEach(el => {
            el.style.width = el.dataset.target;
          });
        });
      });
    }

    function loadProfile(idx) {
      currentProfile = idx;
      const p = PROFILES[idx];
      document.getElementById('mainPct').textContent = p.mainPct;
      document.getElementById('mainDisc').innerHTML = p.mainDisc;
      document.getElementById('mainSub').textContent = p.mainSub;
      document.getElementById('taglineText').innerHTML = p.tagline;
      renderBars(p.bars);
      // Update button states
      document.querySelectorAll('.ctrl-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i === idx);
      });
    }

    function handleShare(platform) {
      const msg = {
        instagram: '📸 Opening Instagram Stories...',
        tiktok: '🎵 Opening TikTok...',
        copy: '✓ Link copied to clipboard!'
      };
      showToast(msg[platform]);
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2800);
    }

    // Init
    loadProfile(0);
  </script>
</body>
</html>
