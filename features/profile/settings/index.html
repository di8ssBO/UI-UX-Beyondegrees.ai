<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Account Settings — BeyonDegrees.ai</title>
  <link rel="stylesheet" href="../../../design-system/tokens.css">
  <link rel="stylesheet" href="../../../design-system/base.css">
  <link rel="stylesheet" href="../../../design-system/components/interactive.css">
  <link rel="stylesheet" href="../../../design-system/components/display.css">
  <link rel="stylesheet" href="../../../design-system/components/navigation.css">
  <link rel="stylesheet" href="../../../design-system/animations.css">
  <link rel="stylesheet" href="../../../design-system/layout.css">
<style>
:root,:root[data-theme="dark"]{--violet-950:#06091A;--violet-900:#0A0F28;--violet-800:#0F2060;--violet-700:#1358C4;--violet-600:#1863DC;--violet-500:#0274BE;--violet-400:#6BA3FF;--violet-300:#93BBFF;--violet-200:#B8D4FF;--violet-100:#DCE9FF;--shadow-violet:0 8px 24px rgba(24,99,220,0.35);--shadow-violet-sm:0 4px 12px rgba(24,99,220,0.20);--glow-violet:0 20px 50px rgba(24,99,220,0.40);--glow-violet-sm:0 12px 30px rgba(24,99,220,0.28)}
/* Light-mode token overrides live in design-system/tokens.css */
[data-theme="light"] body{background:#06060f!important;color:#f8fafc!important}
*,*::before,*::after{transition:background-color .3s ease,border-color .3s ease,color .2s ease,box-shadow .3s ease}
svg *,canvas,video,img{transition:none!important}

body { background: #06060f; }

.mobile-viewport {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  display: flex; flex-direction: column;
  position: relative; background: var(--bg-base);
  scrollbar-width: none;
}
.mobile-viewport::-webkit-scrollbar { display: none; }
[data-theme="light"] .mobile-viewport {
  background:
    url("../../../shared/bg-light.svg") center top / cover no-repeat,
    linear-gradient(180deg, #fdf8f2 0%, #f5ede0 50%, #ede1cf 100%) !important;
}
[data-theme="light"] .device-frame { border-color: #1a1a2e !important; }
[data-theme="light"] .breadcrumb-item,
[data-theme="light"] .breadcrumb-separator { color: rgba(255,255,255,0.45) !important; }
[data-theme="light"] .breadcrumb-item.active { color: rgba(255,255,255,0.85) !important; }
[data-theme="light"] .status-bar { color: #2c1f14 !important; }

/* Top bar */
.top-bar {
  position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; gap: 12px;
  padding: 12px 18px 14px;
  background: rgba(6,6,15,0.88);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
[data-theme="light"] .top-bar {
  background: rgba(253,248,242,0.78) !important;
  -webkit-backdrop-filter: blur(20px) saturate(140%);
  backdrop-filter: blur(20px) saturate(140%);
  border-bottom: 1px solid rgba(232,224,213,0.65) !important;
}
[data-theme="light"] .page-title { color: #2c1f14 !important; font-weight: 800 !important; }

.back-btn {
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-primary); cursor: pointer; text-decoration: none;
  transition: background 0.18s; flex-shrink: 0;
}
.back-btn:hover { background: rgba(255,255,255,0.10); }
[data-theme="light"] .back-btn {
  background: rgba(255,255,255,0.85) !important;
  border: 1px solid rgba(201,107,85,0.35) !important;
  color: #a84e30 !important;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.65), 0 2px 6px rgba(201,107,85,0.10) !important;
}
[data-theme="light"] .back-btn:hover {
  background: linear-gradient(135deg, rgba(232,145,122,0.18) 0%, rgba(201,107,85,0.22) 100%) !important;
  border-color: rgba(201,107,85,0.55) !important;
}
.page-title { font-size: 16px; font-weight: 700; color: var(--text-primary); }

/* Page content */
.page-content { position: relative; z-index: 1; padding: 20px 16px 24px; }

/* Settings group */
.settings-group {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 18px; overflow: hidden; margin-bottom: 12px;
}
[data-theme="light"] .settings-group {
  background: rgba(255,255,255,0.92) !important;
  -webkit-backdrop-filter: blur(20px) saturate(140%);
  backdrop-filter: blur(20px) saturate(140%);
  border: 1px solid rgba(140,114,96,0.22) !important;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,1),
    0 1px 3px rgba(58,46,38,0.06),
    0 6px 16px rgba(140,114,96,0.10) !important;
}

.settings-row {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px; cursor: pointer;
  transition: background 0.18s ease;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  text-decoration: none;
}
.settings-row:last-child { border-bottom: none; }
.settings-row:hover { background: rgba(255,255,255,0.04); }
[data-theme="light"] .settings-row { border-bottom-color: rgba(140,114,96,0.18) !important; }
[data-theme="light"] .settings-row:hover { background: rgba(201,107,85,0.06) !important; }

.row-icon {
  width: 34px; height: 34px; border-radius: 9px;
  background: rgba(24,99,220,0.12);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; color: var(--violet-400);
}
/* Light mode — 4-palette rotation per row icon */
[data-theme="light"] .settings-row:nth-child(4n+1) .row-icon {
  background: linear-gradient(135deg, rgba(232,145,122,0.22) 0%, rgba(201,107,85,0.28) 100%) !important;
  border: 1px solid rgba(201,107,85,0.40) !important;
  color: #a84e30 !important;
}
[data-theme="light"] .settings-row:nth-child(4n+2) .row-icon {
  background: linear-gradient(135deg, rgba(127,168,190,0.26) 0%, rgba(74,135,168,0.30) 100%) !important;
  border: 1px solid rgba(74,135,168,0.40) !important;
  color: #2f6a8c !important;
}
[data-theme="light"] .settings-row:nth-child(4n+3) .row-icon {
  background: linear-gradient(135deg, rgba(168,200,196,0.30) 0%, rgba(106,150,144,0.32) 100%) !important;
  border: 1px solid rgba(106,150,144,0.40) !important;
  color: #3a5c56 !important;
}
[data-theme="light"] .settings-row:nth-child(4n+4) .row-icon {
  background: linear-gradient(135deg, rgba(216,204,191,0.55) 0%, rgba(140,114,96,0.25) 100%) !important;
  border: 1px solid rgba(140,114,96,0.42) !important;
  color: #6b5440 !important;
}
.row-body { flex: 1; display: flex; flex-direction: column; gap: 1px; }
.row-label { font-size: 14px; font-weight: 600; color: var(--text-primary); }
[data-theme="light"] .row-label { color: #2c1f14 !important; font-weight: 700 !important; }
.row-right { display: flex; align-items: center; gap: 6px; }
.row-value { font-size: 13px; color: var(--text-muted); }
[data-theme="light"] .row-value { color: #6b5440 !important; font-weight: 600 !important; }
.row-chevron { color: var(--text-muted); display: flex; align-items: center; }
[data-theme="light"] .row-chevron { color: #8c7260 !important; }

/* Toggle */
.toggle-wrap { display: flex; align-items: center; }
.toggle { position: relative; width: 46px; height: 26px; cursor: pointer; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-track { position: absolute; inset: 0; border-radius: 100px; background: var(--neutral-600); transition: background 0.25s ease; }
.toggle input:checked ~ .toggle-track { background: #1863DC; }
[data-theme="light"] .toggle-track { background: rgba(140,114,96,0.30) !important; }
[data-theme="light"] .toggle input:checked ~ .toggle-track {
  background: linear-gradient(135deg, #e8917a 0%, #c96b55 50%, #a84e30 100%) !important;
  box-shadow: 0 2px 8px rgba(201,107,85,0.25) !important;
}
.toggle-thumb { position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; border-radius: 50%; background: #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.3); transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1); }
.toggle input:checked ~ .toggle-thumb { transform: translateX(20px); }

/* Destructive */
.row-destructive .row-icon { background: rgba(255,71,87,0.12); color: #ff4757; }
.row-destructive .row-label { color: #ff4757; }
[data-theme="light"] .settings-row.row-destructive .row-icon,
[data-theme="light"] .settings-row.row-destructive:nth-child(4n+1) .row-icon,
[data-theme="light"] .settings-row.row-destructive:nth-child(4n+2) .row-icon,
[data-theme="light"] .settings-row.row-destructive:nth-child(4n+3) .row-icon,
[data-theme="light"] .settings-row.row-destructive:nth-child(4n+4) .row-icon {
  background: linear-gradient(135deg, rgba(216,135,118,0.30) 0%, rgba(196,85,64,0.28) 100%) !important;
  border: 1px solid rgba(196,85,64,0.50) !important;
  color: #c45540 !important;
}
[data-theme="light"] .row-destructive .row-label { color: #c45540 !important; }

/* ── Bottom sheet scoped to device-frame ── */
.sheet-overlay {
  position: absolute; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.55);
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease;
  backdrop-filter: blur(4px);
}
.sheet-overlay.open { opacity: 1; pointer-events: all; }
/* Light mode — warm-tint backdrop instead of cold black */
[data-theme="light"] .sheet-overlay {
  background: rgba(44,31,20,0.45) !important;
  -webkit-backdrop-filter: blur(8px) saturate(120%);
  backdrop-filter: blur(8px) saturate(120%);
}

.bottom-sheet {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 201;
  background: var(--bg-elevated);
  border-top-left-radius: 24px; border-top-right-radius: 24px;
  border-top: 1px solid rgba(255,255,255,0.08);
  transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.34,1.2,0.64,1);
  box-shadow: 0 -8px 40px rgba(0,0,0,0.4);
}
.bottom-sheet.open { transform: translateY(0); }
[data-theme="light"] .bottom-sheet {
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(232,145,122,0.10) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 100% 0%, rgba(127,168,190,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 0% 0%, rgba(168,200,196,0.08) 0%, transparent 70%),
    #ffffff !important;
  border: 1.5px solid rgba(201,107,85,0.32) !important;
  border-bottom: none !important;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.85),
    0 -2px 12px rgba(201,107,85,0.14),
    0 -8px 40px rgba(140,114,96,0.20),
    0 -16px 60px rgba(74,135,168,0.12) !important;
}
/* Top palette accent strip — 4-color brand signature */
[data-theme="light"] .bottom-sheet::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg,
    #c96b55 0%, #c96b55 25%,
    #4a87a8 25%, #4a87a8 50%,
    #6a9690 50%, #6a9690 75%,
    #8c7260 75%, #8c7260 100%);
  border-radius: 24px 24px 0 0;
  pointer-events: none;
  opacity: 0.85;
}

.sheet-handle { width: 36px; height: 4px; border-radius: 100px; background: rgba(255,255,255,0.15); margin: 10px auto 0; }
[data-theme="light"] .sheet-handle { background: rgba(140,114,96,0.30) !important; }

.sheet-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px 10px; }
.sheet-title { font-size: 16px; font-weight: 700; color: var(--text-primary); }
[data-theme="light"] .sheet-title { color: #2c1f14 !important; font-weight: 800 !important; }
.sheet-close { width: 30px; height: 30px; border-radius: 50%; background: rgba(255,255,255,0.08); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-muted); transition: background 0.18s; }
.sheet-close:hover { background: rgba(255,255,255,0.14); }
[data-theme="light"] .sheet-close {
  background: linear-gradient(135deg, rgba(216,204,191,0.50) 0%, rgba(140,114,96,0.20) 100%) !important;
  color: #6b5440 !important;
  border: 1px solid rgba(140,114,96,0.40) !important;
}
[data-theme="light"] .sheet-close:hover {
  background: linear-gradient(135deg, rgba(232,145,122,0.22) 0%, rgba(201,107,85,0.28) 100%) !important;
  color: #a84e30 !important;
  border-color: rgba(201,107,85,0.45) !important;
}

.sheet-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 0 20px; }
[data-theme="light"] .sheet-divider { background: rgba(140,114,96,0.18) !important; }

.sheet-options { padding: 6px 0 20px; }
.sheet-option {
  display: flex; align-items: center; justify-content: space-between;
  padding: 15px 20px; cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  transition: background 0.18s; color: var(--text-primary);
  font-size: 15px; font-weight: 500;
}
.sheet-option:last-child { border-bottom: none; }
.sheet-option:hover { background: rgba(255,255,255,0.04); }
[data-theme="light"] .sheet-option { color: #2c1f14 !important; font-weight: 600 !important; border-bottom-color: rgba(140,114,96,0.14) !important; }
[data-theme="light"] .sheet-option:hover { background: rgba(201,107,85,0.06) !important; }

.sheet-option-left { display: flex; align-items: center; gap: 12px; }
.sheet-opt-icon { width: 30px; height: 30px; border-radius: 8px; background: rgba(24,99,220,0.10); display: flex; align-items: center; justify-content: center; color: var(--violet-400); flex-shrink: 0; }
.sheet-option[data-selected="true"] .sheet-opt-icon { background: rgba(24,99,220,0.18); }
/* Light mode — palette rotation for sheet option icons */
[data-theme="light"] .sheet-option:nth-child(4n+1) .sheet-opt-icon {
  background: linear-gradient(135deg, rgba(232,145,122,0.22) 0%, rgba(201,107,85,0.28) 100%) !important;
  border: 1px solid rgba(201,107,85,0.40) !important;
  color: #a84e30 !important;
}
[data-theme="light"] .sheet-option:nth-child(4n+2) .sheet-opt-icon {
  background: linear-gradient(135deg, rgba(127,168,190,0.26) 0%, rgba(74,135,168,0.30) 100%) !important;
  border: 1px solid rgba(74,135,168,0.40) !important;
  color: #2f6a8c !important;
}
[data-theme="light"] .sheet-option:nth-child(4n+3) .sheet-opt-icon {
  background: linear-gradient(135deg, rgba(168,200,196,0.30) 0%, rgba(106,150,144,0.32) 100%) !important;
  border: 1px solid rgba(106,150,144,0.40) !important;
  color: #3a5c56 !important;
}
[data-theme="light"] .sheet-option:nth-child(4n+4) .sheet-opt-icon {
  background: linear-gradient(135deg, rgba(216,204,191,0.55) 0%, rgba(140,114,96,0.25) 100%) !important;
  border: 1px solid rgba(140,114,96,0.42) !important;
  color: #6b5440 !important;
}
[data-theme="light"] .sheet-option[data-selected="true"] .sheet-opt-icon {
  background: linear-gradient(135deg, rgba(232,145,122,0.40) 0%, rgba(201,107,85,0.45) 100%) !important;
  border-color: rgba(201,107,85,0.55) !important;
  color: #a84e30 !important;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.55), 0 2px 6px rgba(201,107,85,0.18) !important;
}

.sheet-check { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
.sheet-option[data-selected="true"] .sheet-check { opacity: 1; color: #1863DC; }
[data-theme="light"] .sheet-option[data-selected="true"] .sheet-check { color: #a84e30 !important; }
</style>
</head>

<body>
<div class="breadcrumb" style="margin:var(--space-4) var(--space-6) 0">
  <a href="../../../" class="breadcrumb-item">BeyonDegrees-UI</a>
  <span class="breadcrumb-separator">/</span>
  <a href="../../profile/overview/" class="breadcrumb-item">Profile</a>
  <span class="breadcrumb-separator">/</span>
  <span class="breadcrumb-item active">Account Settings</span>
</div>

<div class="desktop-container">
  <div class="device-frame">
    <div class="device-notch"></div>

    <div class="mobile-viewport">
      <div class="status-bar">
        <span>9:41</span>
        <div class="status-icons">
          <svg width="14" height="10" viewBox="0 0 14 10" fill="currentColor"><rect x="0" y="3" width="2" height="7" rx="1"/><rect x="3" y="2" width="2" height="8" rx="1"/><rect x="6" y="0" width="2" height="10" rx="1"/><rect x="9" y="1" width="2" height="9" rx="1"/></svg>
          <svg width="16" height="10" viewBox="0 0 16 10" fill="currentColor"><rect x="1" y="1" width="11" height="8" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="2.5" y="2.5" width="7" height="5" rx="1"/><rect x="13" y="3" width="2" height="4" rx="1"/></svg>
        </div>
      </div>

      <!-- Top bar -->
      <div class="top-bar">
        <a href="../../profile/overview/" class="back-btn" aria-label="Back">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15,18 9,12 15,6"/></svg>
        </a>
        <span class="page-title">Account Settings</span>
      </div>

      <!-- Content -->
      <div class="page-content">

        <!-- Preferences -->
        <div class="settings-group">
          <div class="settings-row">
            <div class="row-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
            </div>
            <div class="row-body"><span class="row-label">Language</span></div>
            <div class="row-right">
              <span class="row-value">English</span>
              <div class="row-chevron"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9,18 15,12 9,6"/></svg></div>
            </div>
          </div>

          <div class="settings-row" onclick="openThemeSheet()">
            <div class="row-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
            </div>
            <div class="row-body"><span class="row-label">Theme</span></div>
            <div class="row-right">
              <span class="row-value" id="theme-row-value">Dark</span>
              <div class="row-chevron"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9,18 15,12 9,6"/></svg></div>
            </div>
          </div>

          <div class="settings-row" style="cursor:default;">
            <div class="row-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
            </div>
            <div class="row-body"><span class="row-label">Notifications</span></div>
            <div class="toggle-wrap">
              <label class="toggle">
                <input type="checkbox" checked id="notif-toggle">
                <div class="toggle-track"></div>
                <div class="toggle-thumb"></div>
              </label>
            </div>
          </div>
        </div>

        <!-- Danger zone -->
        <div class="settings-group">
          <div class="settings-row row-destructive">
            <div class="row-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </div>
            <span class="row-label">Log Out</span>
            <div class="row-right"><div class="row-chevron" style="color:#ff4757"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9,18 15,12 9,6"/></svg></div></div>
          </div>
        </div>

        <div class="settings-group">
          <div class="settings-row row-destructive">
            <div class="row-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,6 5,6 21,6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            </div>
            <span class="row-label">Delete Account</span>
            <div class="row-right"><div class="row-chevron" style="color:#ff4757"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9,18 15,12 9,6"/></svg></div></div>
          </div>
        </div>

      </div><!-- /page-content -->
    </div><!-- /mobile-viewport -->

    <!-- ── THEME BOTTOM SHEET (scoped inside device-frame) ── -->
    <div class="sheet-overlay" id="sheetOverlay" onclick="closeThemeSheet()"></div>
    <div class="bottom-sheet" id="themeSheet">
      <div class="sheet-handle"></div>
      <div class="sheet-header">

<script>
/* ── Apply theme immediately (prevents flash, no DOM needed) ── */
(function(){
  var p='dark';try{p=localStorage.getItem('bd-theme')||'dark'}catch(e){}
  var r=p==='system'?(window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark'):p;
  document.documentElement.setAttribute('data-theme',r);
  document.documentElement.setAttribute('data-theme-pref',p);
})();

/* ── Theme logic (single source of truth, no naming conflicts) ── */
var _currentPref='dark';

function bdApplyTheme(r){document.documentElement.setAttribute('data-theme',r);}

function updateThemeUI(pref){
  var labels={dark:'Dark',light:'Light',system:'System'};
  var el=document.getElementById('theme-row-value');
  if(el) el.textContent=labels[pref]||'Dark';
  document.querySelectorAll('.sheet-option').forEach(function(o){
    o.setAttribute('data-selected', o.dataset.pref===pref?'true':'false');
  });
}

function bdSetTheme(p){
  var r=p==='system'?(window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark'):p;
  bdApplyTheme(r);
  document.documentElement.setAttribute('data-theme-pref',p);
  _currentPref=p;
  try{localStorage.setItem('bd-theme',p);}catch(e){}
  updateThemeUI(p);
}
window.bdSetTheme=bdSetTheme;

function openThemeSheet(){
  document.getElementById('themeSheet').classList.add('open');
  document.getElementById('sheetOverlay').classList.add('open');
}
function closeThemeSheet(){
  document.getElementById('themeSheet').classList.remove('open');
  document.getElementById('sheetOverlay').classList.remove('open');
}
function selectTheme(pref){
  bdSetTheme(pref);
  setTimeout(closeThemeSheet,320);
}

/* ── Init UI labels once DOM is ready ── */
document.addEventListener('DOMContentLoaded',function(){
  var saved='dark';try{saved=localStorage.getItem('bd-theme')||'dark';}catch(e){}
  _currentPref=saved;
  updateThemeUI(saved);
});

window.matchMedia('(prefers-color-scheme:light)').addEventListener('change',function(){
  var pref=document.documentElement.getAttribute('data-theme-pref')||'dark';
  if(pref==='system') bdSetTheme('system');
});
</script>
</body>
</html>
