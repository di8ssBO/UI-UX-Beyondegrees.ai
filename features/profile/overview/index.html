<style>
:root,:root[data-theme="dark"]{--violet-950:#06091A;--violet-900:#0A0F28;--violet-800:#0F2060;--violet-700:#1358C4;--violet-600:#1863DC;--violet-500:#0274BE;--violet-400:#6BA3FF;--violet-300:#93BBFF;--violet-200:#B8D4FF;--violet-100:#DCE9FF;--shadow-violet:0 8px 24px rgba(24,99,220,0.35);--shadow-violet-sm:0 4px 12px rgba(24,99,220,0.20);--glow-violet:0 20px 50px rgba(24,99,220,0.40);--glow-violet-sm:0 12px 30px rgba(24,99,220,0.28)}
:root[data-theme="light"]{--violet-600:#1863DC;--violet-500:#0274BE;--violet-400:#1863DC;--violet-300:#4A90E2;--violet-200:#93BBFF;--violet-100:#EEF4FB;--neutral-950:#FFFFFF;--neutral-900:#F2F7FD;--neutral-800:#E0ECFA;--neutral-700:#C5D5E8;--neutral-600:#A8BDD8;--neutral-500:#808DAA;--neutral-400:#5A6580;--neutral-300:#3A3A4A;--neutral-200:#1A1A2E;--neutral-100:#0D0D1A;--neutral-50:#060610;--bg-base:#FFFFFF;--bg-surface:#F2F7FD;--bg-elevated:#E0ECFA;--bg-overlay:#C5D5E8;--text-primary:#1A1A2E;--text-secondary:#3A3A4A;--text-muted:#808285;--text-disabled:#C0C0D0;--mint-500:#059669;--mint-400:#10B981}
[data-theme="light"] body{background:#0f1020!important;color:#1A1A2E!important}
*,*::before,*::after{transition:background-color .3s ease,border-color .3s ease,color .2s ease,box-shadow .3s ease}
svg *,canvas,video,img{transition:none!important}

body { background: #06060f; }

.mobile-viewport {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  display: flex; flex-direction: column;
  position: relative;
  background: var(--bg-base);
  scrollbar-width: none;
}
.mobile-viewport::-webkit-scrollbar { display: none; }
[data-theme="light"] .mobile-viewport { background: #f2f7fd; }

.profile-content { padding: 8px 16px 24px; }

/* Orb ambient */
.orb-top {
  position: absolute; top: -100px; right: -100px; z-index: 0;
  width: 280px; height: 280px; border-radius: 50%;
  background: radial-gradient(circle, rgba(24,99,220,0.12) 0%, transparent 70%);
  pointer-events: none;
}
.orb-bot {
  position: absolute; bottom: -80px; left: -80px; z-index: 0;
  width: 220px; height: 220px; border-radius: 50%;
  background: radial-gradient(circle, rgba(2,116,190,0.08) 0%, transparent 70%);
  pointer-events: none;
}

/* Profile hero card */
.profile-hero {
  margin: 12px 0 16px;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 24px;
  padding: 28px 20px;
  text-align: center;
  position: relative; z-index: 1;
}
[data-theme="light"] .profile-hero {
  background: rgba(255,255,255,0.88) !important;
  border-color: rgba(24,99,220,0.12) !important;
  box-shadow: 0 4px 24px rgba(24,99,220,0.08);
}

.avatar-wrap { position: relative; width: 80px; height: 80px; margin: 0 auto 14px; }
.avatar {
  width: 80px; height: 80px; border-radius: 50%;
  background: linear-gradient(135deg, #1863DC, #0274BE);
  display: flex; align-items: center; justify-content: center;
  font-size: 30px; font-weight: 800; color: #fff; letter-spacing: -1px;
  border: 3px solid rgba(24,99,220,0.35);
  box-shadow: 0 0 0 4px rgba(24,99,220,0.12);
}
.avatar-cam {
  position: absolute; bottom: 0; right: 0;
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--bg-elevated);
  border: 2px solid var(--bg-base);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}
[data-theme="light"] .avatar-cam { background: #d0e3f5; border-color: #fff; }

.profile-name { font-size: 18px; font-weight: 800; color: var(--text-primary); margin-bottom: 3px; letter-spacing: -0.01em; }
.profile-bio { font-size: 12px; color: var(--text-muted); }

/* Settings group */
.settings-group {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 18px; overflow: hidden; margin-bottom: 12px;
  position: relative; z-index: 1;
}
[data-theme="light"] .settings-group {
  background: rgba(255,255,255,0.88) !important;
  border-color: rgba(24,99,220,0.12) !important;
  box-shadow: 0 2px 12px rgba(24,99,220,0.06);
}

.settings-row {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px;
  text-decoration: none; cursor: pointer;
  transition: background 0.18s ease;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  position: relative;
}
[data-theme="light"] .settings-row { border-bottom-color: rgba(24,99,220,0.07) !important; }
.settings-row:last-child { border-bottom: none; }
.settings-row:hover { background: rgba(255,255,255,0.04); }
[data-theme="light"] .settings-row:hover { background: rgba(24,99,220,0.04) !important; }

.row-icon {
  width: 34px; height: 34px; border-radius: 9px;
  background: rgba(24,99,220,0.12);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; color: var(--violet-400);
}
[data-theme="light"] .row-icon { background: rgba(24,99,220,0.10); }

.row-label { flex: 1; font-size: 14px; font-weight: 600; color: var(--text-primary); }
.row-chevron { color: var(--text-muted); display: flex; align-items: center; }

/* ── Tab Bar — light mode explicit fix ──────────────── */
[data-theme="light"] .float-tab-bar {
  background: rgba(255,255,255,0.98) !important;
  border-color: rgba(0,0,0,0.07) !important;
  box-shadow: 0 -1px 0 rgba(0,0,0,0.05), 0 4px 24px rgba(0,0,0,0.09) !important;
}
[data-theme="light"] .tab-item {
  color: rgba(26,26,46,0.45) !important;
}
[data-theme="light"] .tab-item svg,
[data-theme="light"] .tab-item .tab-icon {
  color: rgba(26,26,46,0.45) !important;
}
[data-theme="light"] .tab-item.active {
  background: rgba(24,99,220,0.10) !important;
  color: #1863DC !important;
  border-color: rgba(24,99,220,0.14) !important;
  box-shadow: none !important;
}
[data-theme="light"] .tab-item.active svg,
[data-theme="light"] .tab-item.active .tab-icon {
  color: #1863DC !important;
}
[data-theme="light"] .tab-item:hover:not(.tab-disabled) {
  color: rgba(26,26,46,0.65) !important;
}
</style>
</head>

<script>
(function(){function a(r){document.documentElement.setAttribute('data-theme',r)}function b(p){var r=p==='system'?(window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark'):p;a(r);document.documentElement.setAttribute('data-theme-pref',p);try{localStorage.setItem('bd-theme',p)}catch(e){}}window.bdSetTheme=b;var s='dark';try{s=localStorage.getItem('bd-theme')||'dark'}catch(e){}b(s);window.matchMedia('(prefers-color-scheme: light)').addEventListener('change',function(){var p=document.documentElement.getAttribute('data-theme-pref')||'dark';if(p==='system')b('system')})})();
document.addEventListener('DOMContentLoaded', function() {
  const tabBar=document.getElementById('floatTabBar');
  if(tabBar){const tabs=tabBar.querySelectorAll('.tab-item');tabs.forEach(t=>{t.addEventListener('click',e=>{if(t.href&&t.href!=='#'&&!t.href.endsWith('#'))return;e.preventDefault();tabs.forEach(x=>x.classList.remove('active'));t.classList.add('active')})});}
});
</script>
