<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdf8f2"/>
      <stop offset="0.5" stop-color="#f5ede0"/>
      <stop offset="1" stop-color="#ede1cf"/>
    </linearGradient>

    <linearGradient id="ribbon-blue" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0" stop-color="#a3c2d3" stop-opacity="0.62"/>
      <stop offset="0.55" stop-color="#c4d9e5" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#a3c2d3" stop-opacity="0.28"/>
    </linearGradient>

    <linearGradient id="ribbon-coral" x1="0" y1="0.2" x2="1" y2="0.5">
      <stop offset="0" stop-color="#f8cfc2" stop-opacity="0.60"/>
      <stop offset="0.55" stop-color="#f2b09d" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#e8917a" stop-opacity="0.30"/>
    </linearGradient>

    <linearGradient id="ribbon-terra" x1="0.1" y1="0" x2="1" y2="0.5">
      <stop offset="0" stop-color="#e8917a" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#f2b09d" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#c4b5fd" stop-opacity="0.28"/>
    </linearGradient>

    <linearGradient id="ribbon-sage" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0" stop-color="#a8c8c4" stop-opacity="0.45"/>
      <stop offset="0.55" stop-color="#c5d9d7" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#a3c2d3" stop-opacity="0.22"/>
    </linearGradient>

    <linearGradient id="ribbon-blush" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f8cfc2" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#f2b09d" stop-opacity="0.20"/>
    </linearGradient>

    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Cream gradient base -->
  <rect width="400" height="900" fill="url(#bg)"/>

  <!-- R1 · Dusty blue ribbon, top arc -->
  <path d="M -60,90 C 100,40 230,180 480,90 L 480,210 C 320,260 160,170 -60,240 Z"
        fill="url(#ribbon-blue)" filter="url(#soft)"/>

  <!-- R2 · Coral peach ribbon, mid-top sweep -->
  <path d="M -60,250 C 80,200 200,340 360,260 C 430,235 480,250 480,275 L 480,355
           C 380,410 240,330 90,390 C 20,415 -30,395 -60,365 Z"
        fill="url(#ribbon-coral)" filter="url(#soft)"/>

  <!-- R3 · Terra → lavender ribbon, mid -->
  <path d="M -60,430 C 110,380 240,540 400,450 C 445,430 480,445 480,475 L 480,560
           C 370,615 220,540 80,580 C 0,605 -35,585 -60,560 Z"
        fill="url(#ribbon-terra)" filter="url(#soft)"/>

  <!-- R4 · Sage / blue ribbon, mid-bottom -->
  <path d="M -60,630 C 120,580 260,730 420,640 C 460,620 480,640 480,660 L 480,740
           C 360,780 220,710 80,750 C 0,770 -35,755 -60,735 Z"
        fill="url(#ribbon-sage)" filter="url(#soft)"/>

  <!-- R5 · Blush ribbon, bottom edge -->
  <path d="M -60,810 C 100,770 280,860 480,790 L 480,920 L -60,920 Z"
        fill="url(#ribbon-blush)" filter="url(#soft)"/>

  <!-- Decorative spheres (brand balls) -->
  <circle cx="318" cy="118" r="13" fill="#e8917a" opacity="0.62"/>
  <circle cx="320" cy="116" r="5"  fill="#fceae4" opacity="0.55"/>

  <circle cx="64"  cy="320" r="9"  fill="#a3c2d3" opacity="0.55"/>
  <circle cx="65"  cy="318" r="3"  fill="#e0ecf3" opacity="0.55"/>

  <circle cx="350" cy="500" r="11" fill="#c96b55" opacity="0.48"/>
  <circle cx="86"  cy="700" r="9"  fill="#a8c8c4" opacity="0.55"/>
  <circle cx="296" cy="828" r="7"  fill="#c084fc" opacity="0.32"/>

  <!-- Striped sphere (like brand image top-right) -->
  <g transform="translate(338, 70)" opacity="0.24">
    <circle r="20" fill="none" stroke="#5c4535" stroke-width="0.55"/>
    <line x1="-16" y1="-8" x2="16" y2="-8" stroke="#5c4535" stroke-width="0.55"/>
    <line x1="-18" y1="-4" x2="18" y2="-4" stroke="#5c4535" stroke-width="0.55"/>
    <line x1="-19" y1="0"  x2="19" y2="0"  stroke="#5c4535" stroke-width="0.55"/>
    <line x1="-18" y1="4"  x2="18" y2="4"  stroke="#5c4535" stroke-width="0.55"/>
    <line x1="-16" y1="8"  x2="16" y2="8"  stroke="#5c4535" stroke-width="0.55"/>
  </g>

  <!-- Subtle terracotta dot accent near radar bottom -->
  <circle cx="180" cy="850" r="4" fill="#c96b55" opacity="0.35"/>
</svg>
