<!DOCTYPE html>
<html lang="en" data-device="mobile" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BeyonDegrees.ai Auth</title>
  <link rel="manifest" href="/mobile/manifest.json">
  <meta name="theme-color" content="#080813">
  <link rel="icon" type="image/png" sizes="192x192" href="/shared/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/shared/icons/icon-180.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    (function () {
      var theme = "dark";
      try {
        var q = new URL(location.href).searchParams.get("theme");
        var saved = localStorage.getItem("bd-theme");
        theme = q === "light" || q === "dark" ? q : (saved === "light" || saved === "dark" ? saved : "dark");
      } catch (error) {}
      document.documentElement.setAttribute("data-device", "mobile");
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
  <link rel="stylesheet" href="/shared/auth/auth.css">
</head>
<body class="auth-body auth-device-mobile" data-device="mobile" data-mode="login">
  <button id="auth-theme-toggle" class="auth-theme-toggle" type="button" aria-label="Toggle theme">
    <span class="auth-theme-icon" aria-hidden="true"></span>
    <span class="auth-theme-text">Light mode</span>
  </button>
  <main class="auth-mobile-shell" aria-label="BeyonDegrees authentication">
    <div class="auth-mobile-backdrop"></div>
    <div class="auth-mobile-content">
      <div class="auth-mobile-card-area">
        <div id="auth-card" class="auth-card-root"></div>
      </div>
    </div>
  </main>
  <script src="/shared/auth/auth.js" defer></script>
</body>
</html>
