/* ═══════════════════════════════════════════════════════════
   Match % (from localStorage or deterministic seed)
═══════════════════════════════════════════════════════════ */
function getMatchPct(id){
  try{const r=JSON.parse(localStorage.getItem('quizResults')||'{}');if(r[id])return r[id];}catch(e){}
  return ((id*17+31)%30)+62;
}

/* ═══════════════════════════════════════════════════════════
   Apply disc color CSS vars
═══════════════════════════════════════════════════════════ */
function applyColor(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const rgb=`${r},${g},${b}`;
  const root=document.documentElement;
  root.style.setProperty('--disc-primary',hex);
  root.style.setProperty('--disc-light',lighten(hex,.2));
  root.style.setProperty('--disc-lighter',lighten(hex,.4));
  root.style.setProperty('--disc-glow',`rgba(${rgb},.50)`);
  root.style.setProperty('--disc-glow-sm',`rgba(${rgb},.25)`);
  root.style.setProperty('--disc-bg',`rgba(${rgb},.12)`);
  root.style.setProperty('--disc-border',`rgba(${rgb},.30)`);
}
function lighten(hex,amt){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,Math.round(r+(255-r)*amt));
  g=Math.min(255,Math.round(g+(255-g)*amt));
  b=Math.min(255,Math.round(b+(255-b)*amt));
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}

/* ═══════════════════════════════════════════════════════════
   Build bullet summary from description
═══════════════════════════════════════════════════════════ */
function getBullets(major, disc){
  // 3 characteristic bullets extracted from description sentences
  const sentences = major.desc.replace(/\n/g,' ').split(/(?<=[.!?])\s+/).filter(s=>s.length>30);
  const picks = sentences.slice(0,3).map(s=>s.replace(/^(This field|This discipline|It )/i,'').trim());
  if(picks.length < 3 && disc){
    picks.push((window.BDi18n ? window.BDi18n.t('major.detail.bullet_fallback') : 'Part of the {disc} discipline.').replace(/\{disc\}/g, disc.title));
  }
  return picks.slice(0,3);
}

/* ═══════════════════════════════════════════════════════════
   Designer Picker — hiện khi không có ?id=
═══════════════════════════════════════════════════════════ */
function showPicker(){
  const body = document.getElementById('detailBody');

  const groups = {};
  MAJORS_DATA.forEach(m => {
    const disc = DISCIPLINES[String(m.discId)] || {title:'Other', color:'#6b6b9a', icon:'📌'};
    if(!groups[m.discId]) groups[m.discId] = { disc, majors:[] };
    groups[m.discId].majors.push(m);
  });

  const rows = Object.values(groups).map(g => `
    <div style="margin-bottom:20px">
      <div style="font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
        color:${g.disc.color};margin-bottom:8px;padding:0 2px">
        ${g.disc.icon} ${g.disc.title}
      </div>
      ${g.majors.map(m=>`
        <div onclick="location.search='?id=${m.id}'"
          style="display:flex;align-items:center;gap:12px;padding:11px 14px;
            background:#12121f;border:1px solid rgba(255,255,255,.07);border-radius:12px;
            margin-bottom:7px;cursor:pointer;transition:background .15s"
          onmouseover="this.style.background='#1a1a2e'"
          onmouseout="this.style.background='#12121f'">
          <span style="font-size:18px">${m.icon||g.disc.icon}</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:700;color:#f8fafc;
              white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.title}</div>
          </div>
          <span style="font-size:12px;color:${g.disc.color};font-weight:800">→</span>
        </div>
      `).join('')}
    </div>
  `).join('');

  const _t = window.BDi18n ? window.BDi18n.t.bind(window.BDi18n) : k => k;
  body.innerHTML = `
    <div style="padding-bottom:8px">
      <div style="font-size:15px;font-weight:800;color:#f8fafc;margin-bottom:4px">
        ${_t('major.detail.picker_title')}
      </div>
      <div style="font-size:12px;color:#6b6b9a;margin-bottom:20px">
        ${MAJORS_DATA.length} ${_t('major.detail.picker_sub')}
      </div>
      ${rows}
    </div>
  `;

  // Hide hero, simplify header
  document.getElementById('hero').style.display = 'none';
  document.getElementById('pageTitle').textContent = _t('major.detail.title') || 'Major Detail';
}

/* ═══════════════════════════════════════════════════════════
   Main Render
═══════════════════════════════════════════════════════════ */
function render(){
  const params = new URLSearchParams(window.location.search);
  const rawId  = params.get('id');
  const body   = document.getElementById('detailBody');

  // No data file loaded at all
  if(typeof MAJORS_DATA === 'undefined'){
    body.innerHTML=`<div class="not-found">
      <div class="not-found-icon">⚠️</div>
      <div class="not-found-title">majors-data.js not loaded</div>
      <div class="not-found-sub">Make sure <code style="color:#a78bfa">majors-data.js</code> is in the same directory as this HTML file.<br><br>If opening directly in a browser (file://), try using Live Server in VS Code.</div>
    </div>`;
    return;
  }

  // No ?id= → show picker
  if(!rawId){
    showPicker();
    return;
  }

  const id = parseInt(rawId);
  const major = MAJORS_DATA.find(m=>m.id===id);
  if(!major){
    const _tnf = window.BDi18n ? window.BDi18n.t.bind(window.BDi18n) : k => k;
    body.innerHTML=`<div class="not-found"><div class="not-found-icon">😕</div><div class="not-found-title">${_tnf('major.detail.not_found').replace('{id}', id)}</div><div class="not-found-sub"><a href="./" style="color:var(--violet-400)">${_tnf('major.detail.go_back')}</a>.</div></div>`;
    return;
  }

  const disc    = major.discId ? DISCIPLINES[String(major.discId)] : null;
  const color   = disc ? disc.color : '#7c3aed';
  const discTitle  = disc ? (disc.short || disc.title) : (window.BDi18n ? window.BDi18n.t('major.detail.general') : 'General');
  const discIcon   = disc ? disc.icon : '📌';
  const discCode   = major.discCode || '';
  const matchPct   = getMatchPct(id);
  const specs      = SPECIALIZATIONS[id] || getFallbackSpecs(major);
  const bullets    = getBullets(major, disc);

  // ── Colors ──
  applyColor(color);

  // ── Breadcrumb ──
  document.getElementById('bcTitle').textContent = major.title;

  // ── Page title ──
  document.getElementById('pageTitle').textContent = major.title.length > 22
    ? major.title.slice(0,20)+'…' : major.title;
  document.title = `${major.title} — BeyonDegrees.ai`;

  // ── Hero aurora ──
  const hex=color.slice(1);
  const r2=parseInt(hex.slice(0,2),16),g2=parseInt(hex.slice(2,4),16),b2=parseInt(hex.slice(4,6),16);
  const ra=`rgba(${r2},${g2},${b2}`;
  document.getElementById('heroAurora').style.background=
    `radial-gradient(ellipse 110% 80% at 30% 40%,${ra},.55) 0%,${ra},.28) 45%,transparent 75%),`
    +`radial-gradient(ellipse 70% 60% at 80% 70%,${ra},.22) 0%,transparent 60%),`
    +`radial-gradient(ellipse 90% 100% at 50% 100%,rgba(6,4,14,.80) 0%,transparent 70%),`
    +`linear-gradient(160deg,rgba(${r2},${g2},${b2},.25) 0%,#0a080e 40%,#060408 100%)`;

  // ── Hero waves ──
  document.getElementById('heroWaves').innerHTML = buildWavesSVG(color);

  // ── Hero label ──
  document.getElementById('heroName').textContent = major.title;
  document.getElementById('heroMatchPct').textContent = matchPct + '%';
  document.getElementById('heroTag').innerHTML =
    `<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/></svg>
     ${discIcon} ${discTitle}`;

  // ── CHEV SVG ──
  const CHEV='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>';

  // ── i18n helper ──
  var t = function(k) { return window.BDi18n ? BDi18n.t(k) : k; };

  // ── Body ──
  body.innerHTML = `
    <!-- Tagline -->
    <p class="detail-desc">${major.title}: ${discTitle} ${t('major.detail.pathway')}</p>

    <!-- Bullets -->
    <div class="detail-bullets">
      ${bullets.map(b=>`
        <div class="detail-bullet">
          <span class="bullet-check">
            <svg viewBox="0 0 12 12" fill="none" stroke="${color}" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <polyline points="2,6 5,9 10,3"/>
            </svg>
          </span>
          <span>${b}</span>
        </div>
      `).join('')}
    </div>

    <!-- Why I Match -->
    <a class="why-banner" href="../../discipline/why/index.html${discCode ? '?disc='+discCode : ''}">
      <div class="why-icon-box">🔍</div>
      <div class="why-text">
        <div class="why-title">${t('major.detail.why_title')}</div>
        <div class="why-sub">${t('major.detail.why_sub')}</div>
      </div>
      <div class="why-arrow">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M13 6l6 6-6 6"/>
        </svg>
      </div>
    </a>

    <!-- Specializations -->
    <div class="section-header">${t('major.detail.specializations')}</div>
    <div class="spec-list">
      ${specs.map((s,i)=>`
        <div class="spec-card" onclick="location.href='../spec-detail/?majorId=${id}&specIdx=${i}'" style="cursor:pointer">
          <div class="spec-icon">${s.icon}</div>
          <div class="spec-info">
            <div class="spec-name">${s.name}</div>
            <div class="spec-sub">${s.desc}</div>
            <div class="spec-tag" style="${tagStyle(s.tag)}">${s.tag}</div>
          </div>
          <div class="spec-right">${CHEV}</div>
        </div>
      `).join('')}
    </div>
  `;

  // ── CTA ──

}

/* ── Quiz CTA: Finish Quiz (20-29), ẩn khi >= 30 ────────────────────── */
(function () {
  const progress = parseInt(localStorage.getItem('quizProgress') || '0', 10);
  const wrap = document.getElementById('quizCtaWrap');
  const btn  = document.getElementById('quizCtaBtn');
  if (!wrap || !btn) return;
  if (progress >= 20 && progress < 30) {
    wrap.style.display = '';
    btn.addEventListener('click', function () {
      var _p=parseInt(localStorage.getItem('quizProgress')||'0',10); window.location.href='../../quiz/quiz-card/?start='+(_p>0?_p+1:1);
    });
  }
  /* progress < 20 hoặc >= 30: ẩn (display:none mặc định) */
})();
