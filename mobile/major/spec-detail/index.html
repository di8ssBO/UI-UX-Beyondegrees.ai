/* ── Spec Uni Cards ───────────────────────────── */
.spec-uni-card{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);
  border-radius:14px;padding:13px 14px;margin-bottom:10px;cursor:pointer;
  transition:background .18s,border-color .18s,transform .15s;
}
.spec-uni-card:hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.16);transform:translateY(-1px)}
.spec-uni-hdr{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.spec-uni-logo{
  width:36px;height:36px;border-radius:9px;background:rgba(255,255,255,.10);
  display:flex;align-items:center;justify-content:center;font-size:14px;
  font-weight:800;color:var(--text-primary);flex-shrink:0;overflow:hidden;
  border:1px solid rgba(255,255,255,.10);
}
.spec-uni-logo img{width:100%;height:100%;object-fit:contain;padding:4px}
.spec-uni-info{flex:1;min-width:0}
.spec-uni-name{font-size:13px;font-weight:700;color:var(--text-primary);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.spec-uni-loc{font-size:10px;color:var(--text-muted);margin-top:2px}
.spec-uni-match{
  font-size:13px;font-weight:900;border-radius:20px;padding:2px 8px;
  flex-shrink:0;border:1px solid;
}
.spec-uni-type{
  font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;
  border:1px solid;display:inline-block;margin-bottom:9px;
}
.spec-uni-stats{
  display:grid;grid-template-columns:1fr 1px 1fr 1px 1fr;
  margin-bottom:9px;background:rgba(255,255,255,.03);border-radius:9px;padding:8px 4px;
}
.spec-uni-stat{display:flex;flex-direction:column;align-items:center;gap:2px}
.spec-uni-stat-val{font-size:9.5px;font-weight:700;color:var(--text-primary);text-align:center;line-height:1.2}
.spec-uni-stat-lbl{font-size:9px;color:var(--text-muted);text-align:center}
.spec-uni-divider{background:rgba(255,255,255,.08)}
.spec-uni-progs{display:flex;flex-wrap:wrap;gap:4px}
.spec-uni-prog{
  font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);
  color:var(--text-muted);
}
/* ── Wave animations ──────────────────────────── */
@keyframes waveFlow{
  0%{transform:translateX(0) skewY(-2deg) scaleY(1)}
  50%{transform:translateX(-8%) skewY(0deg) scaleY(1.05)}
  100%{transform:translateX(0) skewY(-2deg) scaleY(1)}
}
@keyframes waveFlow2{
  0%{transform:translateX(0) skewY(1deg)}
  50%{transform:translateX(6%) skewY(-1deg)}
  100%{transform:translateX(0) skewY(1deg)}
}
/* ── Skeleton loading ────────────────────────── */
.skel{
  background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 75%);
  background-size:200% 100%;animation:skel-anim 1.4s ease-in-out infinite;
  border-radius:6px;
}
@keyframes skel-anim{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ════════════════════════════════════════════════════════
   SPEC-UNI-CARD — LIGHT THEME (standout, multi-accent)
   White surface + 6px colored left strip + radial halo
   + accent-colored border/shadow rotating per index
   ════════════════════════════════════════════════════════ */
[data-theme="light"] .spec-uni-card {
  background: #FFFFFF !important;
  border: 1.5px solid rgba(58,46,38,0.10) !important;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,1),
    0 1px 3px rgba(58,46,38,0.08),
    0 6px 14px rgba(58,46,38,0.10),
    0 16px 32px rgba(107,88,64,0.14) !important;
  position: relative;
  overflow: hidden;
  padding-left: 20px !important;
  margin-bottom: 14px !important;
}
[data-theme="light"] .spec-uni-card::before {
  content: '';
  position: absolute;
  top: 0; bottom: 0; left: 0;
  width: 6px;
  z-index: 2;
  pointer-events: none;
  box-shadow: 1px 0 8px rgba(0,0,0,0.12);
}
[data-theme="light"] .spec-uni-card::after {
  content: '';
  position: absolute;
  bottom: -40%; right: -20%;
  width: 70%; height: 110%;
  border-radius: 50%;
  filter: blur(30px);
  z-index: 0;
  pointer-events: none;
  opacity: 0.55;
}
[data-theme="light"] .spec-uni-card > * { position: relative; z-index: 1; }

/* Per-index colors */
[data-theme="light"] .spec-uni-card:nth-of-type(6n+1) {
  border-color: rgba(232,147,112,0.32) !important;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,1),
    0 1px 3px rgba(232,147,112,0.10),
    0 6px 14px rgba(232,147,112,0.18),
    0 16px 32px rgba(232,147,112,0.24) !important;
}
[data-theme="light"] .spec-uni-card:nth-of-type(6n+1)::before {
  background: linear-gradient(180deg, #F2B89A 0%, #E89370 60%, #D67A5C 100%);
}
[data-theme="light"] .spec-uni-card:nth-of-type(6n+1)::after {
  background: radial-gradient(circle, rgba(232,147,112,0.32) 0%, transparent 70%);
}
[data-theme="light"] .spec-uni-card:nth-of-type(6n+2) {

/* ── Color helpers ── */
function applyColor(hex){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  var rgb=r+','+g+','+b, root=document.documentElement;
  root.style.setProperty('--disc-primary',hex);
  root.style.setProperty('--disc-light',lighten(hex,.22));
  root.style.setProperty('--disc-lighter',lighten(hex,.42));
  root.style.setProperty('--disc-glow','rgba('+rgb+',.50)');
  root.style.setProperty('--disc-glow-sm','rgba('+rgb+',.25)');
  root.style.setProperty('--disc-bg','rgba('+rgb+',.12)');
  root.style.setProperty('--disc-border','rgba('+rgb+',.30)');
}
function lighten(hex,amt){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,Math.round(r+(255-r)*amt));
  g=Math.min(255,Math.round(g+(255-g)*amt));
  b=Math.min(255,Math.round(b+(255-b)*amt));
  return '#'+[r,g,b].map(function(x){return x.toString(16).padStart(2,'0')}).join('');
}

    +'<stop offset="50%" stop-color="'+hex+'" stop-opacity=".35"/>'
    +'<stop offset="100%" stop-color="'+hex+'" stop-opacity=".0"/>'
    +'</linearGradient>'
    +'</defs>'
    +'<g style="animation:waveFlow 9s ease-in-out infinite">'

/* ═══════════════════════════════════════════════════════════
   CSV PARSER
═══════════════════════════════════════════════════════════ */
function parseCSVLine(line) {
  var result=[], cur='', inQ=false;
  for(var i=0;i<line.length;i++){
    var c=line[i];
    if(c==='"'){ inQ=!inQ; }
    else if(c===','&&!inQ){ result.push(cur.trim()); cur=''; }
    else{ cur+=c; }
  }
  result.push(cur.trim());
  return result;
}
function parseCSV(text){
  var lines=text.split('\n').filter(function(l){return l.trim()});
  if(!lines.length) return {headers:[],rows:[]};
  var headers=parseCSVLine(lines[0]);
  var rows=lines.slice(1).map(function(line){
    var vals=parseCSVLine(line);
    var obj={};
    headers.forEach(function(h,i){obj[h]=vals[i]||'';});
    return obj;
  });
  return {headers:headers,rows:rows};
}
function normKey(s){ return s.toLowerCase().replace(/\s+/g,' ').trim(); }

/* ═══════════════════════════════════════════════════════════
   ACCORDION TOGGLE
═══════════════════════════════════════════════════════════ */
function toggleAcc(el){
  var item=el.closest('.acc-item');
  var isOpen=item.classList.contains('open');
  document.querySelectorAll('.acc-item.open').forEach(function(i){
    i.classList.remove('open');
    var btn=i.querySelector('.acc-head');
    if(btn) btn.setAttribute('aria-expanded','false');
  });
  if(!isOpen){
    item.classList.add('open');
    el.setAttribute('aria-expanded','true');
  }
}

/* Overview Read more / Show less toggle */
function toggleOverview(btn){
  var card=btn.parentElement;
  var p=card.querySelector('.overview-text');
  if(!p) return;
  var clamped=p.getAttribute('data-clamped')==='true';
  if(clamped){
    p.setAttribute('data-clamped','false');
    btn.textContent=t('spec.show_less');
    btn.setAttribute('data-i18n','spec.show_less');
    btn.setAttribute('aria-expanded','true');
  } else {
    p.setAttribute('data-clamped','true');
    btn.textContent=t('spec.read_more');
    btn.setAttribute('data-i18n','spec.read_more');
    btn.setAttribute('aria-expanded','false');
    /* Scroll back to top of overview card so user doesn't lose context */
    card.scrollIntoView({behavior:'smooth',block:'start'});
  }
}

/* Collapsible section card — Career Outcomes / Required Skills */
function toggleSecCard(btn){
  var sec = btn.closest('.sec-collapsible');
  if (!sec) return;
  var open = sec.classList.toggle('open');
  btn.setAttribute('aria-expanded', String(open));
}

/* Auto-hide "Read more" if text isn't actually overflowing */
function autoHideOverviewToggle(){
  document.querySelectorAll('.overview-card').forEach(function(card){
    var p=card.querySelector('.overview-text');
    var btn=card.querySelector('.overview-toggle');
    if(!p||!btn) return;
    /* Compare scrollHeight (full) vs clientHeight (clamped) */
    if(p.scrollHeight<=p.clientHeight+2){
      btn.style.display='none';
      p.setAttribute('data-clamped','false');
    }
  });
}

/* Pill overflow — show all hidden pills when "+N more" clicked */
function toggleChipOverflow(btn){
  var list=btn.parentElement;
  var hidden=list.querySelectorAll('.pill-overflow');
  var expanded=btn.getAttribute('aria-expanded')==='true';
  hidden.forEach(function(c){
    if(expanded) c.setAttribute('hidden','');
    else c.removeAttribute('hidden');
  });
  if(expanded){
    btn.textContent=t('spec.more').replace('{n}',hidden.length);
    btn.setAttribute('aria-expanded','false');
  } else {
    btn.textContent=t('spec.show_less');
    btn.setAttribute('data-i18n','spec.show_less');
    btn.setAttribute('aria-expanded','true');
  }
}

/* ═══════════════════════════════════════════════════════════
   RENDER UNI CARDS for "Where to Study"
═══════════════════════════════════════════════════════════ */
function renderUniCards(){
  var container=document.getElementById('uniListContainer');
  if(!container) return;

  var _keyParts=_specKey.split('_');
  var _cardMajorId=_keyParts[0]||'104';
  var _cardSpecIdx=_keyParts[1]||'0';

  var ids=SPEC_UNI_MAP[_specKey]||[];
  if(!ids.length){
    /* fallback: top 4 by match */
    var sorted=UNI_DATA.slice().sort(function(a,b){return b.match-a.match});
    ids=sorted.slice(0,4).map(function(u){return u.id});
  }

  var unis=ids.map(function(id){
    return UNI_DATA.find(function(u){return u.id===id});
  }).filter(Boolean).sort(function(a,b){return b.match-a.match});

  if(!unis.length){
    container.innerHTML='<div style="padding:16px;text-align:center;font-size:12px;color:var(--text-muted)" data-i18n="spec.uni_soon">'+t('spec.uni_soon')+'</div>';
    return;
  }

  var typeColors={
    pub: {bg:'rgba(96,165,250,.12)',br:'rgba(96,165,250,.28)',tx:'#60a5fa'},
    priv:{bg:'rgba(251,146,60,.12)',br:'rgba(251,146,60,.28)',tx:'#fb923c'},
    intl:{bg:'rgba(139,92,246,.12)',br:'rgba(139,92,246,.28)',tx:'#a78bfa'},
  };

  container.innerHTML=unis.map(function(u){
    var typeClass = (u.type === 'pub') ? 'pub' : (u.type === 'priv' ? 'priv' : 'intl');
    var matchClass = u.match >= 80 ? 'mh' : u.match >= 60 ? 'mm' : 'ml';
    var heroFill = u.logo
      ? '<div class="uc-hero-logo-fill" style="background-image:url(\''+u.logo+'\')"></div>'
      : '<div class="uc-hero-emoji-fill">'+u.icon+'</div>';

    var _uniDetailUrl='../../university/detail/?id='+u.id+'&majorId='+_cardMajorId+'&specIdx='+_cardSpecIdx;
    return '<div class="uc uc-v2" style="cursor:pointer" onclick="window.location.href=\''+_uniDetailUrl+'\'">'
      +'<div class="uc-hero">'
        +'<div class="uc-hero-logo-wrap">'+heroFill+'</div>'
        +'<div class="uc-hero-info">'
          +'<div class="uc-name">'+u.name+'</div>'
          +'<div class="uc-meta-row">'
            +'<span class="uc-loc">'+u.loc+'</span>'
            +'<span class="uc-dot" aria-hidden="true">·</span>'
            +'<span class="uc-type-chip '+typeClass+'">'+u.typeLabel+'</span>'
          +'</div>'
        +'</div>'
        +'<div class="uc-match-badge '+matchClass+'">'
          +'<div class="uc-match-val">'+u.match+'%</div>'
          +'<div class="uc-match-lbl">'+t('spec.match_label')+'</div>'
        +'</div>'
      +'</div>'
      +'<div class="uc-body">'
        +'<div class="uc-stats">'
          +'<div class="uc-stat">'
            +'<div class="uc-stat-val">'+u.ranking+'</div>'
            +'<div class="uc-stat-lbl">'+t('spec.uni_ranking')+'</div>'
          +'</div>'
          +'<div class="uc-stat">'
            +'<div class="uc-stat-val">'+(u.tuition||'N/A')+'</div>'
            +'<div class="uc-stat-lbl">'+t('spec.uni_tuition')+'</div>'
          +'</div>'
        +'</div>'
      +'</div>'
    +'</div>';
  }).join('');
}

/* ═══════════════════════════════════════════════════════════
   RENDER BODY after data is ready
═══════════════════════════════════════════════════════════ */
function renderBody(spec, csvSpec, uniList, majorTitle, discCode){
  /* Get mock data (stats + careers + skills + admission) */
  var md = MOCK_DATA[_specKey] || getDefaultMockData(spec.name);

  /* Description: prefer CSV, fallback to app data */
  var desc = (csvSpec && csvSpec.description && csvSpec.description.length > 10)
    ? csvSpec.description : spec.desc;

  /* Recommended skills from CSV (if any, shown as extra chip group) */
  var csvSkills = (csvSpec && csvSpec.skills)
    ? csvSpec.skills.split(/[,;|\/]/).map(function(s){return s.trim()}).filter(Boolean) : [];

  /* Build accordion — mock data takes priority, CSV fills in if mock empty */
  var admText = md.admission || (csvSpec && csvSpec.admission) || '';
  var examText = md.exams    || (csvSpec && csvSpec.exams)    || '';
  var langText = md.language || (csvSpec && csvSpec.language) || '';
  var _ta = window.BDi18n ? window.BDi18n.t.bind(window.BDi18n) : function(k){return k;};
  var accSections = [
    {icon:'📋', title:_ta('spec.acc.admission'), body: admText || _ta('spec.acc.admission_fb')},
    {icon:'📝', title:_ta('spec.acc.exams'),     body: examText || _ta('spec.acc.exams_fb')},
    {icon:'🌐', title:_ta('spec.acc.language'),  body: langText || _ta('spec.acc.language_fb')},
  ];
  var accHTML = accSections.map(function(item){
    return '<div class="acc-item">'
      +'<div class="acc-head" onclick="toggleAcc(this)">'
        +'<div class="acc-head-left"><div class="acc-icon">'+item.icon+'</div><span class="acc-title">'+item.title+'</span></div>'
        +'<div class="acc-arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></div>'
      +'</div>'
      +'<div class="acc-body">'+item.body+'</div>'
    +'</div>';
  }).join('');

  /* ── Render — production IA ──
     1. About (concise overview)
     2. Career outcomes (informational list)
     3. Salary & outcomes (3 stat cards, avg salary prominent)
     4. Required skills (grouped, scannable)
     5. Learning path (accordion: admission + exams + language)
     6. Where to study (uni cards)
  */
  document.getElementById('loadingSkeleton').style.display = 'none';

  /* Accordion items for new "Learning Path" section */
  var accHTML2 = accSections.map(function(item){
    return '<div class="acc-item">'
      +'<button class="acc-head" onclick="toggleAcc(this)" aria-expanded="false">'
        +'<span class="acc-head-left"><span class="acc-icon" aria-hidden="true">'+item.icon+'</span><span class="acc-title">'+item.title+'</span></span>'
        +'<span class="acc-arrow" aria-hidden="true"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></span>'
      +'</button>'
      +'<div class="acc-body">'+item.body+'</div>'
    +'</div>';
  }).join('');

  /* Skill pill overflow control — show 8 by default, "+N more" toggle.
     Uses .pill class instead of .chip to avoid layout.css global
     [class*="chip"] override that forces all chips blue. */
  function buildChips(items, mutedClass) {
    if (!items || !items.length) return '';
    var cls = mutedClass ? 'pill pill-muted' : 'pill';
    var maxVisible = 8;
    var hidden = items.length > maxVisible ? items.slice(maxVisible) : [];
    var visible = items.slice(0, maxVisible);
    var html = '<div class="pill-list">'
      + visible.map(function(s){ return '<span class="'+cls+'">'+s+'</span>'; }).join('');
    if (hidden.length) {
      html += hidden.map(function(s){ return '<span class="'+cls+' pill-overflow" hidden>'+s+'</span>'; }).join('');
      html += '<button class="pill-more" onclick="toggleChipOverflow(this)" aria-expanded="false">'+t('spec.more').replace('{n}',hidden.length)+'</button>';
    }
    return html + '</div>';
  }

  document.getElementById('specBody').insertAdjacentHTML('beforeend',
    /* 1. Salary & Outcomes — moved to top (high-intent metric first).
       Avg salary = primary (most relevant after graduation),
       Entry + Employment = supporting metrics. */
    '<section class="sec sec-first">'
      +'<h2 class="sec-title">'+t('spec.section.salary')+'</h2>'
      +'<div class="stat-grid">'
        +'<div class="stat-card stat-card-primary">'
          +'<div class="stat-card-label">'+t('spec.avg_salary')+'</div>'
          +'<div class="stat-card-value">'+md.avgSalary+'</div>'
          +'<div class="stat-card-meta">'+t('spec.meta.avg')+'</div>'
        +'</div>'
        +'<div class="stat-card stat-card-blue">'
          +'<div class="stat-card-label">'+t('spec.entry_salary')+'</div>'
          +'<div class="stat-card-value">'+md.entrySalary+'</div>'
          +'<div class="stat-card-meta">'+t('spec.meta.entry')+'</div>'
        +'</div>'
        +'<div class="stat-card stat-card-sage">'
          +'<div class="stat-card-label">'+t('spec.employment_rate')+'</div>'
          +'<div class="stat-card-value">'+md.employment+'</div>'
          +'<div class="stat-card-meta">'+t('spec.meta.employ')+'</div>'
        +'</div>'
      +'</div>'
    +'</section>'

    /* 2. Overview — sage card w/ line-clamp + Read more (mirrors sius) */
    +'<section class="sec">'
      +'<h2 class="sec-title">'+t('spec.section.overview')+'</h2>'
      +'<div class="overview-card">'
        +'<p class="sec-body overview-text" data-clamped="true">'+desc+'</p>'
        +'<button class="overview-toggle" onclick="toggleOverview(this)" aria-expanded="false" data-i18n="spec.read_more">'+t('spec.read_more')+'</button>'
      +'</div>'
    +'</section>'

    /* 3. Career Outcomes — modern collapsible card */
    +'<section class="sec sec-collapsible sec-card">'
      +'<button class="sec-toggle" type="button" onclick="toggleSecCard(this)" aria-expanded="false">'
        +'<div class="sec-icon-wrap">'
          +'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16M2 13h20"/></svg>'
        +'</div>'
        +'<div class="sec-head-text">'
          +'<h2 class="sec-title">'+t('spec.section.careers')+'</h2>'
          +'<span class="sec-sub-lbl">'+t('spec.career_count').replace('{n}',md.careers.length)+'</span>'
        +'</div>'
        +'<span class="sec-arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></span>'
      +'</button>'
      +'<div class="sec-content"><div class="sec-content-inner">'
        +buildChips(md.careers, false)
      +'</div></div>'
    +'</section>'

    /* 4. Required Skills — modern collapsible card */
    +'<section class="sec sec-collapsible sec-card">'
      +'<button class="sec-toggle" type="button" onclick="toggleSecCard(this)" aria-expanded="false">'
        +'<div class="sec-icon-wrap">'
          +'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10"/></svg>'
        +'</div>'
        +'<div class="sec-head-text">'
          +'<h2 class="sec-title">'+t('spec.section.skills')+'</h2>'
          +'<span class="sec-sub-lbl">'+t('spec.skills_sub')+'</span>'
        +'</div>'
        +'<span class="sec-arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></span>'
      +'</button>'
      +'<div class="sec-content"><div class="sec-content-inner">'
        +(csvSkills.length
          ?'<div class="skill-group">'
            +'<h3 class="skill-group-title">'+t('spec.skill_group.csv')+'</h3>'
            +buildChips(csvSkills, false)
          +'</div>'
          :'')
        +'<div class="skill-group">'
          +'<h3 class="skill-group-title">'+t('spec.skill_group.core')+'</h3>'
          +buildChips(md.coreSkills, false)
        +'</div>'
        +'<div class="skill-group">'
          +'<h3 class="skill-group-title">'+t('spec.skill_group.tools')+'</h3>'
          +buildChips(md.tools, true)
        +'</div>'
      +'</div></div>'
    +'</section>'

    /* 5. Learning Path — accordion (admission/exams/language) */
    +'<section class="sec">'
      +'<h2 class="sec-title">'+t('spec.section.learning')+'</h2>'
      +'<p class="sec-sub">'+t('spec.learning_sub')+'</p>'
      +'<div class="accordion">'+accHTML2+'</div>'
    +'</section>'

    /* 6. Where to Study — universities (no collapsible wrapper) */
    +'<section class="sec sec-last">'
      +'<h2 class="sec-title">'+t('spec.section.where')+'</h2>'
      +'<div id="uniListContainer"></div>'
    +'</section>'
  );

  renderUniCards();
  /* Check whether Overview text actually overflows the 4-line clamp.
     If it fits, hide the "Read more" button to avoid noise. */
  requestAnimationFrame(autoHideOverviewToggle);
}

/* ═══════════════════════════════════════════════════════════

var _specKey = '104_0';

(function(){function uc(){var el=document.getElementById('statusTime');if(!el)return;var n=new Date(),h=n.getHours(),m=n.getMinutes();el.textContent=h+':'+(m<10?'0':'')+m;}uc();setInterval(uc,30000);})();

document.addEventListener('DOMContentLoaded', function(){
  var params  = new URLSearchParams(window.location.search);
  var majorId = parseInt(params.get('majorId')||params.get('id')||'104');
  var specIdx = parseInt(params.get('specIdx')||'0');
  _specKey = majorId+'_'+specIdx;

  /* Lookup from majors-data.js */
  var major = (typeof MAJORS_DATA!=='undefined') ? MAJORS_DATA.find(function(m){return m.id===majorId}) : null;
  var disc  = (major&&major.discId&&typeof DISCIPLINES!=='undefined') ? DISCIPLINES[String(major.discId)] : null;
  var color = disc ? disc.color : '#7c3aed';
  var discTitle  = disc ? (disc.short||disc.title) : 'Natural Sci';
  var discIcon   = disc ? disc.icon : '🔬';
  var majorTitle = major ? major.title : 'Mathematics';

  /* Lookup spec basic info */
  var specs = SPECIALIZATIONS[majorId];
  var spec  = specs ? specs[specIdx] : null;
  if(!spec) spec = {icon:'📚',name:t('spec.not_found_name'),desc:t('spec.not_found_desc').replace('{major}',majorTitle),tag:'Research'};

  /* Apply color */
  applyColor(color);

  /* Breadcrumb */
  var bcM = document.getElementById('bcMajor');
  if(bcM){ bcM.textContent=majorTitle; bcM.href='../detail/?id='+majorId; }
  document.getElementById('bcSpec').textContent = spec.name;

  /* Page title */
  document.getElementById('pageTitle').textContent = spec.name.length>22 ? spec.name.slice(0,20)+'…' : spec.name;
  document.title = spec.name+' — BeyonDegrees.ai';

  /* Hero — minimal aurora layer (subtle disc tint only, no fixed-dark
     gradient — light mode CSS handles its own palette wave bg) */
  var hex6=color.slice(1);
  var r2=parseInt(hex6.slice(0,2),16),g2=parseInt(hex6.slice(2,4),16),b2=parseInt(hex6.slice(4,6),16);
  var ra='rgba('+r2+','+g2+','+b2;
  document.getElementById('heroAurora').style.background =
    'radial-gradient(ellipse 90% 70% at 30% 35%,'+ra+',.42) 0%,'+ra+',.22) 45%,transparent 75%),'
    +'linear-gradient(160deg,rgba('+r2+','+g2+','+b2+',.18) 0%,#0e0a18 50%,#06040c 100%)';
  document.getElementById('heroIcon').textContent      = spec.icon;
  document.getElementById('heroName').textContent      = spec.name;
  document.getElementById('heroParentTag').textContent = majorTitle;
  document.getElementById('heroSpecTag').textContent   = discIcon+' '+discTitle;
  var heroTagBadge = document.getElementById('heroTagBadge');
  if (heroTagBadge) heroTagBadge.textContent = spec.tag || t('spec.tag_default');

  /* Fetch spec description CSV */
  var specKey_norm = normKey(spec.name);
  var BASE_DATA    = '../../../data/';
  var csvSpec = null;

  fetch(BASE_DATA+'Specialization-2026-05-09.csv')
    .then(function(r){return r.text()})
    .then(function(txt){
      var parsed = parseCSV(txt);
      parsed.rows.forEach(function(row){
        if(normKey(row.title||'') === specKey_norm){ csvSpec=row; }
      });
      renderBody(spec, csvSpec, [], majorTitle, major?major.discCode:'');
    }).catch(function(){
      renderBody(spec, null, [], majorTitle, major?major.discCode:'');
    });
});
</script>
