<style>
:root,:root[data-theme="dark"]{--violet-950:#06091A;--violet-900:#0A0F28;--violet-800:#0F2060;--violet-700:#1358C4;--violet-600:#1863DC;--violet-500:#0274BE;--violet-400:#6BA3FF;--violet-300:#93BBFF;--violet-200:#B8D4FF;--violet-100:#DCE9FF;--shadow-violet:0 8px 24px rgba(24,99,220,0.35);--shadow-violet-sm:0 4px 12px rgba(24,99,220,0.20);--glow-violet:0 20px 50px rgba(24,99,220,0.40);--glow-violet-sm:0 12px 30px rgba(24,99,220,0.28)}
/* Light-mode token overrides live in design-system/tokens.css */
[data-theme="light"] body{background:#06060f!important;color:#f8fafc!important}
*,*::before,*::after{transition:background-color .3s ease,border-color .3s ease,color .2s ease,box-shadow .3s ease}
svg *,canvas,video,img{transition:none!important}

body { background: #06060f; }

.mobile-viewport {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  display: flex; flex-direction: column;
  position: relative;
  background: var(--bg-base);
  scrollbar-width: none;
}
.mobile-viewport::-webkit-scrollbar { display: none; }
[data-theme="light"] .mobile-viewport {
  background:
    url("../../../shared/bg-light.svg") center top / cover no-repeat,
    linear-gradient(180deg, #fdf8f2 0%, #f5ede0 50%, #ede1cf 100%) !important;
}
[data-theme="light"] .device-frame { border-color: #1a1a2e !important; }
[data-theme="light"] .breadcrumb-item,
[data-theme="light"] .breadcrumb-separator { color: rgba(255,255,255,0.45) !important; }
[data-theme="light"] .breadcrumb-item.active { color: rgba(255,255,255,0.85) !important; }
[data-theme="light"] .status-bar { color: #2c1f14 !important; }
/* Hide dark ambient orbs in light mode */
[data-theme="light"] .orb-top,
[data-theme="light"] .orb-bot { display: none !important; }

.profile-content { padding: 8px 16px 24px; flex: 1; }

/* Orb ambient */
.orb-top {
  position: absolute; top: -100px; right: -100px; z-index: 0;
  width: 280px; height: 280px; border-radius: 50%;
  background: radial-gradient(circle, rgba(24,99,220,0.12) 0%, transparent 70%);
  pointer-events: none;
}
.orb-bot {
  position: absolute; bottom: -80px; left: -80px; z-index: 0;
  width: 220px; height: 220px; border-radius: 50%;
  background: radial-gradient(circle, rgba(2,116,190,0.08) 0%, transparent 70%);
  pointer-events: none;
}

/* Profile hero card */
.profile-hero {
  margin: 12px 0 16px;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 24px;
  padding: 28px 20px;
  text-align: center;
  position: relative; z-index: 1;
}
[data-theme="light"] .profile-hero {
  background:
    radial-gradient(ellipse 55% 50% at 100% 0%, rgba(232,145,122,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 50% 50% at 0% 100%, rgba(127,168,190,0.16) 0%, transparent 70%),
    radial-gradient(ellipse 50% 50% at 100% 100%, rgba(143,181,176,0.16) 0%, transparent 70%),
    rgba(255,255,255,0.92) !important;
  -webkit-backdrop-filter: blur(24px) saturate(150%);
  backdrop-filter: blur(24px) saturate(150%);
  border: 1px solid rgba(201,107,85,0.30) !important;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.80),
    0 2px 8px rgba(201,107,85,0.10),
    0 8px 24px rgba(140,114,96,0.12),
    0 16px 40px rgba(74,135,168,0.10) !important;
}
[data-theme="light"] .avatar {
  background: linear-gradient(135deg, #e8917a 0%, #c96b55 50%, #a84e30 100%) !important;
  border: 3px solid rgba(201,107,85,0.45) !important;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.25),
    0 0 0 4px rgba(201,107,85,0.14),
    0 4px 14px rgba(201,107,85,0.30) !important;
  color: #ffffff !important;
}
[data-theme="light"] .profile-name { color: #2c1f14 !important; font-weight: 900 !important; }
[data-theme="light"] .profile-bio { color: #6b5440 !important; font-weight: 600 !important; }

.avatar-wrap { position: relative; width: 80px; height: 80px; margin: 0 auto 14px; }
.avatar {
  width: 80px; height: 80px; border-radius: 50%;
  background: linear-gradient(135deg, #1863DC, #0274BE);
  display: flex; align-items: center; justify-content: center;
  font-size: 30px; font-weight: 800; color: #fff; letter-spacing: -1px;
  border: 3px solid rgba(24,99,220,0.35);
  box-shadow: 0 0 0 4px rgba(24,99,220,0.12);
}
.avatar-cam {
  position: absolute; bottom: 0; right: 0;
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--bg-elevated);
  border: 2px solid var(--bg-base);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}
[data-theme="light"] .avatar-cam {
  background: #ffffff !important;
  border: 2px solid rgba(201,107,85,0.45) !important;
  color: #c96b55 !important;
  box-shadow: 0 2px 6px rgba(201,107,85,0.20) !important;
}

.profile-name { font-size: 18px; font-weight: 800; color: var(--text-primary); margin-bottom: 3px; letter-spacing: -0.01em; }
.profile-bio { font-size: 12px; color: var(--text-muted); }

/* Settings group */
.settings-group {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 18px; overflow: hidden; margin-bottom: 12px;
  position: relative; z-index: 1;
}
[data-theme="light"] .settings-group {
  background: rgba(255,255,255,0.92) !important;
  -webkit-backdrop-filter: blur(20px) saturate(140%);
  backdrop-filter: blur(20px) saturate(140%);
  border: 1px solid rgba(140,114,96,0.22) !important;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,1),
    0 1px 3px rgba(58,46,38,0.06),
    0 6px 16px rgba(140,114,96,0.10) !important;
}

.settings-row {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px;
  text-decoration: none; cursor: pointer;
  transition: background 0.18s ease;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  position: relative;
}
[data-theme="light"] .settings-row { border-bottom-color: rgba(140,114,96,0.18) !important; }
.settings-row:last-child { border-bottom: none; }
.settings-row:hover { background: rgba(255,255,255,0.04); }
[data-theme="light"] .settings-row:hover { background: rgba(201,107,85,0.06) !important; }

.row-icon {
  width: 34px; height: 34px; border-radius: 9px;
  background: rgba(24,99,220,0.12);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; color: var(--violet-400);
}
/* Light mode — palette rotation icons (4 colors per group) */
[data-theme="light"] .settings-row:nth-child(4n+1) .row-icon {
  background: linear-gradient(135deg, rgba(232,145,122,0.22) 0%, rgba(201,107,85,0.28) 100%) !important;
  color: #a84e30 !important;
  border: 1px solid rgba(201,107,85,0.40) !important;
}
[data-theme="light"] .settings-row:nth-child(4n+2) .row-icon {
  background: linear-gradient(135deg, rgba(127,168,190,0.26) 0%, rgba(74,135,168,0.30) 100%) !important;
  color: #2f6a8c !important;
  border: 1px solid rgba(74,135,168,0.40) !important;
}
[data-theme="light"] .settings-row:nth-child(4n+3) .row-icon {
  background: linear-gradient(135deg, rgba(168,200,196,0.30) 0%, rgba(106,150,144,0.32) 100%) !important;
  color: #3a5c56 !important;
  border: 1px solid rgba(106,150,144,0.40) !important;
}
[data-theme="light"] .settings-row:nth-child(4n+4) .row-icon {
  background: linear-gradient(135deg, rgba(216,204,191,0.55) 0%, rgba(140,114,96,0.25) 100%) !important;
  color: #6b5440 !important;
  border: 1px solid rgba(140,114,96,0.42) !important;
}

.row-label { flex: 1; font-size: 14px; font-weight: 600; color: var(--text-primary); }
.row-chevron { color: var(--text-muted); display: flex; align-items: center; }
[data-theme="light"] .row-label { color: #2c1f14 !important; font-weight: 700 !important; }
[data-theme="light"] .row-chevron { color: #8c7260 !important; }

/* ── Tab Bar — terracotta active (consistent w/ all pages) ── */
[data-theme="light"] .float-tab-bar {
  background: linear-gradient(135deg, rgba(255,253,250,0.92) 0%, rgba(245,237,224,0.88) 100%) !important;
  -webkit-backdrop-filter: blur(28px) saturate(150%);
  backdrop-filter: blur(28px) saturate(150%);
  border-color: rgba(232,224,213,0.80) !important;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.60),
    0 -2px 12px rgba(201,107,85,0.06),
    0 6px 20px rgba(140,114,96,0.10) !important;
}
[data-theme="light"] .tab-item { color: rgba(92,69,53,0.55) !important; }
[data-theme="light"] .tab-item svg,
[data-theme="light"] .tab-item .tab-icon { color: rgba(92,69,53,0.55) !important; }
[data-theme="light"] .tab-item.active {
  background: linear-gradient(135deg, rgba(201,107,85,0.14) 0%, rgba(201,107,85,0.22) 100%) !important;
  color: #a84e30 !important;
  border-color: rgba(201,107,85,0.35) !important;
}
[data-theme="light"] .tab-item.active svg,
[data-theme="light"] .tab-item.active .tab-icon { color: #a84e30 !important; }
[data-theme="light"] .tab-item:hover:not(.tab-disabled) {
  color: rgba(92,69,53,0.80) !important;
}
</style>
</head>
