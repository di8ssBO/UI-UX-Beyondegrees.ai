<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script>(function(){var l='en';try{l=localStorage.getItem('bd-lang')||'en';}catch(e){}document.documentElement.setAttribute('data-lang',l);document.documentElement.setAttribute('dir',l==='ar'?'rtl':'ltr');document.documentElement.setAttribute('lang',l);})();</script>
  <title>Profile — BeyonDegrees.ai</title>
  <link rel="stylesheet" href="../../../design-system/tokens.css">
  <link rel="stylesheet" href="../../../design-system/base.css">
  <link rel="stylesheet" href="../../../design-system/components/interactive.css">
  <link rel="stylesheet" href="../../../design-system/components/display.css">
  <link rel="stylesheet" href="../../../design-system/components/navigation.css">
  <link rel="stylesheet" href="../../../design-system/animations.css">
  <link rel="stylesheet" href="../../../design-system/layout.css">
<style>
:root,:root[data-theme="dark"]{--violet-950:#06091A;--violet-900:#0A0F28;--violet-800:#0F2060;--violet-700:#1358C4;--violet-600:#1863DC;--violet-500:#0274BE;--violet-400:#6BA3FF;--violet-300:#93BBFF;--violet-200:#B8D4FF;--violet-100:#DCE9FF;--shadow-violet:0 8px 24px rgba(24,99,220,0.35);--shadow-violet-sm:0 4px 12px rgba(24,99,220,0.20);--glow-violet:0 20px 50px rgba(24,99,220,0.40);--glow-violet-sm:0 12px 30px rgba(24,99,220,0.28)}
/* Light-mode token overrides live in design-system/tokens.css */
[data-theme="light"] body{background:#06060f!important;color:#f8fafc!important}
*,*::before,*::after{transition:background-color .3s ease,border-color .3s ease,color .2s ease,box-shadow .3s ease}
svg *,canvas,video,img{transition:none!important}

body { background: #06060f; }

.mobile-viewport {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  display: flex; flex-direction: column;
  position: relative;
  background: var(--bg-base);
  scrollbar-width: none;
}
.mobile-viewport::-webkit-scrollbar { display: none; }
[data-theme="light"] .mobile-viewport {
  background:
    url("../../../shared/bg-light.svg") center top / cover no-repeat,
    linear-gradient(180deg, #fdf8f2 0%, #f5ede0 50%, #ede1cf 100%) !important;
}
[data-theme="light"] .device-frame { border-color: #1a1a2e !important; }
[data-theme="light"] .breadcrumb-item,
[data-theme="light"] .breadcrumb-separator { color: rgba(255,255,255,0.45) !important; }
[data-theme="light"] .breadcrumb-item.active { color: rgba(255,255,255,0.85) !important; }
[data-theme="light"] .status-bar { color: #2c1f14 !important; }
/* Hide dark ambient orbs in light mode */
[data-theme="light"] .orb-top,
[data-theme="light"] .orb-bot { display: none !important; }

.profile-content { padding: 8px 16px 24px; flex: 1; }

/* Orb ambient */
.orb-top {
  position: absolute; top: -100px; right: -100px; z-index: 0;
  width: 280px; height: 280px; border-radius: 50%;
  background: radial-gradient(circle, rgba(24,99,220,0.12) 0%, transparent 70%);
  pointer-events: none;
}
.orb-bot {
  position: absolute; bottom: -80px; left: -80px; z-index: 0;
  width: 220px; height: 220px; border-radius: 50%;
  background: radial-gradient(circle, rgba(2,116,190,0.08) 0%, transparent 70%);
  pointer-events: none;
}

/* Profile hero card */
.profile-hero {
  margin: 12px 0 16px;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 24px;
  padding: 28px 20px;
  text-align: center;
  position: relative; z-index: 1;
}
[data-theme="light"] .profile-hero {
  background:
    radial-gradient(ellipse 55% 50% at 100% 0%, rgba(232,145,122,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 50% 50% at 0% 100%, rgba(127,168,190,0.16) 0%, transparent 70%),
    radial-gradient(ellipse 50% 50% at 100% 100%, rgba(143,181,176,0.16) 0%, transparent 70%),
    rgba(255,255,255,0.92) !important;
  -webkit-backdrop-filter: blur(24px) saturate(150%);
  backdrop-filter: blur(24px) saturate(150%);
  border: 1px solid rgba(201,107,85,0.30) !important;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.80),
    0 2px 8px rgba(201,107,85,0.10),
    0 8px 24px rgba(140,114,96,0.12),
    0 16px 40px rgba(74,135,168,0.10) !important;
}
[data-theme="light"] .avatar {
  background: linear-gradient(135deg, #e8917a 0%, #c96b55 50%, #a84e30 100%) !important;
  border: 3px solid rgba(201,107,85,0.45) !important;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.25),
    0 0 0 4px rgba(201,107,85,0.14),
    0 4px 14px rgba(201,107,85,0.30) !important;
  color: #ffffff !important;
}
[data-theme="light"] .profile-name { color: #2c1f14 !important; font-weight: 900 !important; }
[data-theme="light"] .profile-bio { color: #6b5440 !important; font-weight: 600 !important; }

.avatar-wrap { position: relative; width: 90px; height: 90px; margin: 0 auto 16px; }
.avatar {
  width: 90px; height: 90px; border-radius: 50%;
  background: linear-gradient(135deg, #1863DC, #0274BE);
  display: flex; align-items: center; justify-content: center;
  font-size: 34px; font-weight: 800; color: #fff; letter-spacing: -1px;
  border: 3px solid rgba(24,99,220,0.35);
  box-shadow: 0 0 0 5px rgba(24,99,220,0.12);
}
.avatar-cam {
  position: absolute; bottom: 1px; right: 1px;
  width: 28px; height: 28px; border-radius: 50%;
  background: #1a1f3a;
  border: 2.5px solid var(--bg-base);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.35);
  transition: transform 0.18s ease, background 0.18s ease;
}
.avatar-cam:hover { transform: scale(1.12); background: #243060; }
[data-theme="light"] .avatar-cam {
  background: #ffffff !important;
  border: 2.5px solid rgba(201,107,85,0.45) !important;
  box-shadow: 0 2px 8px rgba(201,107,85,0.25) !important;
}
[data-theme="light"] .avatar-cam:hover { background: #fff5f2 !important; }

.profile-name { font-size: 18px; font-weight: 800; color: var(--text-primary); margin-bottom: 6px; letter-spacing: -0.01em; }
.profile-bio { font-size: 12px; color: var(--text-muted); font-style: italic; }
.profile-bio-empty {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 12px; color: var(--text-muted); font-style: italic;
  opacity: 0.6;
}
.profile-bio-empty::after {
  content: '+ Add bio';
  font-style: normal; font-weight: 600; font-size: 11px;
  color: var(--violet-400); opacity: 0.8;
  margin-left: 6px; cursor: pointer;
  transition: opacity 0.15s;
}
.profile-bio-empty:hover::after { opacity: 1; }

/* Settings group */
.settings-group {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 18px; overflow: hidden; margin-bottom: 12px;
  position: relative; z-index: 1;
}
[data-theme="light"] .settings-group {
  background: rgba(255,255,255,0.92) !important;
  -webkit-backdrop-filter: blur(20px) saturate(140%);
  backdrop-filter: blur(20px) saturate(140%);
  border: 1px solid rgba(140,114,96,0.22) !important;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,1),
    0 1px 3px rgba(58,46,38,0.06),
    0 6px 16px rgba(140,114,96,0.10) !important;
}

.settings-row {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px;
  text-decoration: none; cursor: pointer;
  transition: background 0.18s ease;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  position: relative;
}
[data-theme="light"] .settings-row { border-bottom-color: rgba(140,114,96,0.18) !important; }
.settings-row:last-child { border-bottom: none; }
.settings-row:hover { background: rgba(255,255,255,0.04); }
[data-theme="light"] .settings-row:hover { background: rgba(201,107,85,0.06) !important; }

.row-icon {
  width: 34px; height: 34px; border-radius: 9px;
  background: rgba(24,99,220,0.12);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; color: var(--violet-400);
}
/* Light mode — palette rotation icons (4 colors per group) */
[data-theme="light"] .settings-row:nth-child(4n+1) .row-icon {
  background: linear-gradient(135deg, rgba(232,145,122,0.22) 0%, rgba(201,107,85,0.28) 100%) !important;
  color: #a84e30 !important;
  border: 1px solid rgba(201,107,85,0.40) !important;
}
[data-theme="light"] .settings-row:nth-child(4n+2) .row-icon {
  background: linear-gradient(135deg, rgba(127,168,190,0.26) 0%, rgba(74,135,168,0.30) 100%) !important;
  color: #2f6a8c !important;
  border: 1px solid rgba(74,135,168,0.40) !important;
}
[data-theme="light"] .settings-row:nth-child(4n+3) .row-icon {
  background: linear-gradient(135deg, rgba(168,200,196,0.30) 0%, rgba(106,150,144,0.32) 100%) !important;
  color: #3a5c56 !important;
  border: 1px solid rgba(106,150,144,0.40) !important;
}
[data-theme="light"] .settings-row:nth-child(4n+4) .row-icon {
  background: linear-gradient(135deg, rgba(216,204,191,0.55) 0%, rgba(140,114,96,0.25) 100%) !important;
  color: #6b5440 !important;
  border: 1px solid rgba(140,114,96,0.42) !important;
}

.row-label { flex: 1; font-size: 14px; font-weight: 600; color: var(--text-primary); }
.row-chevron { color: var(--text-muted); display: flex; align-items: center; }
[data-theme="light"] .row-label { color: #2c1f14 !important; font-weight: 700 !important; }
[data-theme="light"] .row-chevron { color: #8c7260 !important; }

/* ── Avatar Bottom Sheet ── */
.avatar-sheet-backdrop {
  position: absolute; inset: 0; z-index: 100;
  background: rgba(6,6,15,0.60);
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  opacity: 0; pointer-events: none;
  transition: opacity 0.28s ease;
}
.avatar-sheet-backdrop.open { opacity: 1; pointer-events: all; }

.avatar-sheet {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 101;
  background: #111827;
  border-radius: 24px 24px 0 0;
  padding: 10px 16px 32px;
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.32,0.72,0,1);
  box-shadow: 0 -8px 32px rgba(0,0,0,0.45);
}
.avatar-sheet.open { transform: translateY(0); }
[data-theme="light"] .avatar-sheet {
  background: #ffffff !important;
  box-shadow: 0 -4px 24px rgba(0,0,0,0.12), 0 -1px 0 rgba(0,0,0,0.06) !important;
}

.avatar-sheet-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: rgba(255,255,255,0.18);
  margin: 0 auto 16px;
}
[data-theme="light"] .avatar-sheet-handle { background: rgba(0,0,0,0.14) !important; }

.avatar-sheet-title {
  font-size: 13px; font-weight: 600;
  color: var(--text-muted); text-align: center;
  letter-spacing: 0.04em; text-transform: uppercase;
  margin-bottom: 12px;
}

.avatar-sheet-option {
  width: 100%; padding: 14px 16px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08); border-radius: 14px;
  display: flex; align-items: center; gap: 14px;
  cursor: pointer; margin-bottom: 8px;
  transition: background 0.18s, border-color 0.18s;
  color: var(--text-primary);
}
.avatar-sheet-option:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.15); }
.avatar-sheet-option:active { transform: scale(0.98); }
[data-theme="light"] .avatar-sheet-option {
  background: rgba(0,0,0,0.03) !important;
  border-color: rgba(0,0,0,0.09) !important;
  color: #1a1a2e !important;
}
[data-theme="light"] .avatar-sheet-option:hover { background: rgba(24,99,220,0.06) !important; border-color: rgba(24,99,220,0.16) !important; }

.avatar-sheet-option--danger { color: #ef4444 !important; }
.avatar-sheet-option--danger .sheet-option-icon { color: #ef4444; }
[data-theme="light"] .avatar-sheet-option--danger { color: #dc2626 !important; }

.sheet-option-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: rgba(255,255,255,0.07);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; color: var(--violet-400);
}
.avatar-sheet-option--danger .sheet-option-icon { background: rgba(239,68,68,0.12); }
[data-theme="light"] .sheet-option-icon { background: rgba(24,99,220,0.09) !important; color: #1863DC !important; }
[data-theme="light"] .avatar-sheet-option--danger .sheet-option-icon { background: rgba(239,68,68,0.09) !important; }

.sheet-option-label { font-size: 15px; font-weight: 600; }

.avatar-sheet-cancel {
  width: 100%; padding: 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07); border-radius: 14px;
  font-size: 15px; font-weight: 700;
  color: var(--text-muted); cursor: pointer;
  transition: background 0.18s; margin-top: 4px;
}
.avatar-sheet-cancel:hover { background: rgba(255,255,255,0.08); }
[data-theme="light"] .avatar-sheet-cancel {
  background: rgba(0,0,0,0.03) !important;
  border-color: rgba(0,0,0,0.08) !important;
  color: #6b7280 !important;
}

/* ── Tab Bar — terracotta active (consistent w/ all pages) ── */
[data-theme="light"] .float-tab-bar {
  background: linear-gradient(135deg, rgba(255,253,250,0.92) 0%, rgba(245,237,224,0.88) 100%) !important;
  -webkit-backdrop-filter: blur(28px) saturate(150%);
  backdrop-filter: blur(28px) saturate(150%);
  border-color: rgba(232,224,213,0.80) !important;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.60),
    0 -2px 12px rgba(201,107,85,0.06),
    0 6px 20px rgba(140,114,96,0.10) !important;
}
[data-theme="light"] .tab-item { color: rgba(92,69,53,0.55) !important; }
[data-theme="light"] .tab-item svg,
[data-theme="light"] .tab-item .tab-icon { color: rgba(92,69,53,0.55) !important; }
[data-theme="light"] .tab-item.active {
  background: linear-gradient(135deg, rgba(201,107,85,0.14) 0%, rgba(201,107,85,0.22) 100%) !important;
  color: #a84e30 !important;
  border-color: rgba(201,107,85,0.35) !important;
}
[data-theme="light"] .tab-item.active svg,
[data-theme="light"] .tab-item.active .tab-icon { color: #a84e30 !important; }
[data-theme="light"] .tab-item:hover:not(.tab-disabled) {
  color: rgba(92,69,53,0.80) !important;
}
</style>
</head>

</div>

<div class="desktop-container">

    <div class="mobile-viewport">

                <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/>

            <div class="row-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <span class="row-label" data-i18n="profile.edit">Edit Profile</span>
            <div class="row-chevron"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9,18 15,12 9,6"/></svg></div>
          </a>
          <a href="../../profile/settings/" class="settings-row">
            <div class="row-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>

            <span class="row-label" data-i18n="profile.settings">Account Settings</span>

        <!-- Secondary settings -->
        <div class="settings-group">
          <a href="#" class="settings-row">
            <div class="row-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
            </div>
            <span class="row-label" data-i18n="profile.saved">Saved</span>
            <div class="row-chevron"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9,18 15,12 9,6"/></svg></div>
          </a>
          <a href="#" class="settings-row">
            <div class="row-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>

            <span class="row-label" data-i18n="profile.report_bug">Report a Bug</span>
            <div class="row-chevron"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9,18 15,12 9,6"/></svg></div>
          </a>
        </div>

      </div><!-- /profile-content -->

<script>
document.addEventListener('DOMContentLoaded', function() {
  /* Tab bar */
  const tabBar=document.getElementById('floatTabBar');
  if(tabBar){const tabs=tabBar.querySelectorAll('.tab-item');tabs.forEach(t=>{t.addEventListener('click',e=>{if(t.href&&t.href!=='#'&&!t.href.endsWith('#'))return;e.preventDefault();tabs.forEach(x=>x.classList.remove('active'));t.classList.add('active')})});}

  /* ── Avatar bottom sheet ── */
  const camBtn       = document.getElementById('avatarCamBtn');
  const fileInput    = document.getElementById('avatarFileInput');
  const backdrop     = document.getElementById('avatarSheetBackdrop');
  const sheet        = document.getElementById('avatarSheet');
  const btnLibrary   = document.getElementById('sheetChooseLibrary');
  const btnCamera    = document.getElementById('sheetTakePhoto');
  const btnRemove    = document.getElementById('sheetRemovePhoto');
  const btnCancel    = document.getElementById('sheetCancel');

  function openSheet() {
    backdrop.classList.add('open');
    sheet.classList.add('open');
  }
  function closeSheet() {
    backdrop.classList.remove('open');
    sheet.classList.remove('open');
  }

  /* Camera icon → open sheet */
  if (camBtn) camBtn.addEventListener('click', openSheet);

  /* Backdrop tap / Cancel → close */
  if (backdrop) backdrop.addEventListener('click', closeSheet);
  if (btnCancel) btnCancel.addEventListener('click', closeSheet);

  /* Handle file selected (shared by both library + take photo) */
  function handleFile(file) {
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function (e) {
      if (window.BDProfile) {
        BDProfile.saveAvatar(e.target.result);
        BDProfile.applyAvatar();
      }
    };
    reader.readAsDataURL(file);
    fileInput.value = '';
  }

  /* Option 1: Choose from Library */
  if (btnLibrary) btnLibrary.addEventListener('click', function () {
    closeSheet();
    fileInput.removeAttribute('capture');
    fileInput.accept = 'image/*';
    setTimeout(function () { fileInput.click(); }, 300);
  });

  /* Option 2: Take Photo (mobile camera) */
  if (btnCamera) btnCamera.addEventListener('click', function () {
    closeSheet();
    fileInput.setAttribute('capture', 'user');
    fileInput.accept = 'image/*';
    setTimeout(function () { fileInput.click(); }, 300);
  });

  /* Option 3: Remove Photo */
  if (btnRemove) btnRemove.addEventListener('click', function () {
    closeSheet();
    if (window.BDProfile) {
      BDProfile.removeAvatar();
      BDProfile.applyAvatar();
    }
  });

  /* File input change */
  if (fileInput) fileInput.addEventListener('change', function () {
    handleFile(fileInput.files && fileInput.files[0]);
  });
});
</script>
