<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Cream base gradient (warm cream → sand) -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdf8f2"/>
      <stop offset="0.5" stop-color="#f5ede0"/>
      <stop offset="1" stop-color="#ede1cf"/>
    </linearGradient>

    <!-- ── WAVE RIBBONS (richer, more organic) ── -->
    <linearGradient id="ribbon-blue" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0" stop-color="#a3c2d3" stop-opacity="0.72"/>
      <stop offset="0.55" stop-color="#c4d9e5" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7fa8be" stop-opacity="0.40"/>
    </linearGradient>

    <linearGradient id="ribbon-coral" x1="0" y1="0.2" x2="1" y2="0.5">
      <stop offset="0" stop-color="#f8cfc2" stop-opacity="0.78"/>
      <stop offset="0.5" stop-color="#f2b09d" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#e8917a" stop-opacity="0.45"/>
    </linearGradient>

    <linearGradient id="ribbon-terra" x1="0.1" y1="0" x2="1" y2="0.5">
      <stop offset="0" stop-color="#e8917a" stop-opacity="0.62"/>
      <stop offset="0.5" stop-color="#f2b09d" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#c96b55" stop-opacity="0.35"/>
    </linearGradient>

    <linearGradient id="ribbon-sage" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0" stop-color="#a8c8c4" stop-opacity="0.60"/>
      <stop offset="0.55" stop-color="#c5d9d7" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#8fb5b0" stop-opacity="0.30"/>
    </linearGradient>

    <linearGradient id="ribbon-blush" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f8cfc2" stop-opacity="0.65"/>
      <stop offset="0.5" stop-color="#fceae4" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#f2b09d" stop-opacity="0.32"/>
    </linearGradient>

    <linearGradient id="ribbon-deep" x1="0" y1="0" x2="0.9" y2="0.4">
      <stop offset="0" stop-color="#7fa8be" stop-opacity="0.30"/>
      <stop offset="0.6" stop-color="#a3c2d3" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#c5d9d7" stop-opacity="0.28"/>
    </linearGradient>

    <!-- ── LARGE SPHERE radial gradients (3D ball-like) ── -->
    <radialGradient id="sphere-terra-big" cx="0.38" cy="0.32" r="0.75">
      <stop offset="0" stop-color="#fceae4" stop-opacity="1"/>
      <stop offset="0.35" stop-color="#f2b09d" stop-opacity="0.95"/>
      <stop offset="0.75" stop-color="#e8917a" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#c96b55" stop-opacity="0.65"/>
    </radialGradient>

    <radialGradient id="sphere-terra-med" cx="0.4" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#fceae4" stop-opacity="0.95"/>
      <stop offset="0.4" stop-color="#f2b09d" stop-opacity="0.85"/>
      <stop offset="0.8" stop-color="#e8917a" stop-opacity="0.70"/>
      <stop offset="1" stop-color="#d97f66" stop-opacity="0.50"/>
    </radialGradient>

    <radialGradient id="sphere-salmon" cx="0.4" cy="0.35" r="0.75">
      <stop offset="0" stop-color="#fef5f2" stop-opacity="1"/>
      <stop offset="0.45" stop-color="#f8cfc2" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#f2b09d" stop-opacity="0.55"/>
    </radialGradient>

    <radialGradient id="sphere-blue" cx="0.4" cy="0.35" r="0.75">
      <stop offset="0" stop-color="#e0ecf3" stop-opacity="0.95"/>
      <stop offset="0.45" stop-color="#a3c2d3" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#7fa8be" stop-opacity="0.55"/>
    </radialGradient>

    <radialGradient id="sphere-blue-small" cx="0.4" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#c4d9e5" stop-opacity="0.95"/>
      <stop offset="0.6" stop-color="#7fa8be" stop-opacity="0.70"/>
      <stop offset="1" stop-color="#4a87a8" stop-opacity="0.45"/>
    </radialGradient>

    <radialGradient id="sphere-sage" cx="0.4" cy="0.35" r="0.75">
      <stop offset="0" stop-color="#e2edec" stop-opacity="0.95"/>
      <stop offset="0.45" stop-color="#a8c8c4" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#8fb5b0" stop-opacity="0.55"/>
    </radialGradient>

    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
    <filter id="soft-strong" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
  </defs>

  <!-- ─── Cream base ─── -->
  <rect width="400" height="900" fill="url(#bg)"/>

  <!-- ═══ WAVE LAYERS (rich, organic, full-bleed) ═══ -->

  <!-- R1 · Dusty blue ribbon, top arc -->
  <path d="M -60,80 C 100,30 230,170 480,80 L 480,220 C 320,265 160,165 -60,240 Z"
        fill="url(#ribbon-blue)" filter="url(#soft)"/>

  <!-- R2 · Coral peach sweep (wider, more dominant) -->
  <path d="M -60,210 C 60,150 180,300 320,200 C 410,165 480,210 480,250 L 480,360
           C 380,420 240,340 90,400 C 20,425 -30,395 -60,360 Z"
        fill="url(#ribbon-coral)" filter="url(#soft)"/>

  <!-- R3 · Sage ribbon, mid (extra layer for depth) -->
  <path d="M -60,360 C 100,310 230,440 380,360 C 440,335 480,355 480,385 L 480,440
           C 370,490 220,420 80,460 C 0,485 -35,460 -60,440 Z"
        fill="url(#ribbon-sage)" filter="url(#soft)"/>

  <!-- R4 · Terra → coral ribbon, mid-bottom (BOLD) -->
  <path d="M -60,470 C 110,410 240,580 400,480 C 445,460 480,475 480,510 L 480,610
           C 370,670 220,580 80,620 C 0,645 -35,625 -60,600 Z"
        fill="url(#ribbon-terra)" filter="url(#soft)"/>

  <!-- R5 · Dusty blue deep, lower mid -->
  <path d="M -60,640 C 120,590 260,750 420,650 C 460,630 480,650 480,670 L 480,760
           C 360,800 220,720 80,760 C 0,780 -35,765 -60,745 Z"
        fill="url(#ribbon-deep)" filter="url(#soft)"/>

  <!-- R6 · Blush ribbon, bottom edge -->
  <path d="M -60,800 C 100,755 280,860 480,775 L 480,920 L -60,920 Z"
        fill="url(#ribbon-blush)" filter="url(#soft)"/>

  <!-- ═══ LARGE BRAND SPHERES (the focal points) ═══ -->

  <!-- Top-right BIG terracotta orb -->
  <circle cx="320" cy="135" r="48" fill="url(#sphere-terra-big)"/>
  <circle cx="318" cy="125" r="13" fill="#fef5f2" opacity="0.55"/>

  <!-- Top-left salmon cluster -->
  <circle cx="58" cy="190" r="32" fill="url(#sphere-salmon)"/>
  <circle cx="55" cy="180" r="9" fill="#fef5f2" opacity="0.50"/>

  <!-- Mid-right medium terra -->
  <circle cx="345" cy="310" r="22" fill="url(#sphere-terra-med)"/>

  <!-- Mid-left blue sphere -->
  <circle cx="78" cy="370" r="28" fill="url(#sphere-blue)"/>
  <circle cx="74" cy="362" r="8" fill="#f0f6fa" opacity="0.55"/>

  <!-- Center small salmon dots -->
  <circle cx="200" cy="280" r="10" fill="#e8917a" opacity="0.45"/>
  <circle cx="250" cy="430" r="7" fill="#c96b55" opacity="0.45"/>

  <!-- Mid-bottom BIG terra ball -->
  <circle cx="68" cy="560" r="42" fill="url(#sphere-terra-big)"/>
  <circle cx="62" cy="546" r="11" fill="#fef5f2" opacity="0.55"/>

  <!-- Mid-bottom right medium terra -->
  <circle cx="335" cy="600" r="26" fill="url(#sphere-terra-med)"/>

  <!-- Sage accent -->
  <circle cx="285" cy="465" r="20" fill="url(#sphere-sage)"/>

  <!-- Small blue dot left -->
  <circle cx="110" cy="690" r="12" fill="url(#sphere-blue-small)"/>

  <!-- Bottom-right medium salmon -->
  <circle cx="312" cy="745" r="28" fill="url(#sphere-salmon)"/>
  <circle cx="308" cy="735" r="8" fill="#fef5f2" opacity="0.45"/>

  <!-- Bottom-left small terra -->
  <circle cx="85" cy="810" r="18" fill="url(#sphere-terra-med)"/>

  <!-- Bottom decorative tiny dots -->
  <circle cx="220" cy="820" r="6" fill="#c96b55" opacity="0.40"/>
  <circle cx="170" cy="385" r="4" fill="#7fa8be" opacity="0.55"/>
  <circle cx="155" cy="730" r="5" fill="#8fb5b0" opacity="0.50"/>

  <!-- Bottom-left tiny terra dot accent -->
  <circle cx="40" cy="855" r="5" fill="#c96b55" opacity="0.50"/>
</svg>
